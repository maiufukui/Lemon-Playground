const TrendChart = ({ series, accent, target=null, todayLabel='today', startLabel='28d ago', diaSeries=null, diaTarget=null, height=140 }) => {
  const w=305, h=height, pad=18;
  const allValues = diaSeries ? [...series, ...diaSeries] : [...series];
  if (target!==null) allValues.push(target);
  if (diaTarget!==null) allValues.push(diaTarget);
  const min = Math.min(...allValues) - 4;
  const max = Math.max(...allValues) + 4;
  const x = i => pad + (i*(w-pad*2))/(series.length-1);
  const y = v => h - pad - ((v-min)/(max-min))*(h-pad*2);
  const rollAvg = s => s.map((_,i)=>{
    const start = Math.max(0,i-6);
    const slice = s.slice(start,i+1);
    return slice.reduce((a,b)=>a+b,0)/slice.length;
  });
  const rolling = rollAvg(series);
  const linePath = series.map((v,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const avgPath  = rolling.map((v,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const tY = target!==null ? y(target).toFixed(1) : null;
  const diaRolling = diaSeries ? rollAvg(diaSeries) : null;
  const diaLinePath = diaSeries ? diaSeries.map((v,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ') : null;
  const diaAvgPath  = diaRolling ? diaRolling.map((v,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ') : null;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
      {target!==null && (
        <>
          <line x1={pad} y1={tY} x2={w-pad} y2={tY} stroke="#94a47f" strokeWidth="1" strokeDasharray="3 4" opacity="0.6"/>
          <text x={w-pad} y={Number(tY)-4} fontSize="9" fill="#94a47f" textAnchor="end" fontWeight="600">target ≤ {target}{diaTarget?`/${diaTarget}`:''}</text>
        </>
      )}
      <path d={linePath} fill="none" stroke={accent+'40'} strokeWidth="1.4" strokeLinecap="round"/>
      {series.map((v,i)=> (
        <circle key={i} cx={x(i)} cy={y(v)} r={i===series.length-1?3.2:1.6} fill={i===series.length-1?accent:accent+'80'}/>
      ))}
      <path d={avgPath} fill="none" stroke={accent} strokeWidth="2.2" strokeLinecap="round" className="draw-line"/>
      {diaSeries && (
        <>
          <path d={diaLinePath} fill="none" stroke={accent+'30'} strokeWidth="1.2" strokeLinecap="round" strokeDasharray="2 2"/>
          <path d={diaAvgPath}  fill="none" stroke={accent+'80'} strokeWidth="1.8" strokeLinecap="round" className="draw-line"/>
          {diaSeries.map((v,i)=> (
            <circle key={'d'+i} cx={x(i)} cy={y(v)} r={i===diaSeries.length-1?2.6:1.2} fill={i===diaSeries.length-1?accent+'aa':accent+'55'}/>
          ))}
        </>
      )}
      <text x={pad} y={h-4} fontSize="9" fill="#a8a29e">{startLabel}</text>
      <text x={w-pad} y={h-4} fontSize="9" fill="#a8a29e" textAnchor="end">{todayLabel}</text>
    </svg>
  );
};

// BarChart — small bar chart for actions-per-day visualization
const BarChart = ({ series, accent, startLabel='14d ago', todayLabel='today' }) => {
  const w=305, h=100, pad=18;
  const max = Math.max(...series) + 1;
  const barW = (w - pad*2) / series.length * 0.7;
  const gap  = (w - pad*2) / series.length * 0.3;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
      {series.map((v,i)=> {
        const xPos = pad + i*(barW + gap);
        const barH = (v/max) * (h - pad*2);
        return (
          <rect key={i} x={xPos} y={h-pad-barH} width={barW} height={barH} rx="2"
            fill={i===series.length-1 ? accent : accent+'66'}/>
        );
      })}
      <text x={pad} y={h-4} fontSize="9" fill="#a8a29e">{startLabel}</text>
      <text x={w-pad} y={h-4} fontSize="9" fill="#a8a29e" textAnchor="end">{todayLabel}</text>
    </svg>
  );
};

const Page4 = ({ p, directions, contexts, onContinue }) => {
  const [targets, setTargets] = useState(()=> p.plan.targets.map(t=>({...t})));
  const [editing, setEditing] = useState(null);
  const adjust = (idx, delta) => {
    setTargets(prev => prev.map((t,i)=>{
      if (i!==idx) return t;
      const step = t.step || 1;
      return { ...t, target: Math.max(t.min, Math.min(t.max, t.target + delta*step)) };
    }));
  };

  const visible = pillarsFor(p);
  const dirSummary = visible.map(d => directions[d.key]).filter(Boolean);
  const pushCount     = dirSummary.filter(v=>v==='push').length;
  const lighterCount  = dirSummary.filter(v=>v==='lighter').length;
  const maintainCount = dirSummary.filter(v=>v==='maintain').length;

  return (
    <div className="px-5 pt-6 pb-8 bg-gradient-to-b from-white via-sage-50/30 to-white min-h-full">
      <div className="su">
        <p className="text-[11px] font-semibold uppercase tracking-wide text-stone-400">{p.plan.week} plan</p>
        <h1 className="text-2xl font-bold text-stone-600 leading-tight mt-1">Built from your data</h1>
        <p className="text-sm text-stone-500 mt-2 leading-relaxed">Adjust anything. We’ll keep the science underneath.</p>
      </div>

      <div className="mt-4 flex flex-wrap gap-2 su1">
        {pushCount>0     && <span className="text-[11px] font-semibold px-2.5 py-1 rounded-full" style={{background:p.accent+'18',color:p.accent}}>Pushing {pushCount}</span>}
        {maintainCount>0 && <span className="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-stone-100 text-stone-500">Maintaining {maintainCount}</span>}
        {lighterCount>0  && <span className="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-amber-100 text-amber-700">Lighter on {lighterCount}</span>}
        {contexts.length>0 && (
          <span className="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-warm-100 text-stone-500">Context: {contexts.join(', ')}</span>
        )}
      </div>

      <div className="mt-5 rounded-2xl p-4 su2" style={{background:p.accent+'0d',border:`1px solid ${p.accent}22`}}>
        <div className="flex items-start gap-2">
          <span className="mt-0.5" style={{color:p.accent}}><I.Sparkles/></span>
          <div>
            <p className="text-[11px] font-semibold uppercase tracking-wide" style={{color:p.accent}}>{p.plan.tip.title}</p>
            <p className="text-[13px] text-stone-600 mt-1 leading-relaxed">{p.plan.tip.body}</p>
          </div>
        </div>
      </div>

      <div className="mt-5 su3">
        <div className="flex items-center justify-between mb-2">
          <p className="text-[11px] font-semibold uppercase tracking-wide text-stone-400">Weekly targets</p>
          <p className="text-[11px] text-stone-400">Tap to adjust</p>
        </div>
        <div className="bg-white rounded-2xl border border-stone-150 overflow-hidden">
          {targets.map((t,idx)=>{
            const TI = I[t.icon] || I.Heart;
            const isOpen = editing===idx;
            const dir = directions[t.pillar];
            return (
              <div key={idx} className={`px-4 py-3 ${idx<targets.length-1?'border-b border-stone-150':''}`}>
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style={{background:p.accent+'18',color:p.accent}}><TI/></div>
                  <div className="flex-1 min-w-0">
                    <p className="text-sm text-stone-600 leading-tight">{t.label}</p>
                    {dir && <p className="text-[10px] font-semibold uppercase tracking-wide mt-0.5" style={{color: dir==='push'?p.accent : dir==='lighter'?'#F0A030':'#a8a29e'}}>{dir}</p>}
                  </div>
                  <button onClick={()=>setEditing(isOpen?null:idx)}
                    className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-semibold transition-colors flex-shrink-0 ${isOpen?'bg-stone-100 text-stone-600':'text-stone-600 hover:bg-stone-100'}`}>

                    <span className="text-stone-400"><I.Edit/></span>

                  <div className="flex items-center justify-end gap-3 mt-2.5 fi">
                    <button onClick={()=>adjust(idx,-1)} className="w-9 h-9 rounded-lg bg-stone-100 flex items-center justify-center text-stone-500 hover:bg-stone-200"><I.Minus/></button>

// MAYA — read-only weekly plan card (chat-styled)

// Rationale surfacing (Maya only):

//   • Per-item change highlight — TEXT ONLY, no buttons. Only on items that changed.
//   • No-shame language: "trying a small bump" not "you fell short."

//     next week's plan — that signal already exists on the homepage, no new affordance here.

const CHANGE_META = {
  eased:    { icon:'↓', label:'Eased',    color:'#c97a1a' },
  building: { icon:'↑', label:'Building', color:'#5d6e4d' },
  new:      { icon:'+', label:'New',      color:'#3d7a9e' },
};

const PlanItemChange = ({ item }) => {
  const meta = CHANGE_META[item.change];
  if (!meta) return null;
  return (
    <p className="mt-0.5" style={{fontSize:11.5,color:'#78716c',margin:'2px 0 0',paddingLeft:14,lineHeight:1.45}}>
      <span style={{fontWeight:700,color:meta.color,marginRight:4}}>{meta.icon} {meta.label} from last week —</span>
      {item.reason}
    </p>
  );
};

const PILLAR_DOT_COLORS = ['#778a62', '#c9a227', '#5b7fa6', '#8b6daa']; // Move, Nutrition, Sleep, Mind

const MetricWidgets = ({ initialWidgets, extraMetrics, bpLogPrompt, onBPLog, bpOverride, bpJustLogged, metricsEmpty, onMetricLog }) => {
  const [editing, setEditing] = useState(false);
  const [widgets, setWidgets] = useState(initialWidgets);
  const remove = (id) => setWidgets(w => w.filter(x => x.id !== id));
  const add    = (m)  => setWidgets(w => [...w, m]);
  const available = (extraMetrics || []).filter(m => !widgets.some(w => w.id === m.id));

  return (
    <div style={{width:'100%'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7}}>
        <p style={{fontSize:9,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',color:'#a8a29e',margin:0}}>Your metrics</p>

        </button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:7}}>
        {widgets.map((w) => {
          // BP-specific empty-state tile — centered + button when not logged today
          if (metricsEmpty && w.id === 'bp') {
            return (
              <button key={w.id} onClick={()=>onMetricLog && onMetricLog(w.id)} className="su" aria-label="Log today's blood pressure" style={{
                background:'rgba(255,255,255,0.7)',
                border:`1.5px dashed ${w.color}66`,
                borderRadius:14, padding:'10px 9px 9px',
                position:'relative', cursor:'pointer', fontFamily:'inherit',
                display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:78,
              }}>
                <p style={{fontSize:8,fontWeight:700,letterSpacing:'0.05em',textTransform:'uppercase',color:'#a8a29e',margin:'0 0 6px',lineHeight:1.2,textAlign:'center'}}>{w.label}</p>
                <div style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:30,height:30,borderRadius:'50%',background:w.color,color:'#fff',boxShadow:`0 4px 12px ${w.color}55`}}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </div>
                <p style={{fontSize:9,fontWeight:700,color:w.color,margin:'5px 0 0',whiteSpace:'nowrap'}}>Log BP</p>
              </button>
            );
          }
          // BP log-prompt CTA tile (Option 4 — tile variant, unlogged state)
          if (bpLogPrompt && w.id === 'bp') {
            return (
              <button key={w.id} onClick={onBPLog} className="su" aria-label="Log today's blood pressure" style={{
                background:`linear-gradient(160deg, ${w.color}18 0%, ${w.color}08 100%)`,
                border:`1.5px dashed ${w.color}80`,
                borderRadius:14, padding:'10px 9px 9px',
                position:'relative', cursor:'pointer', textAlign:'left', fontFamily:'inherit',
                animation:'slide-up 0.45s ease-out both, pulseDot 2.4s ease-in-out infinite',

            <div key={w.id} className={justLogged ? 'pop' : 'su'} style={{

                <button onClick={()=>remove(w.id)} aria-label={`Remove ${w.label}`} style={{position:'absolute',top:-5,right:-5,width:18,height:18,borderRadius:'50%',background:'#e05c5c',border:'2px solid #fff',color:'#fff',fontSize:11,lineHeight:1,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontFamily:'inherit',boxShadow:'0 1px 3px rgba(0,0,0,0.15)',padding:0}}>×</button>

                <span style={{fontSize:8,fontWeight:700,color:w.color,whiteSpace:'nowrap'}}>{trend}</span>
              </div>
            </div>
          );
        })}
      </div>
      {editing && available.length > 0 && (
        <div className="su" style={{marginTop:10,padding:'10px 11px 11px',background:'rgba(255,255,255,0.55)',borderRadius:12,border:'1px solid rgba(0,0,0,0.05)'}}>

                <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:14,height:14,borderRadius:'50%',background:m.color+'1a',color:m.color,fontSize:11,fontWeight:800,lineHeight:1}}>+</span>
                {m.label}
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

const HistoryStrip = ({ persona, selectedDay, onSelect }) => {
  const days = persona.historicalDays || [];
  const past = days.slice(1, 5);
  const cells = [
    ...past.map(d => ({ key:d.label.toLowerCase(), label:d.label, dots:[!!d.m, !!d.n, !!d.s, !!d.mi] })),
    { key:'fri', label:'Fri', dots:[false,false,false,false] },
  ];
  const tappable = new Set(['wed','thu','fri']);

// ── BreathingSession — guided box-breathing overlay ───────────────────────
const BreathingSession = ({ option, card, onClose, onDone }) => {
  const [tick, setTick] = useState(0);
  const [isComplete, setIsComplete] = useState(false);

  useEffect(() => {
    if (isComplete) return;
    const t = setInterval(() => {
      setTick(s => {
        const next = s + 1;
        if (next >= BTOTAL_SECS) { setIsComplete(true); return BTOTAL_SECS; }
        return next;
      });
    }, 1000);
    return () => clearInterval(t);
  }, [isComplete]);

  const phaseIdx    = Math.floor(tick / BPHASE_DUR) % BPHASES.length;
  const countdown   = BPHASE_DUR - (tick % BPHASE_DUR);
  const phase       = BPHASES[phaseIdx];
  const isExpanded  = phaseIdx === 0 || phaseIdx === 1;
  const ringScale   = isExpanded ? 1.0 : 0.52;
  const progressPct = tick / BTOTAL_SECS;
  const circ        = 2 * Math.PI * 130;

  return (
    <div className="fi" style={{position:'absolute',inset:0,background:'#0e0e1a',zIndex:200,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'space-between',padding:'20px 0 32px'}}>
      <div style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0 20px'}}>
        <button onClick={onClose} style={{background:'rgba(255,255,255,0.08)',border:'none',borderRadius:12,padding:'7px 13px',color:'rgba(255,255,255,0.6)',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>End</button>
        <p style={{fontSize:13,fontWeight:700,color:'rgba(255,255,255,0.5)',margin:0}}>{option.label}</p>
        <div style={{width:60}}/>
      </div>
      <div style={{position:'relative',width:300,height:300,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <svg width="300" height="300" style={{position:'absolute',top:0,left:0}}>
          <circle cx="150" cy="150" r="130" fill="none" stroke="rgba(139,109,170,0.12)" strokeWidth="2"/>
          <circle cx="150" cy="150" r="130" fill="none" stroke={card.color} strokeWidth="2.5"
            strokeDasharray={circ} strokeDashoffset={circ * (1 - progressPct)}
            strokeLinecap="round" transform="rotate(-90 150 150)"
            style={{transition:'stroke-dashoffset 1s linear'}}/>
        </svg>
        <div style={{position:'absolute',width:220,height:220,borderRadius:'50%',border:`1px solid ${card.color}20`}}/>
        <div style={{
          width:180, height:180, borderRadius:'50%',
          border:`2px solid ${card.color}`,
          transform:`scale(${ringScale})`,
          transition:`transform ${BPHASE_DUR}s ease-in-out, box-shadow ${BPHASE_DUR}s ease-in-out`,
          boxShadow: isExpanded ? `0 0 50px ${card.color}55, inset 0 0 30px ${card.color}18` : `0 0 15px ${card.color}22`,
          display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:4,
        }}>
          {!isComplete ? (
            <>
              <p style={{fontSize:22,fontWeight:800,color:'#fff',margin:0,letterSpacing:'-0.02em'}}>{phase}</p>
              <p style={{fontSize:36,fontWeight:900,color:card.color,margin:0,lineHeight:1}}>{countdown}</p>
            </>
          ) : (
            <p style={{fontSize:28,fontWeight:800,color:'#fff',margin:0}}>Done</p>
          )}
        </div>
      </div>
      {!isComplete ? (
        <div style={{textAlign:'center'}}>
          <p style={{fontSize:12,color:'rgba(255,255,255,0.35)',margin:'0 0 4px'}}>{Math.ceil((BTOTAL_SECS - tick) / 60)} min remaining · {BTOTAL_CYCLES} breath cycles</p>
          <p style={{fontSize:11,color:'rgba(255,255,255,0.2)',margin:0}}>Tap End to exit early</p>
        </div>
      ) : (
        <div style={{textAlign:'center',padding:'0 32px'}}>
          <p style={{fontSize:14,fontWeight:600,color:'rgba(255,255,255,0.8)',margin:'0 0 4px'}}>Your nervous system just shifted.</p>
          <p style={{fontSize:12,color:'rgba(255,255,255,0.35)',margin:'0 0 20px'}}>Check your HRV tomorrow morning for the impact.</p>
          <button onClick={onDone} style={{padding:'13px 32px',borderRadius:14,background:card.color,border:'none',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>Back to home</button>
        </div>
      )}
    </div>
  );
};

// ── Sleep Anchor Setter ───────────────────────────────────────────────────────
const SleepAnchorSetter = ({ card, onDone }) => {
  const [anchorH, setAnchorH] = useState(22);
  const [anchorM, setAnchorM] = useState(0);
  const [locked, setLocked]   = useState(false);
  const nights = [
    { label:'Mon', delta:+12 },
    { label:'Tue', delta:-5  },
    { label:'Wed', delta:+45 },
    { label:'Thu', delta:+8  },
    { label:'Fri', delta:+20 },
  ];
  const dotColor = d => Math.abs(d) <= 10 ? '#4CAF7D' : Math.abs(d) <= 20 ? '#F0A030' : '#E05C5C';
  const adjustAnchor = (delta) => {
    let t = anchorH * 60 + anchorM + delta;
    if (t < 18*60) t = 18*60;
    if (t > 24*60-1) t = 24*60-1;
    setAnchorH(Math.floor(t/60));
    setAnchorM(t%60);
  };
  const fmtAnchor = () => {
    const h = anchorH > 12 ? anchorH - 12 : anchorH;
    return `${h}:${anchorM.toString().padStart(2,'0')}${anchorH >= 12 ? 'pm' : 'am'}`;
  };
  return (
    <div style={{marginBottom:8}}>
      <div style={{background:`${card.color}08`,borderRadius:12,padding:'10px 12px',border:`1px solid ${card.color}20`,marginBottom:7}}>
        <p style={{fontSize:9,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',color:'#a8a29e',margin:'0 0 8px'}}>Last 5 nights vs 10:00pm target</p>
        <div style={{display:'flex',gap:3}}>
          {nights.map((n,i) => (
            <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
              <div style={{width:24,height:24,borderRadius:'50%',border:`2px solid ${dotColor(n.delta)}`,background:`${dotColor(n.delta)}18`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                {Math.abs(n.delta) <= 10
                  ? <svg viewBox="0 0 24 24" fill="none" stroke={dotColor(n.delta)} strokeWidth="3" width="10" height="10"><polyline points="20 6 9 17 4 12"/></svg>
                  : <span style={{fontSize:8,fontWeight:800,color:dotColor(n.delta)}}>{n.delta > 0 ? '+' : ''}{n.delta}m</span>
                }
              </div>
              <span style={{fontSize:8.5,fontWeight:600,color:'#a8a29e'}}>{n.label}</span>
            </div>
          ))}
        </div>
        <p style={{fontSize:10,color:'#78716c',margin:'7px 0 0',lineHeight:1.4}}>Avg drift <span style={{fontWeight:700,color:'#F0A030'}}>+16 min late</span> · 1 of 5 nights on target</p>
      </div>
      {locked ? (
        <div className="fi" style={{background:'#f0faf4',borderRadius:12,padding:'10px 12px',border:'1.5px solid #4CAF7D33',display:'flex',alignItems:'center',gap:9}}>
          <div style={{width:30,height:30,borderRadius:9,background:'#fff',color:'#4CAF7D',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><I.Check/></div>
          <div>
            <p style={{fontSize:12,fontWeight:700,color:'#4CAF7D',margin:0}}>Anchor locked · {fmtAnchor()}</p>
            <p style={{fontSize:10,color:'#78716c',margin:'1px 0 0'}}>Tonight's dot updates automatically</p>
          </div>
        </div>
      ) : (
        <>
          <div style={{display:'flex',alignItems:'center',gap:10,background:'#fff',borderRadius:12,border:`1.5px solid ${card.color}28`,padding:'9px 12px',marginBottom:7}}>
            <div style={{flex:1}}>
              <p style={{fontSize:9,fontWeight:600,letterSpacing:'0.07em',textTransform:'uppercase',color:'#a8a29e',margin:'0 0 1px'}}>Tonight's anchor</p>
              <p style={{fontSize:18,fontWeight:900,color:'#1a1a1a',margin:0,letterSpacing:'-0.02em'}}>{fmtAnchor()}</p>
            </div>
            <div style={{display:'flex',gap:5}}>
              <button onClick={()=>adjustAnchor(-15)} style={{width:32,height:32,borderRadius:9,background:`${card.color}10`,border:`1px solid ${card.color}28`,color:card.color,fontSize:18,fontWeight:700,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>-</button>
              <button onClick={()=>adjustAnchor(+15)} style={{width:32,height:32,borderRadius:9,background:`${card.color}10`,border:`1px solid ${card.color}28`,color:card.color,fontSize:18,fontWeight:700,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>+</button>
            </div>
          </div>
          <button onClick={()=>{ setLocked(true); onDone && onDone(); }} style={{width:'100%',padding:'9px',borderRadius:12,border:'none',background:card.color,color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>Lock in tonight</button>
        </>
      )}
    </div>
  );
};

const RecCard = ({ card, onDetail, onActivityDone, bpState, onLogWorkout, progress, showLogOwn = true, onSkipOpen }) => {
  const [completedOpts, setCompletedOpts] = useState([]);
  const [ownOpen, setOwnOpen]             = useState(false);
  const [ownText, setOwnText]             = useState('');
  const [ownDone, setOwnDone]             = useState(false);
  const [skipReason, setSkipReason]       = useState(null);
  const [skipOpen, setSkipOpen]           = useState(false);
  // Engine variant: which option index is currently shown as primary
  const [activeIdx, setActiveIdx]         = useState(0);
  // Engine variant: Not today dismiss + "already done elsewhere?" toast
  const [dismissed, setDismissed]         = useState(false);
  const [toastCounted, setToastCounted]   = useState(false);

  const isEngineCard    = !!card.trigger;
  const isLoggingPillar = card.pillar === 'Logging';
  const isBPPrimary     = isLoggingPillar && card.options[0] && card.options[0].isLoggingAction;
  const showLoggedTile  = isBPPrimary && bpState && bpState.logged;
  const showDismissed   = isBPPrimary && !showLoggedTile && bpState && bpState.dismissed;
  const noteChips       = (bpState && bpState.notes) || [];

  // Active option for engine variant (swappable)
  const activeOpt  = card.options[activeIdx] || card.options[0];
  const primaryOpt = card.options[0];
  // Alt options = all options except the currently active one, capped at 2
  const altOpts    = card.options.filter((_, i) => i !== activeIdx).slice(0, 2);
  const isCompleted = completedOpts.includes(activeIdx);
  const isPrimaryCompleted = completedOpts.includes(0);

  const markDone = (idx = 0) => {
    setCompletedOpts(arr => arr.includes(idx) ? arr : [...arr, idx]);
    onActivityDone && onActivityDone();
  };
  const unmarkDone = (idx = 0) => setCompletedOpts(arr => arr.filter(i => i !== idx));

  const handleOwnSubmit = () => {
    if (!ownText.trim()) return;
    setOwnDone(true);
    onActivityDone && onActivityDone();
  };

  const handleSkip = (reason) => {
    setSkipReason(reason);
    setSkipOpen(false);
    if (reason.completion) markDone(activeIdx);
  };

  const openDetail = (opt, idx = 0) => onDetail && onDetail({
    option: opt || primaryOpt,
    card, isSelected: true, onSelect: null,
    onComplete: () => markDone(idx),
    onLogActivity: () => onLogWorkout && onLogWorkout(opt || primaryOpt),
  });

  // Parse progress tracker from progress prop
  const progressDots = progress ? (() => {
    const parts = progress.value.split('/');
    const done = parseInt(parts[0], 10);
    const total = parseInt(parts[1], 10);
    return { done, total, label: progress.label, delta: progress.delta };
  })() : null;

  // ── ENGINE CARD VARIANT ──────────────────────────────────────────────────────
  if (isEngineCard) {
    const effortLabel   = activeOpt.effort || (activeOpt.detail ? activeOpt.detail.split('·')[0].trim() : null);
    const durationLabel = activeOpt.detail ? activeOpt.detail.split('·').slice(1).join('·').trim() : null;
    const triggerLine   = card.trigger; // already a single punchy line
    const hasRecipes    = activeOpt.recipes && activeOpt.recipes.length > 0;
    const isBreathOpt   = !!activeOpt.isBreathing;

    // ── DISMISSED STATE ──────────────────────────────────────────────────────────
    if (dismissed) return (
      <div style={{background:'#fff',borderRadius:20,border:'1px solid #efefed',overflow:'hidden',boxShadow:'0 2px 8px rgba(0,0,0,0.05)'}}>
        <div style={{height:3,background:`linear-gradient(90deg,${card.color}40,${card.color}18)`}}/>
        <div style={{padding:'12px 14px 13px'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:10,fontWeight:700,letterSpacing:'0.09em',textTransform:'uppercase',color:'#c4bfba'}}>{card.pillar}</span>
            <span style={{fontSize:10,color:'#d6d3d1',fontWeight:500,flex:1}}>skipped today</span>
            <button onClick={()=>setDismissed(false)} style={{padding:'3px 9px',borderRadius:8,background:'transparent',border:'1px solid #e8e5de',color:'#a8a29e',fontSize:10,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>Undo</button>
          </div>
          {!toastCounted && (
            <div style={{display:'flex',alignItems:'center',gap:10,marginTop:9,padding:'9px 11px',borderRadius:11,background:'#f9f8f6',border:'1px solid #ece9e3'}}>
              <p style={{fontSize:11,color:'#78716c',margin:0,fontWeight:500,flex:1}}>Already done this elsewhere?</p>
              <button onClick={()=>{ setToastCounted(true); markDone(activeIdx); setDismissed(false); }} style={{padding:'5px 11px',borderRadius:8,background:card.color,border:'none',color:'#fff',fontSize:10.5,fontWeight:700,cursor:'pointer',fontFamily:'inherit',flexShrink:0,whiteSpace:'nowrap'}}>Count it</button>
            </div>
          )}
        </div>
      </div>
    );

    // ── COMPLETED STATE ───────────────────────────────────────────────────────────
    if (isCompleted) return (
      <div className="fi" style={{position:'relative',background:'#f0faf4',borderRadius:20,border:'1.5px solid #4CAF7D28',overflow:'visible',boxShadow:'0 2px 8px rgba(76,175,125,0.08)'}}>
        <div style={{height:3,background:'linear-gradient(90deg,#4CAF7D,#4CAF7D55)',borderRadius:'20px 20px 0 0'}}/>
        <ConfettiBurst top={24} left={32} scale={1}/>
        <div style={{padding:'12px 14px 14px',display:'flex',alignItems:'center',gap:11,position:'relative',zIndex:2}}>
          <div style={{width:40,height:40,borderRadius:13,background:'#fff',color:'#4CAF7D',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:'0 2px 8px rgba(76,175,125,0.2)'}}><I.Check/></div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontSize:10,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',color:'#4CAF7D',margin:'0 0 2px'}}>{card.pillar}</p>
            <p style={{fontSize:14,fontWeight:800,color:'#57534e',margin:0,letterSpacing:'-0.01em',lineHeight:1.2,textDecoration:'line-through',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{activeOpt.label}</p>
            <p style={{fontSize:10.5,color:'#4CAF7D',fontWeight:600,margin:'2px 0 0'}}>Done · arc updated</p>
          </div>
          <button onClick={()=>unmarkDone(activeIdx)} style={{padding:'5px 10px',borderRadius:10,background:'transparent',border:'1.5px solid #4CAF7D30',color:'#4CAF7D',fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:'inherit',flexShrink:0}}>Undo</button>
        </div>
      </div>
    );

    // ── ACTIVE STATE ─────────────────────────────────────────────────────────────
    return (
      <div style={{background:'#fff',borderRadius:20,border:'1px solid #efefed',overflow:'hidden',boxShadow:'0 2px 8px rgba(0,0,0,0.05)'}}>
        {/* Accent bar */}
        <div style={{height:3,background:`linear-gradient(90deg,${card.color},${card.color}55)`}}/>

        {/* Header */}
        <div style={{padding:'12px 14px 0'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom: progressDots ? 7 : 9}}>
            <span style={{fontSize:10,fontWeight:700,letterSpacing:'0.09em',textTransform:'uppercase',color:card.color,flex:1}}>{card.pillar}</span>
            {card.streak && (
              <span style={{display:'inline-flex',alignItems:'center',gap:3,padding:'2px 8px',borderRadius:20,background:`${card.color}14`,color:card.color,fontSize:10,fontWeight:700,whiteSpace:'nowrap'}}>
                <svg width="7" height="9" viewBox="0 0 8 9" fill={card.color}><path d="M4 0C4 0 5.5 2.2 5.5 3.5C5.5 3.5 6.3 3.1 6.3 3.1C6.3 3.1 8 4.9 7.2 6.7C6.5 8.1 5.3 9 4 9C2.7 9 1.5 8.1 0.8 6.7C0 4.9 1.7 3.1 1.7 3.1C1.7 3.1 2.5 3.5 2.5 3.5C2.5 2.2 4 0 4 0Z"/></svg>
                {card.streak} streak
              </span>
            )}
            {card.conditionTag && <AdjustedTag label={card.conditionTag} note={card.adjustedNote} color={card.conditionTagColor}/>}
          </div>

          {progressDots && (
            <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:9}}>
              <div style={{display:'flex',gap:3}}>
                {Array.from({length:Math.min(progressDots.total,7)}).map((_,i)=>(
                  <div key={i} style={{width:i<progressDots.done?14:5,height:5,borderRadius:2.5,background:i<progressDots.done?card.color:`${card.color}28`,transition:'all 0.25s'}}/>
                ))}
              </div>
              <span style={{fontSize:10,fontWeight:600,color:'#a8a29e'}}>{progressDots.done}/{progressDots.total} {progressDots.label}</span>
            </div>
          )}

          {/* Trigger line */}
          <p style={{fontSize:13,fontWeight:600,color:'#2d2d2b',margin:'0 0 10px',lineHeight:1.45,letterSpacing:'-0.01em'}}>{triggerLine}</p>
        </div>

        {/* Body */}
        <div style={{padding:'0 14px 14px'}}>

          {/* Primary action tile */}
          <div onClick={()=>openDetail(activeOpt, activeIdx)} style={{
            display:'flex',alignItems:'center',gap:11,cursor:'pointer',
            padding:'11px 12px',borderRadius:14,
            background:card.bg,border:`1.5px solid ${card.color}28`,
            transition:'border-color 0.15s',marginBottom:0,
          }}>
            <div style={{
              width:40,height:40,borderRadius:12,flexShrink:0,
              background:`linear-gradient(135deg,${card.color}22,${card.color}0a)`,
              color:card.color,display:'flex',alignItems:'center',justifyContent:'center',
              boxShadow:`0 2px 6px ${card.color}18`,
            }}>
              <activeOpt.IC/>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <p style={{fontSize:13.5,fontWeight:800,color:'#1a1a1a',margin:'0 0 3px',letterSpacing:'-0.01em',lineHeight:1.2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{activeOpt.label}</p>
              <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                {effortLabel && <span style={{fontSize:9.5,fontWeight:600,padding:'2px 7px',borderRadius:20,background:'rgba(0,0,0,0.055)',color:'#57534e'}}>{effortLabel}</span>}
                {durationLabel && <span style={{fontSize:9.5,fontWeight:600,padding:'2px 7px',borderRadius:20,background:`${card.color}16`,color:card.color}}>{durationLabel}</span>}
              </div>
            </div>
            <svg viewBox="0 0 24 24" fill="none" stroke={card.color} strokeWidth="2.5" width="13" height="13" style={{flexShrink:0,opacity:0.35}}><path d="m9 18 6-6-6-6"/></svg>
          </div>

          {/* In-card action — pillar-specific, below the primary tile */}
          {card.pillar === 'Move' && (
            <button onClick={()=>openDetail(activeOpt, activeIdx)} style={{
              display:'flex',alignItems:'center',gap:10,width:'100%',
              padding:'10px 12px',borderRadius:12,marginTop:6,
              background:`linear-gradient(135deg,${card.color},${card.color}bb)`,
              border:'none',cursor:'pointer',fontFamily:'inherit',
            }}>
              <div style={{width:30,height:30,borderRadius:9,background:'rgba(255,255,255,0.2)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><I.Play/></div>
              <div style={{flex:1,textAlign:'left'}}>
                <p style={{fontSize:12,fontWeight:700,color:'#fff',margin:'0 0 1px'}}>Start session guide</p>
                <p style={{fontSize:9.5,color:'rgba(255,255,255,0.72)',margin:0,letterSpacing:'0.01em'}}>{activeOpt.modeLabel || 'Zone 2'} · warm-up → main set → cool-down</p>
              </div>
              <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.55)" strokeWidth="2.5" width="11" height="11" style={{flexShrink:0}}><path d="m9 18 6-6-6-6"/></svg>
            </button>
          )}

          {card.pillar === 'Mind' && isBreathOpt && (
            <button onClick={()=>openDetail(activeOpt, activeIdx)} style={{
              display:'flex',alignItems:'center',gap:10,width:'100%',
              padding:'10px 12px',borderRadius:12,marginTop:6,
              background:`${card.color}10`,border:`1.5px solid ${card.color}22`,
              cursor:'pointer',fontFamily:'inherit',
            }}>
              <div style={{width:30,height:30,borderRadius:'50%',background:card.color,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><I.Play/></div>
              <div style={{flex:1,textAlign:'left'}}>
                <p style={{fontSize:12,fontWeight:700,color:'#1a1a1a',margin:'0 0 1px'}}>Start breathing session</p>
                <p style={{fontSize:9.5,color:'#a8a29e',margin:0}}>5 min · 4-4-4-4 box breathing · guided</p>
              </div>
              <svg viewBox="0 0 24 24" fill="none" stroke={card.color} strokeWidth="2.5" width="11" height="11" style={{flexShrink:0,opacity:0.4}}><path d="m9 18 6-6-6-6"/></svg>
            </button>
          )}

          {card.pillar === 'Nutrition' && hasRecipes && (
            <div style={{marginTop:8}}>
              <p style={{fontSize:9,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'#b0a99e',margin:'0 0 5px'}}>Recipe options</p>
              <div style={{display:'flex',flexDirection:'column',gap:4}}>
                {activeOpt.recipes.slice(0,3).map((r,i)=>(
                  <button key={i} onClick={()=>openDetail(activeOpt, activeIdx)} style={{
                    display:'flex',alignItems:'center',gap:9,width:'100%',
                    padding:'7px 10px',borderRadius:10,textAlign:'left',
                    background:i===0?`${card.color}0d`:'#fafaf8',
                    border:`1px solid ${i===0?card.color+'22':'#ece9e3'}`,
                    cursor:'pointer',fontFamily:'inherit',
                  }}>
                    <span style={{fontSize:11.5,fontWeight:600,color:'#1a1a1a',flex:1,lineHeight:1.3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.name}</span>
                    <span style={{fontSize:9,padding:'2px 6px',borderRadius:6,background:`${card.color}16`,color:card.color,fontWeight:700,flexShrink:0}}>{r.tag}</span>
                    <span style={{fontSize:9,color:'#b0a99e',fontWeight:500,flexShrink:0,marginLeft:2}}>{r.time}</span>
                  </button>
                ))}
              </div>
            </div>
          )}

          {card.pillar === 'Sleep' && (
            <button onClick={()=>openDetail(activeOpt, activeIdx)} style={{
              display:'flex',alignItems:'center',gap:10,width:'100%',
              padding:'10px 12px',borderRadius:12,marginTop:6,
              background:`${card.color}0d`,border:`1.5px solid ${card.color}22`,
              cursor:'pointer',fontFamily:'inherit',
            }}>
              <div style={{width:30,height:30,borderRadius:9,background:card.color,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><I.Moon/></div>
              <div style={{flex:1,textAlign:'left'}}>
                <p style={{fontSize:12,fontWeight:700,color:'#1a1a1a',margin:'0 0 1px'}}>Set bedtime anchor</p>
                <p style={{fontSize:9.5,color:'#a8a29e',margin:0}}>10:00 pm · protects the nocturnal BP dip</p>
              </div>
              <svg viewBox="0 0 24 24" fill="none" stroke={card.color} strokeWidth="2.5" width="11" height="11" style={{flexShrink:0,opacity:0.4}}><path d="m9 18 6-6-6-6"/></svg>
            </button>
          )}

          {/* Footer row: alternatives + not today */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:8}}>
            {card.options.length > 1 ? (
              <p onClick={()=>openDetail(activeOpt, activeIdx)} style={{fontSize:10.5,fontWeight:500,color:'#c4bfba',margin:0,cursor:'pointer',letterSpacing:'-0.005em'}}>
                + {card.options.length-1} other option{card.options.length>2?'s':''} inside →
              </p>
            ) : <span/>}
            <button onClick={()=>setDismissed(true)} style={{
              padding:'3px 0',background:'transparent',border:'none',
              cursor:'pointer',fontFamily:'inherit',fontSize:10.5,fontWeight:500,
              color:'#c4bfba',letterSpacing:'0.01em',
            }}>
              Not today
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── LEGACY CARD VARIANT (no trigger — kept for non-engine personas) ──────────
  const legacyPrimary = card.options[0];
  const isLegacyCompleted = completedOpts.includes(0);

  return (
    <div style={{background:'#fff',borderRadius:20,border:'1px solid #efefed',overflow:'hidden',boxShadow:'0 2px 8px rgba(0,0,0,0.05)'}}>
      {/* Accent bar */}
      <div style={{height:3,background:`linear-gradient(90deg,${card.color},${card.color}55)`}}/>

      {/* ── Header: pillar label + condition tag + progress tracker ── */}
      <div style={{padding:'11px 13px 0'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:progressDots?5:9,gap:8}}>
          <span style={{fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:card.color}}>{card.pillar}</span>
          {card.conditionTag && <AdjustedTag label={card.conditionTag} note={card.adjustedNote} color={card.conditionTagColor}/>}
        </div>

        {/* Week progress dots */}
        {progressDots && (
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:11}}>
            <div style={{display:'flex',alignItems:'center',gap:7}}>
              <div style={{display:'flex',gap:3,alignItems:'center'}}>
                {Array.from({length: Math.min(progressDots.total, 7)}).map((_,i) => (
                  <div key={i} style={{
                    width: i < progressDots.done ? 16 : 6, height:6, borderRadius:3,
                    background: i < progressDots.done ? card.color : `${card.color}28`,
                    transition:'all 0.25s ease',
                  }}/>
                ))}
              </div>
              <span style={{fontSize:10,fontWeight:600,color:'#a8a29e',whiteSpace:'nowrap'}}>
                {progressDots.done}/{progressDots.total} {progressDots.label}
              </span>
            </div>
            {card.streak && (
              <span style={{display:'inline-flex',alignItems:'center',gap:3,padding:'2px 8px',borderRadius:20,background:`${card.color}14`,color:card.color,fontSize:10,fontWeight:700,whiteSpace:'nowrap',flexShrink:0}}>
                <svg width="8" height="9" viewBox="0 0 8 9" fill={card.color} style={{flexShrink:0}}><path d="M4 0C4 0 5.5 2.2 5.5 3.5C5.5 3.5 6.3 3.1 6.3 3.1C6.3 3.1 8 4.9 7.2 6.7C6.5 8.1 5.3 9 4 9C2.7 9 1.5 8.1 0.8 6.7C0 4.9 1.7 3.1 1.7 3.1C1.7 3.1 2.5 3.5 2.5 3.5C2.5 2.2 4 0 4 0Z"/></svg>
                {card.streak} in a row
              </span>
            )}
          </div>
        )}
      </div>

      {/* ── Main tile area ── */}
      <div style={{padding:'0 13px 13px'}}>

        {/* ── BP LOGGED STATE ── */}
        {showLoggedTile && (
          <div style={{display:'flex',gap:10,alignItems:'flex-start',marginBottom:9,background:'#f0faf4',borderRadius:14,padding:'10px 11px',border:'1.5px solid #4CAF7D33'}}>
            <div style={{width:42,height:42,borderRadius:13,background:'#fff',color:'#4CAF7D',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:'0 2px 6px rgba(76,175,125,0.18)',marginTop:2}}><I.Check/></div>
            <div style={{flex:1,minWidth:0}}>
              <p style={{fontSize:10,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',color:'#4CAF7D',margin:'0 0 2px'}}>Logged today</p>
              <p style={{fontSize:14,fontWeight:800,color:'#1a1a1a',margin:'0 0 3px',letterSpacing:'-0.02em',lineHeight:1.2}}>
                {(bpState && bpState.value) || '122/78'} <span style={{fontSize:10,fontWeight:600,color:'#a8a29e'}}>mmHg</span>
                {bpState && bpState.pulse ? <span style={{fontSize:11,fontWeight:600,color:'#78716c',marginLeft:6}}>· pulse {bpState.pulse}</span> : null}
              </p>
              {noteChips.length > 0 && (
                <div style={{display:'flex',flexWrap:'wrap',gap:4,margin:'0 0 4px'}}>
                  {noteChips.map((id,i)=>(<span key={i} style={{fontSize:10,fontWeight:600,padding:'2px 7px',borderRadius:10,background:'#fdf0f0',color:'#e05c5c',border:'1px solid #e05c5c33'}}>{BP_NOTE_LABEL(id)}</span>))}
                </div>
              )}
              <button onClick={()=>openDetail(legacyPrimary, 0)} style={{padding:0,background:'transparent',border:'none',color:card.color,fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit',display:'inline-flex',alignItems:'center',gap:3}}>
                Log another reading <I.Arrow/>
              </button>
            </div>
          </div>
        )}

        {/* ── BP DISMISSED STATE ── */}
        {!showLoggedTile && showDismissed && (
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:9,background:'#fafaf8',borderRadius:14,padding:'10px 11px',border:'1.5px dashed #d6d3d1'}}>
            <div style={{width:32,height:32,borderRadius:10,background:'#fff',color:'#a8a29e',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,border:'1px solid #efefed'}}><legacyPrimary.IC/></div>
            <div style={{flex:1,minWidth:0}}>
              <p style={{fontSize:12,fontWeight:700,color:'#78716c',margin:0,lineHeight:1.3}}>BP — log later</p>
              <p style={{fontSize:10,color:'#a8a29e',margin:'1px 0 0'}}>Dismissed for now</p>
            </div>
            <button onClick={()=>bpState && bpState.onUndoDismiss && bpState.onUndoDismiss()} style={{padding:'5px 10px',borderRadius:11,background:'transparent',border:`1.5px solid ${card.color}40`,color:card.color,fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>Undo</button>
          </div>
        )}

        {/* ── COMPLETED STATE ── */}
        {!showLoggedTile && !showDismissed && isLegacyCompleted && (
          <div className="fi" style={{position:'relative',display:'flex',gap:10,alignItems:'center',marginBottom:9,background:'#f0faf4',borderRadius:14,padding:'10px 11px',border:'1.5px solid #4CAF7D33',overflow:'visible'}}>
            <div style={{width:42,height:42,borderRadius:13,background:'#fff',color:'#4CAF7D',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:'0 2px 6px rgba(76,175,125,0.18)',position:'relative',zIndex:2}}><I.Check/></div>
            <ConfettiBurst top={21} left={32} scale={1}/>
            <div style={{flex:1,minWidth:0,position:'relative',zIndex:2}}>
              <p style={{fontSize:14,fontWeight:800,color:'#78716c',margin:'0 0 2px',letterSpacing:'-0.02em',lineHeight:1.2,textDecoration:'line-through'}}>{legacyPrimary.label}</p>
              <p style={{fontSize:11,color:'#4CAF7D',fontWeight:700,margin:0}}>Done · arc updated</p>
            </div>
            <button onClick={()=>unmarkDone(0)} style={{padding:'5px 9px',borderRadius:10,background:'transparent',border:'1.5px solid #4CAF7D33',color:'#4CAF7D',fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',position:'relative',zIndex:2}}>Undo</button>
          </div>
        )}

        {/* ── ACTIVE: 3 option rows, primary highlighted ── */}
        {!showLoggedTile && !showDismissed && !isLegacyCompleted && (
          <div>
            {card.options.slice(0,3).map((opt, idx) => {
              const isDone    = completedOpts.includes(idx);
              const isPrimary = idx === 0;
              const effortL   = opt.effort || (opt.detail ? opt.detail.split('·')[0].trim() : null);
              const outcomeL  = opt.outcome || opt.bpImpact || null;
              return (
                <div key={idx} style={{position:'relative',overflow:'visible',marginBottom: isPrimary ? 7 : 5}}>
                  <div onClick={()=>openDetail(opt, idx)} style={{
                    display:'flex',alignItems:'center',gap:10,cursor:'pointer',
                    padding: isPrimary ? '11px 11px' : '8px 10px',
                    borderRadius: isPrimary ? 14 : 12,
                    background: isDone ? '#f0faf4' : isPrimary ? card.bg : '#fafaf9',
                    border: isDone ? '1.5px solid #4CAF7D33' : isPrimary ? `1.5px solid ${card.color}30` : `1px solid ${card.color}14`,
                    transition:'border-color 0.15s,background 0.15s',
                    position:'relative',overflow:'visible',
                  }}>
                    {isDone && <ConfettiBurst top={isPrimary?22:16} left={isPrimary?26:18} scale={isPrimary?1:0.6}/>}
                    <div style={{
                      width: isPrimary ? 40 : 30, height: isPrimary ? 40 : 30,
                      borderRadius: isPrimary ? 12 : 9,
                      background: isDone ? '#fff' : isPrimary ? `linear-gradient(135deg,${card.color}22,${card.color}0a)` : `${card.color}10`,
                      color: isDone ? '#4CAF7D' : card.color,
                      display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
                      boxShadow: isDone ? '0 1px 4px rgba(76,175,125,0.18)' : isPrimary ? `0 2px 8px ${card.color}20` : 'none',
                      position:'relative',zIndex:2,
                    }}>
                      {isDone ? <I.Check/> : <opt.IC/>}
                    </div>
                    <div style={{flex:1,minWidth:0,position:'relative',zIndex:2}}>
                      <p style={{
                        fontSize: isPrimary ? 14 : 12, fontWeight: isPrimary ? 800 : 700,
                        color: isDone ? '#4CAF7D' : '#1a1a1a',
                        textDecoration: isDone ? 'line-through' : 'none',
                        margin:'0 0 3px', letterSpacing:'-0.01em', lineHeight:1.2,
                        overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                      }}>{opt.label}</p>
                      {!isDone && (
                        <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                          {effortL && <span style={{fontSize:9,fontWeight:600,padding:'1.5px 6px',borderRadius:20,background:'rgba(0,0,0,0.06)',color:'#57534e'}}>{effortL}</span>}
                          {outcomeL && <span style={{fontSize:9,fontWeight:700,padding:'1.5px 6px',borderRadius:20,background:`${card.color}14`,color:card.color}}>{outcomeL}</span>}
                        </div>
                      )}
                      {isDone && <p style={{fontSize:10,color:'#4CAF7D',fontWeight:700,margin:'1px 0 0'}}>Done · arc updated</p>}
                    </div>
                    <svg viewBox="0 0 24 24" fill="none" stroke={isDone?'#4CAF7D':card.color} strokeWidth="2.5" width="11" height="11" style={{flexShrink:0,opacity:isDone?0.5:0.3,position:'relative',zIndex:2}}><polyline points="9 18 15 12 9 6"/></svg>

const BP_NOTE_CHIPS = [
  { id:'caffeine', label:'Caffeine'  },

  { id:'exercise', label:'Exercise'  },
  { id:'stressed', label:'Stressed'  },

const BPLogForm = ({
  onSubmit,
  yesterdaySys = 124, yesterdayDia = 82, yesterdayPulse = 66,
  accent = '#e05c5c',
  prefillSys, prefillDia, prefillPulse,
  submitLabel = 'Log it',
  defaultNotesOpen = false,
  compact = false,
}) => {
  const [sys, setSys]     = useState(prefillSys != null ? String(prefillSys) : String(yesterdaySys));
  const [dia, setDia]     = useState(prefillDia != null ? String(prefillDia) : String(yesterdayDia));
  const [pulse, setPulse] = useState(prefillPulse != null ? String(prefillPulse) : String(yesterdayPulse));
  const [notes, setNotes] = useState([]);
  const [notesOpen, setNotesOpen] = useState(defaultNotesOpen);
  const [otherOpen, setOtherOpen] = useState(false);
  const [otherText, setOtherText] = useState('');

  const ready = !!(sys && dia);
  const toggleNote = id => setNotes(arr => arr.includes(id) ? arr.filter(x=>x!==id) : [...arr, id]);
  const buildPayload = (overrides) => {
    const base = {
      sys: parseInt(sys,10), dia: parseInt(dia,10),
      pulse: pulse ? parseInt(pulse,10) : null,
      notes: notes.slice(),
      otherNote: otherText.trim() || null,
    };
    return Object.assign(base, overrides || {});
  };
  const submit = () => {
    if (!ready) return;
    onSubmit && onSubmit(buildPayload());
  };
  const sameAsYesterday = () => {
    onSubmit && onSubmit({
      sys: yesterdaySys, dia: yesterdayDia, pulse: yesterdayPulse,
      notes: [], otherNote: null,
    });
  };

  const decPulse = () => setPulse(p => String(Math.max(30, (parseInt(p,10)||60) - 1)));
  const incPulse = () => setPulse(p => String(Math.min(200, (parseInt(p,10)||60) + 1)));

  const submitFont = compact ? 13 : 14;

      {/* Sys/dia hero */}
      <div style={{display:'flex',alignItems:'flex-end',gap: compact ? 8 : 10}}>
        <NumberPicker label="Systolic"  value={sys} onChange={setSys} color={accent} compact={compact}/>
        <span style={{fontSize: compact ? 26 : 30,color:'#d6d3d1',fontWeight:300,paddingBottom: compact ? 6 : 8}}>/</span>
        <NumberPicker label="Diastolic" value={dia} onChange={setDia} color={accent} compact={compact}/>
      </div>
      {/* Pulse — secondary */}
      <div style={{display:'flex',alignItems:'center',gap:8,padding: compact ? '5px 10px' : '7px 11px',background:'#fff',border:'1.5px solid #efefed',borderRadius:12}}>
        <span style={{fontSize:10,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',color:'#a8a29e'}}>Pulse · bpm</span>
        <div style={{flex:1}}/>
        <button onClick={decPulse} aria-label="Decrease pulse" style={{width: compact ? 22 : 24,height: compact ? 22 : 24,borderRadius:7,background:'#f5f5f4',border:'none',color:'#57534e',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>−</button>
        <input
          type="number" inputMode="numeric" value={pulse}
          onChange={e=>setPulse(e.target.value.replace(/[^0-9]/g,''))}
          aria-label="Pulse"
          style={{width: compact ? 36 : 42,textAlign:'center',fontSize: compact ? 14 : 16,fontWeight:800,color:'#1a1a1a',border:'none',outline:'none',background:'transparent',fontFamily:'inherit',padding:0}}
        />
        <button onClick={incPulse} aria-label="Increase pulse" style={{width: compact ? 22 : 24,height: compact ? 22 : 24,borderRadius:7,background:accent+'1a',border:'none',color:accent,fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>+</button>
      </div>
      {/* Notes — collapsed unless defaultNotesOpen */}
      {!notesOpen ? (
        <button onClick={()=>setNotesOpen(true)} style={{alignSelf:'flex-start',padding:'5px 10px',borderRadius:12,background:'transparent',border:'1.5px dashed #d6d3d1',color:'#78716c',fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>

        <div style={{padding: compact ? '7px 9px' : '10px 11px',background:'#fafaf8',border:'1px solid #efefed',borderRadius:12,display:'flex',flexDirection:'column',gap: compact ? 6 : 8}}>
          {!compact && (
            <p style={{fontSize:9,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',color:'#a8a29e',margin:0}}>Anything affect this reading?</p>
          )}

            {BP_NOTE_CHIPS.map(c => {
              const sel = notes.includes(c.id);
              return (

      )}
      <button onClick={submit} disabled={!ready} style={{width:'100%',padding:submitPad,borderRadius:13,background:ready?`linear-gradient(135deg, ${accent}, ${accent}d0)`:'#e8e5de',color:'#fff',fontSize:submitFont,fontWeight:700,border:'none',cursor:ready?'pointer':'default',fontFamily:'inherit',boxShadow:ready?`0 6px 18px ${accent}33`:'none',transition:'all 0.15s'}}>
        {submitLabel}
      </button>
    </div>
  );
};

// ── CalendarSheet — premium date picker for time-travel ──────────────────────
// Replaces the always-visible HistoryStrip with an on-demand calendar surface.
const DAY_LABELS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTH_LABELS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const formatDateLabel = (d) => `${DAY_LABELS_SHORT[d.getDay()]} · ${MONTH_LABELS_SHORT[d.getMonth()]} ${d.getDate()}`;

const CalendarSheet = ({ today, selectedDate, onClose, onSelect }) => {
  const init = selectedDate || today;
  const [monthInput, setMonthInput] = useState(MONTH_LABELS_SHORT[init.getMonth()]);
  const [dateInput,  setDateInput]  = useState(String(init.getDate()));
  const [timeInput,  setTimeInput]  = useState('07:14 AM');
  const submit = () => {
    const monthIdx = MONTH_LABELS_SHORT.findIndex(m => m.toLowerCase() === (monthInput || '').toLowerCase().slice(0,3));
    const day = parseInt(dateInput, 10);
    if (monthIdx < 0 || isNaN(day)) { onClose(); return; }
    const newDate = new Date(today);
    newDate.setMonth(monthIdx, day);

// PRODUCT RULES baked in:

const AskLemonNutritionSheet = ({ onClose }) => {
  const [draft, setDraft]         = useState('');

  const [stage, setStage]         = useState('opening'); // opening | replied | added

    id:'salmon',
    name:'Baked salmon + wilted spinach',
    cal:430, protein:36, sodium:180,
    why:'Top potassium · lowest sodium · magnesium to support recovery',

  const handleSubmit = (text) => {
    if (!text || !text.trim()) return;
    setUserMsg(text.trim());
    setStage('replied');
    setDraft('');
  };

  const handleAdd = () => { setAddedRecipe(recipe); setStage('added'); };

  return (
    <div className="sheet-in" style={{
      position:'absolute', top:28, left:0, right:0, bottom:0, zIndex:60,
      background:'#fafaf9', display:'flex', flexDirection:'column',

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div style={{flex:1,minWidth:0,display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:30,height:30,borderRadius:'50%',background:'linear-gradient(135deg,#fcd34d,#fbbf24)',display:'flex',alignItems:'center',justifyContent:'center',color:'#1a1a1a',fontWeight:800,fontSize:13,flexShrink:0}}>L</div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontSize:13.5,fontWeight:800,color:'#1a1a1a',margin:0,letterSpacing:'-0.01em'}}>Lemon</p>

      <div className="hide-scrollbar" style={{flex:1,overflowY:'auto',padding:'16px 14px 8px',minHeight:0}}>
        <G_Bubble role="lemon" animate>
          <p style={{margin:0}}>Hi Maya — what are you feeling like today?</p>
        </G_Bubble>

        {(stage === 'replied' || stage === 'added') && userMessage && (
          <>
            <G_Bubble role="user">{userMessage}</G_Bubble>
            <G_Bubble role="lemon" animate>
              <p style={{margin:0}}>Thanks for telling me. Given how the day's been — short sleep last night and you've got about <b>260 mg of sodium left</b> on your cap — I'd lean toward something lighter and potassium-forward tonight.</p>
              <p style={{margin:'6px 0 0'}}>Here's a dinner that fits:</p>
            </G_Bubble>
            <div className="ml-9 fi" style={{marginBottom:10}}>
              <RecipeOptionCard recipe={recipe} top={true} mode="loaded" addedId={addedRecipe?.id} onAdd={handleAdd}/>

        )}

          <G_Bubble role="lemon" animate>
            <p style={{margin:0}}>Added — that brings dinner to <b>{1240 + recipe.sodium} mg sodium</b>, still under cap. The magnesium and potassium should help with how you're feeling.</p>

          </G_Bubble>
        )}
      </div>

      {/* Composer — active, focused. Free text. No chips. */}
      <G_Composer

    let s, d, pulse = null, notes = [];
    if (a && typeof a === 'object') {
      s = a.sys; d = a.dia; pulse = a.pulse || null; notes = a.notes || [];
    } else {
      s = parseInt(a,10) || yesterdaySys;
      d = parseInt(b,10) || yesterdayDia;

    setBpValue(`${s}/${d}`);
    setBpPulse(pulse);
    setBpNotes(notes);
    setBpDelta(s - yesterdaySys);

      {detail && !breathing && (
        <DetailSheet
          option={detail.option} card={detail.card} isSelected={detail.isSelected}
          onClose={closeDetail}
          onSelect={()=>{ detail.onSelect && detail.onSelect(); }}
          onStartBreathing={()=>{ setBreathing({ option:detail.option, card:detail.card }); setDetail(null); }}
          onActivityDone={onActivityDone}
          onComplete={()=>{ detail.onComplete && detail.onComplete(); }}

          onBPSubmit={(data)=>handleLogBP(data)}

      )}

      {breathing && (
        <BreathingSession
          option={breathing.option} card={breathing.card}
          onClose={()=>setBreathing(null)}
          onDone={()=>{ setBreathing(null); onActivityDone(); }}
        />
      )}

      {/* BP Log bottom sheet — opens from tile-variant CTA */}
      {logSheetOpen && (
        <BPLogSheet
          onLog={handleLogBP}
          onClose={()=>setLogSheetOpen(false)}
          yesterdaySys={yesterdaySys} yesterdayDia={yesterdayDia}
          accent={p.widgets && p.widgets.find(w=>w.id==='bp')?.color || '#3d9e9e'}
        />
      )}

      {/* Calendar bottom sheet — date dropdown for time travel (compactHeader variant) */}
      {dateSheet && (
        <CalendarSheet
          today={TODAY}
          selectedDate={selectedDate}
          onClose={()=>setDateSheet(false)}
          onSelect={(d)=>{ setSelectedDate(d); setAnimK(k=>k+1); }}
        />
      )}
    </>
  );
};

  const [breathOpen, setBreathOpen] = useState(false);
  const brRef = useRef(null);
  const PHASES = ['Inhale','Hold','Exhale','Hold'];
  const PHASE_DUR = 4, TOTAL_CYCLES = 5;
  const [brState, setBrState] = useState({ phaseIdx:0, count:PHASE_DUR, cycle:1 });

  const card = p.cards.find(c => c.key === openKey) || null;
  const sheetOpen = !!openKey;

  const startBreath = () => {
    setBrState({ phaseIdx:0, count:PHASE_DUR, cycle:1 });
    setBreathOpen(true);
    brRef.current = setInterval(() => {
      setBrState(s => {
        let { phaseIdx, count, cycle } = s;
        count--;
        if (count < 1) {
          phaseIdx = (phaseIdx + 1) % PHASES.length;
          if (phaseIdx === 0) cycle++;
          if (cycle > TOTAL_CYCLES) { clearInterval(brRef.current); setBreathOpen(false); return s; }
          count = PHASE_DUR;
        }
        return { phaseIdx, count, cycle };
      });
    }, 1000);

// Hero: goal-centric gradient card with BP spark, completion ring, streak.
// Cards: pillar icon + title + effort/outcome chips. No trigger line on face.
// Focus Mode: isFocusMode prop collapses to single top-priority card.

const EngineStdViewV2 = ({ persona, onSwitchPersona }) => {
  const p = persona;
  const [openKey, setOpenKey]     = useState(null);
  const [openAlt, setOpenAlt]     = useState(null);
  const [ntOpen, setNtOpen]       = useState(false);
  const [done, setDone]           = useState(new Set());
  const [breathOpen, setBreathOpen] = useState(false);
  const [challengeSheet, setChallengeSheet] = useState(null);
  const [todayChallengeIds, setTodayChallengeIds] = useState(new Set(['challenge-core']));
  const [activePillar, setActivePillar] = useState('Movement');
  const brRef = useRef(null);
  const PHASES = ['Inhale','Hold','Exhale','Hold'];
  const PHASE_DUR = 4, TOTAL_CYCLES = 5;
  const [brState, setBrState] = useState({ phaseIdx:0, count:PHASE_DUR, cycle:1 });

  const card = p.cards.find(c => c.key === openKey) || null;

  const startBreath = () => {
    setBrState({ phaseIdx:0, count:PHASE_DUR, cycle:1 });
    setBreathOpen(true);
    brRef.current = setInterval(() => {
      setBrState(s => {
        let { phaseIdx, count, cycle } = s;
        count--;
        if (count < 1) {
          phaseIdx = (phaseIdx + 1) % PHASES.length;
          if (phaseIdx === 0) cycle++;
          if (cycle > TOTAL_CYCLES) { clearInterval(brRef.current); setBreathOpen(false); return s; }
          count = PHASE_DUR;
        }
        return { phaseIdx, count, cycle };
      });
    }, 1000);
  };
  const stopBreath = () => { clearInterval(brRef.current); setBreathOpen(false); };
  useEffect(() => () => clearInterval(brRef.current), []);

  const markDone = () => { if (!openKey) return; setDone(d => new Set([...d, openKey])); setOpenKey(null); };
  const skipCard  = (reason) => {
    if (reason === 'already-did') markDone();
    setNtOpen(false);
    if (openKey && reason !== 'already-did') setOpenKey(null);

const EngineStdView = ({ persona }) => {
  const p = persona;
  const [openKey, setOpenKey] = useState(null);
  const [ntOpen, setNtOpen]   = useState(false);
  const [done, setDone]       = useState(new Set());
  const [breathOpen, setBreathOpen] = useState(false);
  const brRef = useRef(null);
  const PHASES = ['Inhale','Hold','Exhale','Hold'];
  const PHASE_DUR = 4, TOTAL_CYCLES = 5;
  const [brState, setBrState] = useState({ phaseIdx:0, count:PHASE_DUR, cycle:1 });

  const card = p.cards.find(c => c.key === openKey) || null;

  const startBreath = () => {
    setBrState({ phaseIdx:0, count:PHASE_DUR, cycle:1 });
    setBreathOpen(true);
    brRef.current = setInterval(() => {
      setBrState(s => {
        let { phaseIdx, count, cycle } = s;
        count--;
        if (count < 1) {
          phaseIdx = (phaseIdx + 1) % PHASES.length;
          if (phaseIdx === 0) cycle++;
          if (cycle > TOTAL_CYCLES) { clearInterval(brRef.current); setBreathOpen(false); return s; }
          count = PHASE_DUR;
        }
        return { phaseIdx, count, cycle };
      });
    }, 1000);
  };

  const stopBreath = () => { clearInterval(brRef.current); setBreathOpen(false); };
  useEffect(() => () => clearInterval(brRef.current), []);

  const markDone = () => {
    if (!openKey) return;
    setDone(d => new Set([...d, openKey]));
    setOpenKey(null);
  };

  const skipCard = (reason) => {
    if (reason === 'already-did') markDone();
    setNtOpen(false);
    if (openKey && reason !== 'already-did') setOpenKey(null);

              Got it. What's your reading?
            </G_Bubble>
            {stage === 'bp-input' && (
              <H_BPInputCard
                onSubmit={handleBPSubmit}
                yesterdaySys={yesterdaySys} yesterdayDia={yesterdayDia} yesterdayPulse={yesterdayPulse}
              />
            )}
          </>
        )}

        {(stage === 'bp-card' || stage === 'bp-logged') && (
          <>
            <G_Bubble role="user">
              {sys}/{dia}{pulse ? ` · pulse ${pulse}` : ''}
            </G_Bubble>
            <H_BPCard
              sys={sys} dia={dia} pulse={pulse} notes={notes} deltaSys={deltaSys}
              confirmed={confirmed}
              onConfirm={() => { setConfirmed(true); setStage('bp-logged'); }}
              onEdit={() => setStage('bp-input')}
            />
          </>
        )}

        {stage === 'bp-logged' && (
          <>
            <G_Bubble role="lemon" animate>
              That's your 5th morning below 125. <b>7-day average: 122/78</b> — below your 130/80 goal. The trend is real — see it on Stats.
            </G_Bubble>
            <div className="ml-9 mt-2 fi">
              <div className="bg-warm-100 border border-warm-300 rounded-xl px-3 py-2 text-[11px] text-stone-700 font-medium inline-flex items-center gap-1.5">
                <span className="w-1.5 h-1.5 rounded-full bg-red-500 pulse-dot"/>
                New entry in Journal — tap menu to view
              </div>
            </div>
          </>
        )}

        {/* ─── WORKOUT flow ──────────────────────────────────────────── */}
        {(stage === 'workout-ask' || stage === 'workout-input' || stage === 'workout-card' || stage === 'workout-confirmed') && (
          <>
            <G_Bubble role="user">
              <span className="flex items-center gap-1.5"><span className="opacity-70">{G_I.flame}</span> Log a workout</span>
            </G_Bubble>
            <G_Bubble role="lemon" animate>
              Got it. What did you do?
            </G_Bubble>
          </>
        )}

        {(stage === 'workout-card' || stage === 'workout-confirmed' || stage === 'workout-input') && workoutText && (() => {
          const cal = estimateCalories(workoutText);
          const lower = workoutText.toLowerCase();
          const isLift  = lower.includes('lift') || lower.includes('strength') || lower.includes('weights');
          const isYoga  = lower.includes('yoga') || lower.includes('stretch');
          const insight = isLift  ? 'Low-Valsalva lifting keeps your BP safer — well-chosen.'
                        : isYoga  ? 'Calming movement helps your nocturnal BP dip kick in tonight.'
                        : 'That makes 4 sessions this week — you\'re holding the Zone 2 streak.';
          return (
            <>
              <G_Bubble role="user">{workoutText}</G_Bubble>
              <G_Bubble role="lemon" animate>
                <p className="m-0">Got it — that's about <b>{cal} calories</b> at a moderate effort.</p>
                <p className="m-0 mt-1.5">{insight}</p>
              </G_Bubble>
              {!workoutConfirmed ? (
                <div className="ml-9 mt-1 mb-3 flex gap-2 fi">
                  <button onClick={() => { setWorkoutText(''); setStage('workout-ask'); }} className="px-3.5 py-1.5 rounded-full border border-stone-200 text-stone-600 text-xs font-semibold cursor-pointer" style={{background:'#fff',fontFamily:'inherit'}}>Edit</button>
                  <button onClick={() => { setWorkoutConfirmed(true); setStage('workout-confirmed'); }} className="px-3.5 py-1.5 rounded-full bg-stone-800 text-white text-xs font-bold inline-flex items-center justify-center gap-1 cursor-pointer" style={{border:'none',fontFamily:'inherit'}}>{G_I.check} Looks right</button>
                </div>
              ) : (
                <div className="ml-9 mb-3 inline-flex items-center gap-1.5 text-xs font-semibold text-sage-700 fi">
                  <span className="text-sage-600">{G_I.check}</span>
                  Logged to your journal
                </div>
              )}
              {stage === 'workout-confirmed' && (
                <G_Bubble role="lemon" animate>
                  Movement logged. Three Zone 2 sessions this week — your BP is responding.
                </G_Bubble>
              )}
            </>
          );
        })()}

        {/* ─── MEAL flow ─────────────────────────────────────────────── */}
        {(stage === 'meal-ask' || stage === 'meal-card' || stage === 'meal-logged') && (
          <>
            <G_Bubble role="user">
              <span className="flex items-center gap-1.5"><span className="opacity-70">{G_I.meal}</span> Log a meal</span>
            </G_Bubble>
            <G_Bubble role="lemon" animate>
              Sure — what did you eat?
            </G_Bubble>
          </>
        )}

        {(stage === 'meal-card' || stage === 'meal-logged') && mealText && (() => {
          // Heuristic analysis: if mealText mentions known high-sodium foods, flag it; else if low-sodium DASH foods, flag dash.
          const t = mealText.toLowerCase();
          const isHighNa = /caesar|deli|soup|pizza|fries|burger|takeout|fried|soy|teriyaki|bacon|sausage|cheese/.test(t);
          const isDash   = /salmon|spinach|kale|broccoli|berries|oats|salad(?! caesar)|tofu|lentil(?! soup)/.test(t);
          // Mock numbers — same range as the existing suggestions, varies with classification
          const cal    = isHighNa ? 480 : isDash ? 430 : 380;
          const protein= isHighNa ? '32g' : isDash ? '34g' : '22g';
          const sodium = isHighNa ? 720 : isDash ? 180 : 320;
          const dailySodium = 1240 + sodium;
          return (
            <>
              <G_Bubble role="user">{mealText}</G_Bubble>
              <G_Bubble role="lemon" animate>
                <p className="m-0">Got it. About <b>{cal} calories</b>, <b>{protein} protein</b>, and <b>{sodium}mg sodium</b>.</p>
                <p className="m-0 mt-1.5">
                  {isHighNa
                    ? <>That's roughly <b>{Math.round(sodium/1500*100)}% of your DASH sodium cap</b> in one meal — worth balancing tonight with something lower-salt.</>
                    : isDash
                    ? <>Solid DASH-aligned choice — exactly what your BP wants.</>
                    : <>Lands easily within your day's targets.</>}
                </p>
              </G_Bubble>
              {!mealConfirmed ? (
                <div className="ml-9 mt-1 mb-3 flex gap-2 fi">
                  <button onClick={() => { setMealText(''); setStage('meal-ask'); }} className="px-3.5 py-1.5 rounded-full border border-stone-200 text-stone-600 text-xs font-semibold cursor-pointer" style={{background:'#fff',fontFamily:'inherit'}}>Edit</button>
                  <button onClick={() => { setMealConfirmed(true); setStage('meal-logged'); }} className="px-3.5 py-1.5 rounded-full bg-stone-800 text-white text-xs font-bold inline-flex items-center justify-center gap-1 cursor-pointer" style={{border:'none',fontFamily:'inherit'}}>{G_I.check} Looks right</button>
                </div>
              ) : (
                <div className="ml-9 mb-3 inline-flex items-center gap-1.5 text-xs font-semibold text-sage-700 fi">
                  <span className="text-sage-600">{G_I.check}</span>
                  Logged to your journal
                </div>
              )}
              {stage === 'meal-logged' && (
                <G_Bubble role="lemon" animate>
                  Sodium today: <b>{dailySodium} of 1,500mg</b>. {dailySodium < 1500 ? 'You\'re still on track.' : 'A bit over — keep dinner light on salt.'}
                </G_Bubble>
              )}
            </>
          );
        })()}

        {/* ─── PREFERENCE flow ───────────────────────────────────────── */}
        {(stage === 'pref-ask' || stage === 'pref-card' || stage === 'pref-logged') && (
          <>
            <G_Bubble role="user">
              <span className="flex items-center gap-1.5"><span className="opacity-70">{H_I.prefs}</span> Log a preference</span>
            </G_Bubble>
            <G_Bubble role="lemon" animate>
              Of course — what would you like me to remember?
            </G_Bubble>
          </>
        )}

        {(stage === 'pref-card' || stage === 'pref-logged') && prefText && (() => {
          const t = prefText.toLowerCase();
          const isDietary  = /eat|food|meal|fish|dairy|sodium|sugar|cook|vegetar|vegan|salt/.test(t);
          const isActivity = /walk|run|workout|exercise|gym|cycle|yoga|stretch|impact/.test(t);
          const isReminder = /remind|notif|nudge|morning|evening|weekly|daily|alarm|sunday/.test(t);
          const followup = isDietary  ? 'Future meal picks will reflect this.'
                         : isActivity ? 'Movement recommendations will steer toward this.'
                         : isReminder ? 'Your notification cadence updates from tomorrow.'
                         : 'I\'ll factor it into what I suggest going forward.';
          return (
            <>
              <G_Bubble role="user">{prefText}</G_Bubble>
              <G_Bubble role="lemon" animate>
                <p className="m-0">Got it. I'll keep this in mind when I suggest things — meals, workouts, and check-in timing all adapt.</p>
                <p className="m-0 mt-1.5">{followup}</p>
              </G_Bubble>
              {!prefConfirmed ? (
                <div className="ml-9 mt-1 mb-3 flex gap-2 fi">
                  <button onClick={() => { setPrefText(''); setStage('pref-ask'); }} className="px-3.5 py-1.5 rounded-full border border-stone-200 text-stone-600 text-xs font-semibold cursor-pointer" style={{background:'#fff',fontFamily:'inherit'}}>Edit</button>
                  <button onClick={() => { setPrefConfirmed(true); setStage('pref-logged'); }} className="px-3.5 py-1.5 rounded-full bg-stone-800 text-white text-xs font-bold inline-flex items-center justify-center gap-1 cursor-pointer" style={{border:'none',fontFamily:'inherit'}}>{G_I.check} Looks right</button>
                </div>
              ) : (
                <div className="ml-9 mb-3 inline-flex items-center gap-1.5 text-xs font-semibold text-sage-700 fi">
                  <span className="text-sage-600">{G_I.check}</span>
                  Saved to your profile
                </div>
              )}
              {stage === 'pref-logged' && (
                <G_Bubble role="lemon" animate>
                  Saved. The plan will reflect this from now on.
                </G_Bubble>
              )}
            </>
          );
        })()}
      </div>

      <G_Composer
        value={composerText}
        onChange={setComposerText}
        onSubmit={handleComposerSubmit}
        placeholder={composerPlaceholder}
        disabled={!composerActive}
      />

      {drawerOpen && <G_Drawer onClose={() => setDrawerOpen(false)}/>}
    </div>
  );
};
