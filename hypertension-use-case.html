const HomeView = ({ persona, onOpenReport, view: viewProp, setView: setViewProp, chatInitialStage = 'main', chatInitialActivity, onOpenChat, onSwitchPersona }) => {
  const p = persona;
  // For v5 (router strip variant), homepage hosts a tab switch between home and chat.
  // View state is lifted to App when v5 props are passed (so the lock-screen notification can deep-link).
  const [localView, setLocalView]       = useState('home');
  const view    = viewProp !== undefined ? viewProp : localView;
  const setView = setViewProp || setLocalView;
  const [animK, setAnimK]               = useState(0);
  const [selectedDay, setSelectedDay]   = useState('fri');
  const [detail, setDetail]             = useState(null);
  const [skip, setSkip]                 = useState(null); // {card, onSkip}
  const [breathing, setBreathing]       = useState(null);
  const [doneSessions, setDoneSessions] = useState(0);
  const [bannerDismissed, setBannerDismissed] = useState(false);
  // BP logging state — drives Options 4 (tile) and 5 (ask) and metric empty states.
  // Variants start unlogged UNLESS the persona explicitly sets bpInitiallyLogged:true
  // (Homepage MVP wants the BP tile to render with its default value, not an empty log-prompt).
  const [bpLogged, setBpLogged]   = useState(p.bpInitiallyLogged === true ? true : (!p.bpLogVariant && !p.routerStrip));
  const [bpValue, setBpValue]     = useState(null);
  const [bpPulse, setBpPulse]     = useState(null);
  const [bpNotes, setBpNotes]     = useState([]);
  const [bpDelta, setBpDelta]     = useState(0);
  const [logSheetOpen, setLogSheetOpen] = useState(false);
  const [bpJustLogged, setBpJustLogged] = useState(false);
  const [bpDismissed, setBpDismissed] = useState(false);
  const [bpAskDismissed, setBpAskDismissed] = useState(false);
  // Compact header — date dropdown + calendar sheet
  const TODAY = useMemo(() => new Date(2026, 4, 7), []); // May 7, 2026 — mockup "Sunday Week 4" date
  const [selectedDate, setSelectedDate] = useState(TODAY);
  const [dateSheet, setDateSheet]       = useState(false);
  const isToday = selectedDate.toDateString() === TODAY.toDateString();
  const yesterdaySys = 124, yesterdayDia = 82, yesterdayPulse = 66;
  const handleLogBP = (a, b) => {
    let s, d, pulse = null, notes = [];
    if (a && typeof a === 'object') {
      s = a.sys; d = a.dia; pulse = a.pulse || null; notes = a.notes || [];
    } else {
      s = parseInt(a,10) || yesterdaySys;
      d = parseInt(b,10) || yesterdayDia;
    }
    setBpValue(`${s}/${d}`);
    setBpPulse(pulse);
    setBpNotes(notes);
    setBpDelta(s - yesterdaySys);
    setBpLogged(true);
    setBpDismissed(false);
    setBpJustLogged(true);
    setLogSheetOpen(false);
    setTimeout(() => setBpJustLogged(false), 2400);
  };
  const bpOverride = bpLogged && bpValue ? {
    value: bpValue,
    trend: bpDelta < 0 ? `↓ ${Math.abs(bpDelta)} systolic` : bpDelta > 0 ? `↑ ${bpDelta} systolic` : 'same as yesterday',
  } : null;
  const selectDay = key => { setSelectedDay(key); setAnimK(k=>k+1); };
  const openDetail  = data => setDetail(data);
  const closeDetail = () => setDetail(null);
  const onActivityDone = () => setDoneSessions(s=>s+1);

  // v5 chat view — render ChatLoggingView in place of home content
  if (p.routerStrip && view === 'chat') {
    return (
      <>
        <ChatLoggingView initialStage={chatInitialStage} initialActivity={chatInitialActivity}/>
        <LemonNav active="ask" onSelect={(id)=>{
          if (id==='home') setView('home');
          if (id==='meal' && onSwitchPersona)      onSwitchPersona('mayaMealPrep');
          if (id==='stats' && onSwitchPersona)     onSwitchPersona('mayaStats');
          if (id==='community' && onSwitchPersona) onSwitchPersona('mayaCommunity');
        }}/>
      </>
    );
  }

  return (
    <>
      <div className="screen">
        <div style={{background:'linear-gradient(160deg,#fffcf5 0%,#eef5ff 100%)',padding:'12px 18px 18px',position:'relative',overflow:'hidden',flexShrink:0,borderBottom:'1px solid #e8e5de'}}>
          <div style={{position:'absolute',top:-40,right:-40,width:200,height:200,background:`radial-gradient(circle,${p.goalColor}28 0%,transparent 65%)`,borderRadius:'50%',pointerEvents:'none'}}/>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            {p.compactHeader ? (
              <button onClick={()=>setDateSheet(true)} style={{display:'inline-flex',alignItems:'center',gap:5,background:'transparent',border:'none',padding:0,cursor:'pointer',fontFamily:'inherit'}}>
                <span style={{fontSize:13,fontWeight:700,color:'#3a3a38',letterSpacing:'-0.01em'}}>{formatDateLabel(selectedDate)}{isToday ? ' · today' : ''}</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" width="11" height="11" style={{color:'#a8a29e'}}><polyline points="6 9 12 15 18 9"/></svg>
              </button>
            ) : (
              <span className="lemon-text" style={{fontWeight:800,fontSize:20,letterSpacing:'-0.02em'}}>lemon</span>
            )}
            <div style={{width:28,height:28,borderRadius:'50%',background:p.avatarGrad,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'#fff'}}>{p.initial}</div>
          </div>
          <div style={{width:'100%'}}>
            <p style={{fontSize:13,fontWeight:600,color:'#3a3a38',margin:'0 0 6px',letterSpacing:'-0.01em'}}>{p.greeting}</p>
            <div style={{display:'inline-flex',alignItems:'center',gap:6,marginBottom:10,flexWrap:'wrap'}}>
              <div style={{display:'inline-flex',alignItems:'center',gap:5,background:p.goalColor+'15',borderRadius:20,padding:'3px 9px'}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:p.goalColor}}/><span style={{fontSize:11,fontWeight:700,color:p.goalColor}}>{p.goal}</span>
              </div>
              {p.condition && (
                <div style={{display:'inline-flex',alignItems:'center',gap:5,background:p.conditionBg,borderRadius:20,padding:'3px 9px',border:`1px solid ${p.conditionColor}28`}}>
                  <div style={{width:6,height:6,borderRadius:'50%',background:p.conditionColor}}/><span style={{fontSize:11,fontWeight:700,color:p.conditionColor}}>{p.condition}</span>
                </div>
              )}
            </div>
            {p.isWorking && <p style={{fontSize:11.5,color:'#78716c',fontWeight:500,margin:'0 0 10px',lineHeight:1.4,letterSpacing:'-0.005em',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.isWorking}</p>}
            <MetricWidgets
              initialWidgets={p.widgets.map(w => {
                if (w.id !== 'actions') return w;
                const base = parseInt(w.value, 10) || 0;
                const val = base + doneSessions;
                return {...w, value: String(val), sub: `of ${Math.max(val, 4)} today`};
              })}
              extraMetrics={[
                { id:'steps',      label:'Steps',         value:'9,350',  sub:'today',       trend:'Steady',   color:'#3d9e9e' },
                { id:'standing',   label:'Standing',      value:'4.1',    sub:'hrs · today', trend:'On track', color:'#778a62' },
                { id:'activeCal',  label:'Active cal',    value:'410',    sub:'kcal · today',trend:'Monitor',  color:'#c9a227' },
                { id:'restingCal', label:'Resting cal',   value:'412',    sub:'kcal · today',trend:'Steady',   color:'#94a47f' },
                { id:'totalSleep', label:'Total sleep',   value:'7h 24m', sub:'last night',  trend:'Steady',   color:'#5b7fa6' },
                { id:'rem',        label:'REM sleep',     value:'1h 28m', sub:'last night',  trend:'On track', color:'#5b7fa6' },
                { id:'deep',       label:'Deep sleep',    value:'1h 12m', sub:'last night',  trend:'Good',     color:'#5b7fa6' },
                { id:'awake',      label:'Awake time',    value:'12',     sub:'min · night', trend:'Monitor',  color:'#5b7fa6' },
                { id:'hrv',        label:'HRV',           value:'44',     sub:'ms · today',  trend:'Steady',   color:'#8b6daa' },
                { id:'rhr',        label:'Resting HR',    value:'58',     sub:'bpm · today', trend:'On track', color:'#8b6daa' },
                { id:'workout',    label:'Workout',       value:'30',     sub:'min · today', trend:'Monitor',  color:'#778a62' },
              ]}
              bpLogPrompt={p.bpLogVariant === 'tile' && !bpLogged}
              onBPLog={() => setLogSheetOpen(true)}
              bpOverride={bpOverride}
              bpJustLogged={bpJustLogged}
              metricsEmpty={p.routerStrip && !bpLogged}
              onMetricLog={(id)=>onOpenChat && onOpenChat(id === 'bp' ? 'bp-input' : 'main')}
            />
          </div>
        </div>

        <div style={{padding:'12px 13px 28px',display:'flex',flexDirection:'column',gap:9}} key={animK}>
          {/* Weekly report HERO — promoted variant. Compact, single-line title + tap-through. */}
          {p.weeklyReportPromoted && !bannerDismissed && onOpenReport && (
            <div onClick={onOpenReport} className="su" style={{
              background:'linear-gradient(135deg, #5d6e4d 0%, #4a5a3c 100%)',
              borderRadius:14, padding:'9px 11px 9px',
              boxShadow:'0 6px 16px rgba(74,90,60,0.22)',
              color:'#fff', position:'relative', overflow:'hidden', cursor:'pointer',
              display:'flex', alignItems:'center', gap:10,
            }}>
              <div style={{position:'absolute',top:-22,right:-22,width:78,height:78,background:'rgba(255,255,255,0.06)',borderRadius:'50%',pointerEvents:'none'}}/>
              <div style={{width:32,height:32,borderRadius:9,background:'rgba(255,255,255,0.16)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,position:'relative'}}><I.Document/></div>
              <div style={{flex:1,minWidth:0,position:'relative',paddingRight:18}}>
                <p style={{fontSize:8.5,fontWeight:700,letterSpacing:'0.09em',textTransform:'uppercase',color:'rgba(255,255,255,0.72)',margin:'0 0 1px'}}>Sunday · Week 4 in review</p>
                <p style={{fontSize:12.5,fontWeight:800,color:'#fff',margin:'0 0 2px',letterSpacing:'-0.005em',lineHeight:1.25}}>Three Zone 2 walks cut systolic 4 points.</p>
                <p style={{fontSize:10,color:'rgba(255,255,255,0.78)',margin:0,lineHeight:1.4}}>7-day avg <b style={{color:'#fff'}}>122/78</b> · below 130/80 goal</p>
              </div>
              <div style={{position:'relative',color:'rgba(255,255,255,0.85)',flexShrink:0}}><I.Forward/></div>
              <button onClick={(e)=>{ e.stopPropagation(); setBannerDismissed(true); }} aria-label="Dismiss" style={{
                position:'absolute', top:6, right:6,
                width:18, height:18, borderRadius:'50%',
                background:'rgba(255,255,255,0.22)', border:'none', color:'#fff',
                cursor:'pointer', padding:0, display:'flex', alignItems:'center', justifyContent:'center',
              }}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" width="9" height="9"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
              </button>
            </div>
          )}
          {/* Lemon asks (inline conversational BP prompt) — daily ritual */}
          {p.bpLogVariant === 'ask' && !bpLogged && !bpAskDismissed && (
            <LemonAsksBP
              onLog={handleLogBP}
              yesterdaySys={yesterdaySys} yesterdayDia={yesterdayDia} yesterdayPulse={yesterdayPulse}
              accent={p.widgets && p.widgets.find(w=>w.id==='bp')?.color || '#3d9e9e'}
              onDismiss={()=>setBpAskDismissed(true)}
            />
          )}
          {p.bpLogVariant === 'ask' && bpLogged && bpValue && (
            <BPConfirmationLine value={bpValue} deltaSys={bpDelta}/>
          )}
          {p.cards.map((card,i)=>(
            <div key={i} className={`su${i}`}><RecCard card={card} onDetail={openDetail} onActivityDone={onActivityDone} progress={p.pillars ? p.pillars[card.pillar.toLowerCase()] || null : null} bpState={{ logged: bpLogged && !!bpValue, value: bpValue, pulse: bpPulse, notes: bpNotes, dismissed: bpDismissed, onDismiss: ()=>setBpDismissed(true), onUndoDismiss: ()=>setBpDismissed(false) }} onLogWorkout={(opt)=>onOpenChat && onOpenChat('workout-input', opt ? {label:opt.label, detail:opt.detail} : null)} showLogOwn={!p.hideLogOwn} onSkipOpen={(card, onSkip)=>setSkip({card, onSkip})}/></div>
          ))}
        </div>
      </div>

      <LemonNav active="home" onSelect={(id)=>{
        if (id==='ask' && p.routerStrip)         setView('chat');
        if (id==='meal' && onSwitchPersona)      onSwitchPersona('mayaMealPrep');
        if (id==='stats' && onSwitchPersona)     onSwitchPersona('mayaStats');
        if (id==='community' && onSwitchPersona) onSwitchPersona('mayaCommunity');
      }}/>

      {skip && (
        <SkipSheet card={skip.card} onClose={()=>setSkip(null)} onSkip={(r)=>{ skip.onSkip(r); setSkip(null); }}/>
      )}

      {detail && !breathing && (
        <DetailSheet
          option={detail.option} card={detail.card} isSelected={detail.isSelected}
          onClose={closeDetail}
          onSelect={()=>{ detail.onSelect && detail.onSelect(); }}
          onStartBreathing={()=>{ setBreathing({ option:detail.option, card:detail.card }); setDetail(null); }}
          onActivityDone={onActivityDone}
          onComplete={()=>{ detail.onComplete && detail.onComplete(); }}
          onLogActivity={()=>{ detail.onLogActivity && detail.onLogActivity(); }}
          onBPSubmit={(data)=>handleLogBP(data)}
          bpYesterday={{sys:yesterdaySys, dia:yesterdayDia, pulse:yesterdayPulse}}
        />
      )}

      {breathing && (
        <BreathingSession
          option={breathing.option} card={breathing.card}
          onClose={()=>setBreathing(null)}
          onDone={()=>{ setBreathing(null); onActivityDone(); }}
        />
      )}

      {/* BP Log bottom sheet — opens from tile-variant CTA */}
      {logSheetOpen && (
        <BPLogSheet
          onLog={handleLogBP}
          onClose={()=>setLogSheetOpen(false)}
          yesterdaySys={yesterdaySys} yesterdayDia={yesterdayDia}
          accent={p.widgets && p.widgets.find(w=>w.id==='bp')?.color || '#3d9e9e'}
        />
      )}

      {/* Calendar bottom sheet — date dropdown for time travel (compactHeader variant) */}
      {dateSheet && (
        <CalendarSheet
          today={TODAY}
          selectedDate={selectedDate}
          onClose={()=>setDateSheet(false)}
          onSelect={(d)=>{ setSelectedDate(d); setAnimK(k=>k+1); }}
        />
      )}
    </>
  );
};

const EngineStdViewV3 = ({ persona, onSwitchPersona }) => {
  const p = persona;
  const [openKey, setOpenKey] = useState(null);
  const [openAlt, setOpenAlt] = useState(null);
  const [ntOpen, setNtOpen]   = useState(false);
  const [done, setDone]       = useState(new Set());
  const [breathOpen, setBreathOpen] = useState(false);
  const brRef = useRef(null);
  const PHASES = ['Inhale','Hold','Exhale','Hold'];
  const PHASE_DUR = 4, TOTAL_CYCLES = 5;
  const [brState, setBrState] = useState({ phaseIdx:0, count:PHASE_DUR, cycle:1 });

  const card = p.cards.find(c => c.key === openKey) || null;
  const sheetOpen = !!openKey;

  const startBreath = () => {
    setBrState({ phaseIdx:0, count:PHASE_DUR, cycle:1 });
    setBreathOpen(true);
    brRef.current = setInterval(() => {
      setBrState(s => {
        let { phaseIdx, count, cycle } = s;
        count--;
        if (count < 1) {
          phaseIdx = (phaseIdx + 1) % PHASES.length;
          if (phaseIdx === 0) cycle++;
          if (cycle > TOTAL_CYCLES) { clearInterval(brRef.current); setBreathOpen(false); return s; }
          count = PHASE_DUR;
        }
        return { phaseIdx, count, cycle };
      });

// Hero: goal-centric gradient card with BP spark, completion ring, streak.
// Cards: pillar icon + title + effort/outcome chips. No trigger line on face.
// Focus Mode: isFocusMode prop collapses to single top-priority card.
// ─────────────────────────────────────────────────────────────────────────────
const EngineStdViewV2 = ({ persona, onSwitchPersona, onOpenChat }) => {
  const p = persona;
  const [openKey, setOpenKey]     = useState(null);
  const [openAlt, setOpenAlt]     = useState(null);
  const [ntOpen, setNtOpen]       = useState(false);
  const [done, setDone]           = useState(new Set());
  const [breathOpen, setBreathOpen] = useState(false);
  const cm = p.challengeMode || null;
  const [challengeSheet, setChallengeSheet] = useState(
    cm === 'reactions' ? (p.challengeCards && p.challengeCards[0]) || null :
    cm === '1v1' ? (p.challengeCards && p.challengeCards.find(c => c.is1v1)) || null :
    cm === 'private3' ? (p.challengeCards && p.challengeCards.find(c => c.id==='challenge-private3')) || null :
    null
  );
  const [day5done, setDay5done] = useState(false);
  const [todayChallengeIds, setTodayChallengeIds] = useState(new Set(['challenge-core','challenge-boost']));
  const [reacted, setReacted] = useState(new Set());
  const toggleReact = (id) => setReacted(s => { const n = new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });
  const [toastVisible, setToastVisible] = useState(cm === 'milestone' || cm === 'finalStandings');
  const [shareOpen, setShareOpen] = useState(false);
  const [nextChalOpen, setNextChalOpen] = useState(false);
  const [todaySessionDone, setTodaySessionDone] = useState(p.boostState === 'used');
  // Boost Day count-up — animates 0 -> +2 (not +1) when the boosted session is completed live.
  const [boostCount, setBoostCount] = useState(p.boostState === 'used' ? 2 : 0);
  const boostRef = useRef(null);
  const completeBoostedSession = () => {
    setTodaySessionDone(true);
    setBoostCount(0);
    let n = 0;
    boostRef.current = setInterval(() => {
      n += 1;
      setBoostCount(n);
      if (n >= 2) clearInterval(boostRef.current);
    }, 320);
  };
  useEffect(() => () => clearInterval(boostRef.current), []);
  const [notifDismissed, setNotifDismissed] = useState(false);
  const [activePillar, setActivePillar] = useState('Movement');

  const NOTIF_DATA = {
    day1:        { title:"You're in. Day 1 done.", body:"Most people quit before they start. Steven's already at Day 2.", cta:'See leaderboard' },
    streak3:     { title:"3 days straight. Habit territory.", body:"Research says day 3 is where behavior starts to stick.", cta:'See your progress' },
    midpoint:    { title:"Halfway. You're #2 of 8.", body:"One session separates you from #1.", cta:'Open challenge' },
    rankChange:  { title:"You just passed Alex. You're #3.", body:"Sarah is 1 session ahead. Keep going.", cta:'See board' },
    finalStretch:{ title:"2 days left. You've come this far.", body:"Day 12 takes 20 minutes. Don't leave it here.", cta:'Go to Day 12' },
  };
  const notifData = p.notifMode ? NOTIF_DATA[p.notifMode] : null;
  const brRef = useRef(null);
  const PHASES = ['Inhale','Hold','Exhale','Hold'];
  const PHASE_DUR = 4, TOTAL_CYCLES = 5;
  const [brState, setBrState] = useState({ phaseIdx:0, count:PHASE_DUR, cycle:1 });

  const card = p.cards.find(c => c.key === openKey) || null;

  const startBreath = () => {
    setBrState({ phaseIdx:0, count:PHASE_DUR, cycle:1 });
    setBreathOpen(true);
    brRef.current = setInterval(() => {
      setBrState(s => {
        let { phaseIdx, count, cycle } = s;
        count--;
        if (count < 1) {
          phaseIdx = (phaseIdx + 1) % PHASES.length;
          if (phaseIdx === 0) cycle++;
          if (cycle > TOTAL_CYCLES) { clearInterval(brRef.current); setBreathOpen(false); return s; }
          count = PHASE_DUR;
        }
        return { phaseIdx, count, cycle };
      });
    }, 1000);
  };

const EngineStdView = ({ persona }) => {
  const p = persona;
  const [openKey, setOpenKey] = useState(null);
  const [ntOpen, setNtOpen]   = useState(false);
  const [done, setDone]       = useState(new Set());
  const [breathOpen, setBreathOpen] = useState(false);
  const brRef = useRef(null);
  const PHASES = ['Inhale','Hold','Exhale','Hold'];
  const PHASE_DUR = 4, TOTAL_CYCLES = 5;
  const [brState, setBrState] = useState({ phaseIdx:0, count:PHASE_DUR, cycle:1 });

  const card = p.cards.find(c => c.key === openKey) || null;

  const startBreath = () => {
    setBrState({ phaseIdx:0, count:PHASE_DUR, cycle:1 });
    setBreathOpen(true);
    brRef.current = setInterval(() => {
      setBrState(s => {
        let { phaseIdx, count, cycle } = s;
        count--;
        if (count < 1) {
          phaseIdx = (phaseIdx + 1) % PHASES.length;
          if (phaseIdx === 0) cycle++;
          if (cycle > TOTAL_CYCLES) { clearInterval(brRef.current); setBreathOpen(false); return s; }
          count = PHASE_DUR;
        }
        return { phaseIdx, count, cycle };
      });
    }, 1000);
  };

  const stopBreath = () => { clearInterval(brRef.current); setBreathOpen(false); };
  useEffect(() => () => clearInterval(brRef.current), []);

  const markDone = () => {
    if (!openKey) return;
    setDone(d => new Set([...d, openKey]));
    setOpenKey(null);
  };

  const skipCard = (reason) => {
    if (reason === 'already-did') markDone();
    setNtOpen(false);
    if (openKey && reason !== 'already-did') setOpenKey(null);
  };

  const sheetOpen = !!openKey;

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', background:'#f5f4f0', overflow:'hidden', position:'relative' }}>

            <span style={{ fontSize:19, fontWeight:500, color:'#1a1a18' }}>{p.greeting}</span>
            <span style={{ background:'linear-gradient(135deg,#c9a227,#e8b820)', borderRadius:8, padding:'3px 9px', fontSize:11, fontWeight:500, color:'white' }}>Lemon</span>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:7 }}>
            {p.widgets.map((w, i) => (
              <div key={i} style={{ background:'white', borderRadius:10, padding:'9px 10px', border:'0.5px solid #e8e5de' }}>
                <div style={{ fontSize:9, color:'#a8a29e', marginBottom:2 }}>{w.label}</div>
                <div style={{ fontSize:15, fontWeight:500, color:'#1a1a18' }}>{w.value}</div>
                <div style={{ fontSize:9, color:'#a8a29e' }}>{w.sub}</div>
                <div style={{ fontSize:9, marginTop:1, color:w.trendColor }}>{w.trend}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Card list */}
        <div style={{ padding:'12px', display:'flex', flexDirection:'column', gap:9, paddingBottom:24 }}>
          <div style={{ fontSize:11, fontWeight:500, color:'#a8a29e', marginBottom:4, padding:'0 2px' }}>Today's actions</div>
          {p.cards.map(c => {
            const isDone = done.has(c.key);
            return (

  const [mealConfirmed,   setMealConfirmed]   = useState(false);
  const [prefConfirmed,   setPrefConfirmed]   = useState(false);

  // Workout / Meal / Preference — free-form text input
  const estimateCalories = (label) => {
    const l = (label || '').toLowerCase();
    if (l.includes('swim'))  return 220;
    if (l.includes('cycle') || l.includes('bike')) return 240;
    if (l.includes('walk'))  return 150;
    if (l.includes('run'))   return 280;
    if (l.includes('yoga'))  return 120;
    if (l.includes('lift') || l.includes('strength')) return 280;
    return 180;
  };
  const [workoutText, setWorkoutText] = useState(initialActivity?.label || '');
  const [mealText,    setMealText]    = useState('');
  const [prefText,    setPrefText]    = useState('');

  // Composer state — pre-populated per stage to give a sensible placeholder
  const [composerText, setComposerText] = useState('');

  // ── Existing BP state ─────────────────────────────────────────────────
  const yesterdaySys = 124, yesterdayDia = 82, yesterdayPulse = 66;
  const deltaSys = sys ? (sys - yesterdaySys) : 0;
  const handleBPSubmit = (data) => {
    setSys(data.sys); setDia(data.dia); setPulse(data.pulse);
    setNotes(data.notes || []);
    setStage('bp-card');
  };

  // Transition pre-filled workouts (from homepage Move card "Log this") straight to the response card
  useEffect(() => {
    if (stage === 'workout-input' && workoutText) {
      setStage('workout-card');
    }
  }, [stage, workoutText]);

  // Composer handler — dispatches based on current stage
  const handleComposerSubmit = (text) => {
    if (stage === 'workout-ask') {
      setWorkoutText(text);
      setStage('workout-card');
    } else if (stage === 'meal-ask') {
      setMealText(text);
      setStage('meal-card');
    } else if (stage === 'pref-ask') {
      setPrefText(text);
      setStage('pref-card');
    }
    setComposerText('');
  };
  // Composer placeholder + disabled state
  const composerPlaceholder = stage === 'workout-ask' ? 'Tell Lemon what you did…'
    : stage === 'meal-ask' ? 'Tell Lemon what you ate…'
    : stage === 'pref-ask' ? 'Tell Lemon your preference…'
    : 'Message Lemon…';
  const composerActive = stage === 'workout-ask' || stage === 'meal-ask' || stage === 'pref-ask';

  return (
    <div style={{flex:1, display:'flex', flexDirection:'column', position:'relative', background:'#fafaf9', overflow:'hidden', minHeight:0}}>
      <G_ChatHeader hasNotif={confirmed} onMenu={() => setDrawerOpen(true)}/>

      <div className="flex-1 px-4 pt-3 overflow-y-auto hide-scrollbar" style={{minHeight:0}}>
        <div className="text-center text-[11px] text-stone-400 font-semibold uppercase tracking-wide mb-3 fi">Today · 7:12 AM</div>

        <G_Bubble role="lemon" animate>
          Hi Maya — what would you like to log?
        </G_Bubble>

        {stage === 'main' && (
          <div className="mt-3 ml-9 su1">
            <div className="flex gap-2 flex-wrap">
              <G_Chip icon={G_I.heart} label="Log a vital"      accent="border-red-200 hover:bg-red-50"     onClick={() => setStage('vital-picker')}/>
              <G_Chip icon={G_I.flame} label="Log a workout"    accent="border-sage-300 hover:bg-sage-50"   onClick={() => setStage('workout-ask')}/>
              <G_Chip icon={G_I.meal}  label="Log a meal"       accent="border-lemon-400 hover:bg-lemon-50" onClick={() => setStage('meal-ask')}/>
              <G_Chip icon={H_I.prefs} label="Log a preference" accent="border-stone-200 hover:bg-stone-50" onClick={() => setStage('pref-ask')}/>
            </div>
          </div>
        )}

        {/* ─── VITAL → BP flow ───────────────────────────────────────── */}
        {(stage === 'vital-picker' || stage === 'bp-input' || stage === 'bp-card' || stage === 'bp-logged') && (
          <>
            <G_Bubble role="user">
              <span className="flex items-center gap-1.5"><span className="opacity-70">{G_I.heart}</span> Log a vital</span>
            </G_Bubble>
            <G_Bubble role="lemon" animate={stage==='vital-picker'}>
              Sure — what are you logging?
            </G_Bubble>
            {stage === 'vital-picker' && (
              <div className="mt-1 ml-9 su1">
                <div className="flex gap-2 flex-wrap">
                  <G_Chip icon={G_I.heart}   label="Log BP"      accent="border-red-200 hover:bg-red-50"     onClick={() => setStage('bp-input')}/>
                  <G_Chip icon={G_I.scale}   label="Log weight"  accent="border-stone-200 hover:bg-stone-50"/>
                  <G_Chip icon={H_I.glucose} label="Log glucose" accent="border-sage-300 hover:bg-sage-50"/>
                </div>
              </div>
            )}
          </>
        )}

        {(stage === 'bp-input' || stage === 'bp-card' || stage === 'bp-logged') && (
          <>
            <G_Bubble role="user">
              <span className="flex items-center gap-1.5"><span className="opacity-70">{G_I.heart}</span> Log BP</span>
            </G_Bubble>
            <G_Bubble role="lemon" animate={stage==='bp-input'}>
              Got it. What's your reading?
            </G_Bubble>
            {stage === 'bp-input' && (
              <H_BPInputCard
                onSubmit={handleBPSubmit}
                yesterdaySys={yesterdaySys} yesterdayDia={yesterdayDia} yesterdayPulse={yesterdayPulse}
              />
            )}
          </>
        )}

        {(stage === 'bp-card' || stage === 'bp-logged') && (
          <>
            <G_Bubble role="user">
              {sys}/{dia}{pulse ? ` · pulse ${pulse}` : ''}
            </G_Bubble>
            <H_BPCard
              sys={sys} dia={dia} pulse={pulse} notes={notes} deltaSys={deltaSys}
              confirmed={confirmed}
              onConfirm={() => { setConfirmed(true); setStage('bp-logged'); }}
              onEdit={() => setStage('bp-input')}
            />
          </>
        )}

        {stage === 'bp-logged' && (
          <>
            <G_Bubble role="lemon" animate>
              That's your 5th morning below 125. <b>7-day average: 122/78</b> — below your 130/80 goal. The trend is real — see it on Stats.
            </G_Bubble>
            <div className="ml-9 mt-2 fi">
              <div className="bg-warm-100 border border-warm-300 rounded-xl px-3 py-2 text-[11px] text-stone-700 font-medium inline-flex items-center gap-1.5">
                <span className="w-1.5 h-1.5 rounded-full bg-red-500 pulse-dot"/>
                New entry in Journal — tap menu to view
              </div>
            </div>
          </>
        )}

        {/* ─── WORKOUT flow ──────────────────────────────────────────── */}
        {(stage === 'workout-ask' || stage === 'workout-input' || stage === 'workout-card' || stage === 'workout-confirmed') && (
          <>
            <G_Bubble role="user">
              <span className="flex items-center gap-1.5"><span className="opacity-70">{G_I.flame}</span> Log a workout</span>
            </G_Bubble>
            <G_Bubble role="lemon" animate>
              Got it. What did you do?
            </G_Bubble>
          </>
        )}

        {(stage === 'workout-card' || stage === 'workout-confirmed' || stage === 'workout-input') && workoutText && (() => {
          const cal = estimateCalories(workoutText);
          const lower = workoutText.toLowerCase();
          const isLift  = lower.includes('lift') || lower.includes('strength') || lower.includes('weights');
          const isYoga  = lower.includes('yoga') || lower.includes('stretch');
          const insight = isLift  ? 'Low-Valsalva lifting keeps your BP safer — well-chosen.'
                        : isYoga  ? 'Calming movement helps your nocturnal BP dip kick in tonight.'
                        : 'That makes 4 sessions this week — you\'re holding the Zone 2 streak.';
          return (
            <>
              <G_Bubble role="user">{workoutText}</G_Bubble>
              <G_Bubble role="lemon" animate>
                <p className="m-0">Got it — that's about <b>{cal} calories</b> at a moderate effort.</p>
                <p className="m-0 mt-1.5">{insight}</p>
              </G_Bubble>
              {!workoutConfirmed ? (
                <div className="ml-9 mt-1 mb-3 flex gap-2 fi">
                  <button onClick={() => { setWorkoutText(''); setStage('workout-ask'); }} className="px-3.5 py-1.5 rounded-full border border-stone-200 text-stone-600 text-xs font-semibold cursor-pointer" style={{background:'#fff',fontFamily:'inherit'}}>Edit</button>
                  <button onClick={() => { setWorkoutConfirmed(true); setStage('workout-confirmed'); }} className="px-3.5 py-1.5 rounded-full bg-stone-800 text-white text-xs font-bold inline-flex items-center justify-center gap-1 cursor-pointer" style={{border:'none',fontFamily:'inherit'}}>{G_I.check} Looks right</button>
                </div>
              ) : (
                <div className="ml-9 mb-3 inline-flex items-center gap-1.5 text-xs font-semibold text-sage-700 fi">
                  <span className="text-sage-600">{G_I.check}</span>
                  Logged to your journal
                </div>
              )}
              {stage === 'workout-confirmed' && (
                <G_Bubble role="lemon" animate>
                  Movement logged. Three Zone 2 sessions this week — your BP is responding.
                </G_Bubble>
              )}
            </>
          );
        })()}

        {/* ─── MEAL flow ─────────────────────────────────────────────── */}
        {(stage === 'meal-ask' || stage === 'meal-card' || stage === 'meal-logged') && (
          <>
            <G_Bubble role="user">
              <span className="flex items-center gap-1.5"><span className="opacity-70">{G_I.meal}</span> Log a meal</span>
            </G_Bubble>
            <G_Bubble role="lemon" animate>
              Sure — what did you eat?
            </G_Bubble>
          </>
        )}

        {(stage === 'meal-card' || stage === 'meal-logged') && mealText && (() => {
          // Heuristic analysis: if mealText mentions known high-sodium foods, flag it; else if low-sodium DASH foods, flag dash.
          const t = mealText.toLowerCase();
          const isHighNa = /caesar|deli|soup|pizza|fries|burger|takeout|fried|soy|teriyaki|bacon|sausage|cheese/.test(t);
          const isDash   = /salmon|spinach|kale|broccoli|berries|oats|salad(?! caesar)|tofu|lentil(?! soup)/.test(t);
          // Mock numbers — same range as the existing suggestions, varies with classification
          const cal    = isHighNa ? 480 : isDash ? 430 : 380;
          const protein= isHighNa ? '32g' : isDash ? '34g' : '22g';
          const sodium = isHighNa ? 720 : isDash ? 180 : 320;
          const dailySodium = 1240 + sodium;
          return (
            <>
              <G_Bubble role="user">{mealText}</G_Bubble>
              <G_Bubble role="lemon" animate>
                <p className="m-0">Got it. About <b>{cal} calories</b>, <b>{protein} protein</b>, and <b>{sodium}mg sodium</b>.</p>
                <p className="m-0 mt-1.5">
                  {isHighNa
                    ? <>That's roughly <b>{Math.round(sodium/1500*100)}% of your DASH sodium cap</b> in one meal — worth balancing tonight with something lower-salt.</>
                    : isDash
                    ? <>Solid DASH-aligned choice — exactly what your BP wants.</>
                    : <>Lands easily within your day's targets.</>}
                </p>
              </G_Bubble>
              {!mealConfirmed ? (
                <div className="ml-9 mt-1 mb-3 flex gap-2 fi">
                  <button onClick={() => { setMealText(''); setStage('meal-ask'); }} className="px-3.5 py-1.5 rounded-full border border-stone-200 text-stone-600 text-xs font-semibold cursor-pointer" style={{background:'#fff',fontFamily:'inherit'}}>Edit</button>
                  <button onClick={() => { setMealConfirmed(true); setStage('meal-logged'); }} className="px-3.5 py-1.5 rounded-full bg-stone-800 text-white text-xs font-bold inline-flex items-center justify-center gap-1 cursor-pointer" style={{border:'none',fontFamily:'inherit'}}>{G_I.check} Looks right</button>
                </div>
              ) : (
                <div className="ml-9 mb-3 inline-flex items-center gap-1.5 text-xs font-semibold text-sage-700 fi">
                  <span className="text-sage-600">{G_I.check}</span>
                  Logged to your journal
                </div>
              )}
              {stage === 'meal-logged' && (
                <G_Bubble role="lemon" animate>
                  Sodium today: <b>{dailySodium} of 1,500mg</b>. {dailySodium < 1500 ? 'You\'re still on track.' : 'A bit over — keep dinner light on salt.'}
                </G_Bubble>
              )}
            </>
          );
        })()}

        {/* ─── PREFERENCE flow ───────────────────────────────────────── */}
        {(stage === 'pref-ask' || stage === 'pref-card' || stage === 'pref-logged') && (
          <>
            <G_Bubble role="user">
              <span className="flex items-center gap-1.5"><span className="opacity-70">{H_I.prefs}</span> Log a preference</span>
            </G_Bubble>
            <G_Bubble role="lemon" animate>
              Of course — what would you like me to remember?
            </G_Bubble>
          </>
        )}

        {(stage === 'pref-card' || stage === 'pref-logged') && prefText && (() => {
          const t = prefText.toLowerCase();
          const isDietary  = /eat|food|meal|fish|dairy|sodium|sugar|cook|vegetar|vegan|salt/.test(t);
          const isActivity = /walk|run|workout|exercise|gym|cycle|yoga|stretch|impact/.test(t);
          const isReminder = /remind|notif|nudge|morning|evening|weekly|daily|alarm|sunday/.test(t);
          const followup = isDietary  ? 'Future meal picks will reflect this.'
                         : isActivity ? 'Movement recommendations will steer toward this.'
                         : isReminder ? 'Your notification cadence updates from tomorrow.'
                         : 'I\'ll factor it into what I suggest going forward.';
          return (
            <>
              <G_Bubble role="user">{prefText}</G_Bubble>
              <G_Bubble role="lemon" animate>
                <p className="m-0">Got it. I'll keep this in mind when I suggest things — meals, workouts, and check-in timing all adapt.</p>
                <p className="m-0 mt-1.5">{followup}</p>
              </G_Bubble>
              {!prefConfirmed ? (
                <div className="ml-9 mt-1 mb-3 flex gap-2 fi">
                  <button onClick={() => { setPrefText(''); setStage('pref-ask'); }} className="px-3.5 py-1.5 rounded-full border border-stone-200 text-stone-600 text-xs font-semibold cursor-pointer" style={{background:'#fff',fontFamily:'inherit'}}>Edit</button>
                  <button onClick={() => { setPrefConfirmed(true); setStage('pref-logged'); }} className="px-3.5 py-1.5 rounded-full bg-stone-800 text-white text-xs font-bold inline-flex items-center justify-center gap-1 cursor-pointer" style={{border:'none',fontFamily:'inherit'}}>{G_I.check} Looks right</button>
                </div>
              ) : (
                <div className="ml-9 mb-3 inline-flex items-center gap-1.5 text-xs font-semibold text-sage-700 fi">
                  <span className="text-sage-600">{G_I.check}</span>
                  Saved to your profile
                </div>
              )}
              {stage === 'pref-logged' && (
                <G_Bubble role="lemon" animate>
                  Saved. The plan will reflect this from now on.
                </G_Bubble>
              )}
            </>
          );
        })()}
      </div>

      <G_Composer
        value={composerText}
        onChange={setComposerText}
        onSubmit={handleComposerSubmit}
        placeholder={composerPlaceholder}
        disabled={!composerActive}
      />

      {drawerOpen && <G_Drawer onClose={() => setDrawerOpen(false)}/>}
    </div>
  );
};

e MVP option 2 — weekly report promoted to hero, Logging pillar removed, LemonAsksBP carries the full BP form (sys / dia / pulse / notes) plus an X dismiss.' : p.bpLogVariant === 'ask' ? 'Homepage Logging CTA MVP — LemonAsksBP at the top with the full BP form (sys / dia / pulse / notes), Logging pillar in the rec stack with a "Logged today" state.' : p.challengeMode==='boost' ? `Boost Day — private catch-up mechanic for users tied at 0 sessions after 2+ consecutive days. Bottom-by-value trigger (not a fixed rank slot, so every tied user qualifies), one 24-hour window, one per user per challenge, next completed session scores +2 instead of +1. No rank-jump ceiling. This screen shows the ${p.boostState==='active'?'active notification, 23h left, plus the 2x badge on the rec card and detail sheet':p.boostState==='used'?'boosted confirmation after Maya logs Day 3 — 0 to 2 sessions, boost consumed':'expired state 24h later — Maya never acted, still 0 sessions, boost gone for the rest of the challenge'}.` : p.challengeMode==='private3' ? "Private challenges — active state at N=3. Reuses the existing Group Challenge Detail Sheet exactly as built for 8-person challenges, just with Maya, Alex, and Sam. The point of this toggle is to confirm the leaderboard, activity feed, and progress bar all still read sensibly at the smallest possible headcount, not just the largest." : p.isSharedResultView ? `Share result — recipient side. Maya tapped Share result on her finished challenge; this is what the person on the other end of that link sees — a read-only result view, not Maya's real challenge detail sheet (no leaderboard, no activity feed, no today's session, since ${p.name} isn't a participant). ${p.resultState==='open' ? 'Shown here: the challenge Maya shared is still open, so the CTA is a direct Join.' : 'Shown here: the challenge has ended, so the CTA falls back to pillar-matched suggestions in Movement instead of a dead Join button.'}` : p.isWebLandingView ? `Share result — recipient has no Lemon account. The deep link can't open an app that isn't installed, so it resolves to this server-rendered web landing page instead — same branded card, a Download CTA, and an Open Graph-tagged payload so the link unfurls with this card in iMessage/WhatsApp before anyone even taps it. Without deferred deep linking wired up post-install, ${p.name} lands in generic onboarding with zero memory of why they downloaded the app.` : p.isCommunityHubView ? 'Standalone Community — cross-challenge activity feed (completions, reactions, rank changes across every active challenge, not buried per-challenge), a friends layer that doesn\'t exist elsewhere in the product, a rank roll-up so standing is visible without opening each sheet, a dedicated Challenge a friend entry point instead of a buried + button, Friend Streaks (Duolingo-modeled, persistent cross-challenge), milestone highlights in the feed (Peloton-modeled), and the pillar-filtered discovery carousel moved over from Home. Nav is the existing Home / Meal prep / Ask / Stats / Community bar, unchanged.' : p.isCommunityCirclesView ? 'Circles — modeled on Noom Circles. Persistent, topic or condition-based groups with no leaderboard and no end date, coach-led where relevant (Managing BP Together), auto-joined where onboarding-relevant (New to Lemon), interest-based otherwise (Zone 2 Runners). A separate toggle from the standalone Community hub, not folded into it.' : p.isCommunityFeedView ? 'Content feed — modeled on WW Connect. Actual user-generated posts (photos, recipes, milestones) with hashtags and Trending/New/Following tabs — distinct from the challenge activity feed, which only logs automated completions and reactions. Open question in the mockup note: whether comments belong here given Lemon deliberately kept the challenge feed comment-free.' : p.isCommunityChatView ? "Team chat — modeled on WHOOP Team Chat and PatientsLikeMe. Direct group messaging inside a Circle, including a shared data snippet in one of Maya's own messages (WHOOP's screenshot-sharing pattern). No rank, no leaderboard — messaging is the entire mechanic." : p.isPrivateSetupView ? 'Private challenges — creator setup. Same fields as existing 1v1 (pillar, daily action, duration) plus a friend-picker capped at two, mixing existing Lemon connections with an invite-by-contact fallback. Sending invites goes straight to the active challenge — there\'s no separate waiting screen, since the challenge starts on schedule regardless of accept status.' : p.isPrivateInviteView ? 'Private challenges — invitee side, has-Lemon path. Same fork as Share Result, reused rather than rebuilt: Accept or Decline, no ambiguity about who else is in it (You + Maya + Sam shown up front), no countdown or deadline pressure.' : isHomeView ? 'Hypertension homepage — DASH-adjusted nutrition, BP-aware sleep + mind cards, fully interactive. Tap any recommendation for the full detail sheet.' : `Weekly progress report — ${(p.pageSequence||[1,2,3,4,5]).length} pages. Page 1 stats, Page 2 chart + insight per metric, Page ${(p.pageSequence||[1,2,3,4,5]).slice(-1)[0]} commit.`}</p>
      </div>

      <div style={{width:'100%',maxWidth:820}}>
        <div style={{display:'flex',gap:8,padding:'0 4px',flexWrap:'wrap',justifyContent:'flex-start'}}>
          {PERSONA_LIST.map(pp=>{
            const active = pk===pp.key;
            return (
              <button key={pp.key} onClick={()=>switchPersona(pp.key)}
                style={{
                  display:'flex', alignItems:'center', gap:8, padding:'8px 12px', borderRadius:16, flexShrink:0,
                  border:`1.5px solid ${active?'#1a1a1a':'#d8d3c8'}`, background:active?'#fff':'rgba(255,255,255,0.55)',
                  cursor:'pointer', fontFamily:'inherit', transition:'all 0.18s', boxShadow:active?'0 4px 14px rgba(0,0,0,0.10)':'none',
                }}>
                <div style={{width:30,height:30,borderRadius:'50%',background:pp.grad,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#fff'}}>{pp.initial}</div>
                <div style={{textAlign:'left'}}>
                  <p style={{fontSize:12,fontWeight:700,color:active?'#1a1a1a':'#57534e',margin:0,whiteSpace:'nowrap'}}>{pp.name}, {pp.age}</p>
                  <p style={{fontSize:10,color:'#94a47f',margin:0,whiteSpace:'nowrap',fontWeight:600}}>{pp.label}</p>
                </div>
              </button>
            );
          })}
        </div>
      </div>

      <div style={{display:'flex',alignItems:'flex-start',gap:24}}>
      <div className="device" key={`${pk}-${animKey}`}>
        <div className="notch"/>

        {storyMode && p.isOOBReport ? (
          <StoryReportOOB p={p} onExit={()=>setStoryMode(false)} onBackToHome={()=>{ setStoryMode(false); switchPersona('mayaHomeV5'); }}/>
        ) : v5View === 'chat' && (p.isStatsView || p.isCommunityView || p.isMealPrepView || p.isEngineStdV2 || p.isJournalCard) ? (
          // Ask button (Stats / Community / Meal prep / challenge & notif scenarios / journal action card)
          // — same chat + logging experience Home uses.
          <>
            <ChatLoggingView initialStage={chatInitialStage} initialActivity={chatInitialActivity}/>
            <LemonNav active="ask" onSelect={(id)=>{
              if (id==='home')      switchPersona('mayaHomeV5');
              if (id==='meal')      switchPersona('mayaMealPrep');
              if (id==='stats')     switchPersona('mayaStats');
              if (id==='community') switchPersona('mayaCommunity');
            }}/>
          </>
        ) : p.isEngineStdV3 ? (
          <EngineStdViewV3 persona={p} onSwitchPersona={switchPersona}/>
        ) : p.isEngineStdV2 ? (
          <EngineStdViewV2 persona={p} onSwitchPersona={switchPersona} onOpenChat={()=>setV5View('chat')}/>
        ) : p.isEngineStdView ? (
          <EngineStdView persona={p}/>
        ) : p.isChatView ? (
          <ChatLoggingView/>
        ) : p.isStatsView ? (
          <StatsView persona={p} onSwitchPersona={switchPersona} onOpenChat={()=>setV5View('chat')}/>
        ) : p.isChallengeEngagementView ? (
          <ChallengeEngagementView persona={p} onSwitchPersona={switchPersona}/>
        ) : p.isChallengeDetailView ? (
          <ChallengeDetailView persona={p} onSwitchPersona={switchPersona}/>
        ) : p.isSharedResultView ? (
          <SharedResultView persona={p} onSwitchPersona={switchPersona}/>
        ) : p.isWebLandingView ? (
          <WebLandingView persona={p}/>
        ) : p.isCommunityHubView ? (
          <CommunityHubView persona={p} onSwitchPersona={switchPersona} onOpenChat={()=>setV5View('chat')}/>
        ) : p.isCommunityCirclesView ? (
          <CommunityCirclesView persona={p} onSwitchPersona={switchPersona} onOpenChat={()=>setV5View('chat')}/>
        ) : p.isCommunityFeedView ? (
          <CommunityContentFeedView persona={p} onSwitchPersona={switchPersona} onOpenChat={()=>setV5View('chat')}/>
        ) : p.isCommunityChatView ? (
          <CommunityChatView persona={p} onSwitchPersona={switchPersona} onOpenChat={()=>setV5View('chat')}/>
        ) : p.isPrivateSetupView ? (
          <PrivateChallengeSetupView persona={p} onSwitchPersona={switchPersona}/>
        ) : p.isPrivateInviteView ? (
          <PrivateInviteView persona={p}/>
        ) : p.isCommunityView ? (
          <CommunityView persona={p} onSwitchPersona={switchPersona} onOpenChat={()=>setV5View('chat')}/>
        ) : p.isMealPrepView ? (
          <MealPrepView persona={p} onSwitchPersona={switchPersona} onOpenChat={()=>setV5View('chat')}/>
        ) : p.isJournalCard ? (
          <JournalCardView onSwitchPersona={switchPersona} onOpenChat={()=>setV5View('chat')}/>
        ) : p.isJournalSignal ? (
          <JournalSignalView/>
        ) : p.isJournalConvo ? (
          <JournalConvoView/>
        ) : isHomeView ? (
          <HomeView
            persona={p}
            onOpenReport={()=>switchPersona('maya')}
            view={p.routerStrip ? v5View : undefined}
            setView={p.routerStrip ? setV5View : undefined}
            chatInitialStage={chatInitialStage}
            onOpenChat={p.routerStrip ? (stage, activity)=>{ setChatInitialStage(stage || 'main'); setChatInitialActivity(activity || null); setV5View('chat'); } : undefined}
            chatInitialActivity={chatInitialActivity}
            onSwitchPersona={switchPersona}
          />
        ) : (
        <>
        <div style={{position:'relative',zIndex:5,padding:'10px 18px 6px',background:'rgba(248,247,243,0.95)',borderBottom:'1px solid #efefed',flexShrink:0}}>
          <div className="flex items-center justify-between">
            <button onClick={!isFirst?goPrev:undefined} className="w-7 h-7 flex items-center justify-center text-stone-400">
              {!isFirst ? <I.Back/> : <I.Close/>}
            </button>
            <div className="flex items-center gap-1.5">
              {seq.map(n=>(
                <button key={n} onClick={()=>setPage(n)} className="rounded-full transition-all"
                  style={{height:6, width: page===n ? 22 : 6, background: page===n ? p.accent : '#d6d3d1'}}/>
              ))}
            </div>
            <button className="w-7 h-7 flex items-center justify-center text-stone-400"><I.Share/></button>
          </div>
        </div>

        {!p.useIntelligentReport && p.weeklyPlan && (page===1 || page===2) && (
          <div style={{position:'relative',zIndex:6,padding:'8px 18px 0',background:'rgba(248,247,243,0.95)',flexShrink:0}}>
            <div style={{background:'#fff',border:'1.5px solid #e8e5de',borderRadius:14,padding:'9px 12px'}}>
              <p style={{fontSize:8.5,fontWeight:800,letterSpacing:'0.07em',textTransform:'uppercase',color:'#94a47f',margin:'0 0 7px'}}>Proposal mockup — audit toggles</p>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:7}}>
                <p style={{fontSize:11.5,fontWeight:600,color:'#57534e',margin:0,paddingRight:10,lineHeight:1.25}}>Tighten insight copy<br/><span style={{fontWeight:400,color:'#a8a29e',fontSize:10}}>kill restated-chart + generic advice</span></p>
                <Toggle on={proposedInsights} onChange={()=>setProposedInsights(v=>!v)} accent={p.accent}/>
              </div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <p style={{fontSize:11.5,fontWeight:600,color:'#57534e',margin:0,paddingRight:10,lineHeight:1.25}}>Last week's callback<br/><span style={{fontWeight:400,color:'#a8a29e',fontSize:10}}>close the commit loop</span></p>
                <Toggle on={proposedCallback} onChange={()=>setProposedCallback(v=>!v)} accent={p.accent}/>
              </div>
            </div>
          </div>
        )}

        <div className="screen fi" key={`${pk}-${page}`} style={{position:'relative'}}>
          {page===1 && (p.isOOBReport ? <Page1OOB p={p} onEnterStory={()=>setStoryMode(true)}/> : p.useIntelligentReport ? <Page1Intel p={p}/> : <Page1 p={p} proposedCallback={proposedCallback}/>)}
          {page===2 && (p.isOOBReport ? <Page2OOB p={p}/> : p.useIntelligentReport ? <Page2Intel p={p}/> : <Page2 p={p} proposedInsights={proposedInsights}/>)}
          {page===3 && (
            <Page3 p={p}
              directions={directions} setDirections={setDirections}
              contexts={contexts} setContexts={setContexts}
              otherNote={otherNote} setOtherNote={setOtherNote}
              onContinue={goNext}/>
          )}
          {page===4 && <Page4 p={p} directions={directions} contexts={contexts} onContinue={goNext}/>}
          {page===5 && (p.isOOBReport ? <Page5OOB p={p} onBackToHome={()=>switchPersona('mayaHomeV5')}/>
            : p.useIntelligentReport ? <Page5Intel p={p} onBackToHome={()=>switchPersona('mayaHomeV5')}/>
            : <Page5 p={p} directions={directions} openSheet={setSheet} onBackToHome={()=>switchPersona('mayaHomeV5')}/>)}

          {sheet==='doctor' && p.commit.doctor && (
            <BottomSheet onClose={()=>setSheet(null)} title={`Preview — what ${p.commit.doctor.name} receives`}>
              <p className="text-[11.5px] text-stone-500 mb-3 leading-relaxed">
                Sent Sunday evening. Email + PDF attachment. {p.commit.doctor.name} doesn’t need Lemon.
              </p>
              <DoctorView p={p} accent={p.accent}/>
              <div className="mt-4">
                <p className="text-[11px] font-semibold uppercase tracking-wide text-stone-400 mb-2">Attached PDF</p>
                <PDFExportPreview p={p}/>
              </div>
              <div className="mt-4 flex gap-2">
                <button className="flex-1 py-3 rounded-xl text-[13px] font-semibold text-white inline-flex items-center justify-center gap-1.5" style={{background:p.accent}}>
                  <I.Send/> Send to {p.commit.doctor.name}
                </button>
                <button className="px-4 py-3 rounded-xl text-[13px] font-semibold text-stone-600 bg-stone-100">Save PDF</button>
              </div>
              <p className="text-[10.5px] text-stone-400 mt-3 leading-snug text-center italic">
                For clinical reference only. Lemon is not a medical device.
              </p>
            </BottomSheet>
          )}
          {sheet==='export' && p.canExport && (
            <BottomSheet onClose={()=>setSheet(null)} title="Preview — 28-day BP report (PDF)">
              <p className="text-[11.5px] text-stone-500 mb-3 leading-relaxed">
                A one-page PDF you can save, print, or share. Generated on demand from your last 28 days of logged data.
              </p>
              <PDFExportPreview p={p}/>
              <div className="mt-4 flex gap-2">
                <button className="flex-1 py-3 rounded-xl text-[13px] font-semibold text-white" style={{background:p.accent}}>Save PDF</button>
                <button className="flex-1 py-3 rounded-xl text-[13px] font-semibold text-stone-600 bg-stone-100">Share</button>
              </div>
              <p className="text-[10.5px] text-stone-400 mt-3 leading-snug text-center italic">
                For personal reference only. Lemon is not a medical device.
              </p>
            </BottomSheet>
          )}
        </div>

        {!isLast && (
          <div style={{padding:'10px 18px 14px',background:'rgba(248,247,243,0.97)',borderTop:'1px solid #efefed',flexShrink:0}}>
            <div className="flex items-center justify-between">
              <button onClick={goPrev} disabled={isFirst}
                className={`text-[13px] font-semibold inline-flex items-center gap-1 ${isFirst?'text-stone-300':'text-stone-500'}`}>
                <I.Back/>Back
              </button>
              <span className="text-[11px] text-stone-400">{currentIdx+1} of {seq.length}</span>
              <button onClick={goNext}
                className="text-[13px] font-semibold inline-flex items-center gap-1"
                style={{color:p.accent, opacity: page===3 && !allDirSet ? 0.4 : 1}}
                disabled={page===3 && !allDirSet}>
                Next <I.Forward/>
              </button>
            </div>
          </div>
        )}
        </>
        )}
      </div>

      {/* Lock-screen notification — floats to the right of the phone */}
      {p.showLockNotif && notifState !== 'dismissed' && (
        <div className="fi" style={{display:'flex',flexDirection:'column',gap:10,paddingTop:48,width:280,flexShrink:0}}>
          <p style={{fontSize:11,fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:'#94a47f',margin:0}}>Lock screen · 7:00 AM</p>
          <div style={{
            background: notifState === 'logged' ? 'rgba(240,250,244,0.96)' : 'rgba(255,255,255,0.94)',
            border:'1px solid rgba(0,0,0,0.06)',
            borderRadius:18,
            padding:'12px 14px 14px',
            boxShadow:'0 14px 40px rgba(28,32,48,0.18)',
            backdropFilter:'blur(20px)',
            transition:'all 0.3s ease',
          }}>
            <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:8}}>
              <div style={{
                width:24, height:24, borderRadius:6,
                background: notifState === 'logged' ? '#4CAF7D' : 'linear-gradient(135deg,#fcd34d,#fbbf24)',
                color: notifState === 'logged' ? '#fff' : '#1a1a1a',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontWeight:800, fontSize:11, flexShrink:0,
              }}>{notifState === 'logged' ? <I.Check/> : 'L'}</div>
              <span style={{fontSize:11.5,fontWeight:600,color:'#3a3a38',letterSpacing:'0.02em'}}>LEMON</span>
              <span style={{fontSize:11,color:'#a8a29e',marginLeft:'auto'}}>{notifState === 'logged' ? 'just now' : 'now'}</span>
            </div>
            {notifState === 'logged' ? (
              <>
                <p style={{fontSize:14,fontWeight:700,color:'#1a1a1a',margin:'0 0 2px',letterSpacing:'-0.01em'}}>Logged · 124/82 mmHg</p>
                <p style={{fontSize:12.5,color:'#4CAF7D',fontWeight:600,margin:0,lineHeight:1.4}}>Pulse 66 · 5-day streak below 125</p>
              </>
            ) : (
              <>
                <p style={{fontSize:14,fontWeight:700,color:'#1a1a1a',margin:'0 0 2px',letterSpacing:'-0.01em'}}>Time to log your morning BP</p>
                <p style={{fontSize:12.5,color:'#57534e',margin:'0 0 10px',lineHeight:1.4}}>Yesterday: <span style={{fontWeight:700,color:'#3a3a38'}}>124/82</span> · pulse 66</p>
                <div style={{display:'grid',gridTemplateColumns:'1.4fr 1fr 0.9fr',gap:6,borderTop:'1px solid rgba(0,0,0,0.07)',paddingTop:8}}>
                  <button onClick={handleNotifSame} style={{
                    padding:'9px 8px', borderRadius:11,
                    background:'rgba(0,0,0,0.05)', border:'none',
                    fontSize:11.5, fontWeight:700, color:'#1a1a1a',
                    cursor:'pointer', fontFamily:'inherit', transition:'background 0.15s',
                  }}>Same as yesterday</button>
                  <button onClick={handleNotifAdjust} style={{
                    padding:'9px 8px', borderRadius:11,
                    background:'rgba(0,0,0,0.05)', border:'none',
                    fontSize:11.5, fontWeight:600, color:'#3a3a38',
                    cursor:'pointer', fontFamily:'inherit', transition:'background 0.15s',
                  }}>Adjust</button>
                  <button onClick={handleNotifSnooze} style={{
                    padding:'9px 8px', borderRadius:11,
                    background:'rgba(0,0,0,0.05)', border:'none',
                    fontSize:11.5, fontWeight:600, color:'#78716c',
                    cursor:'pointer', fontFamily:'inherit', transition:'background 0.15s',
                  }}>Snooze</button>
                </div>
              </>
            )}
          </div>
          <p style={{fontSize:11,color:'#a8a29e',margin:0,lineHeight:1.4}}>{notifState === 'logged' ? 'Done. App never opened. The metric widget updates next time you do.' : '~80% of mornings: tap "Same as yesterday" → logged without opening the app.'}</p>
        </div>
      )}

      </div>{/* end phone + notification flex row */}

      <div style={{maxWidth:620,fontSize:11,color:'#a8a29e',textAlign:'center',lineHeight:1.6}}>
        {p.isChatView
          ? <>Chat logging (Option G refined) · Sodium-aware meal capture for hypertension. Tap “Looks right” to log → red dot pulses on the menu → tap the hamburger to slide in the Health Journal drawer.<br/>Numbers are illustrative.</>
          : p.bpLogVariant === 'ask'
          ? <>Option 3 — Lemon asks. A warm conversational prompt at the top of the cards area. Two inline number fields with yesterday as anchor → submit collapses the ask to a single sage confirmation line; the BP metric tile updates in lockstep.<br/>Numbers are illustrative.</>
          : isHomeView
          ? p.key==='mayaHomeTrigger'
            ? <>Main Page · Trigger Line — each recommendation card surfaces a data-grounded reason it&apos;s showing today. Signal first (bolded, card-colored), implication second. Tests whether personalised context drives action.<br/>Numbers are illustrative.</>
            : p.key==='mayaHomeLogOwn'
            ? <>Main Page · Log Your Own — same as Main Page MVP but with a free-text &ldquo;log your own&rdquo; input on each card. Users can record activities that aren&apos;t in the suggestion list.<br/>Numbers are illustrative.</>
            : <>Hypertension homepage · DASH-adjusted recommendations, fully interactive cards, calendar scheduling, and a Sunday "Week in review" banner that opens the weekly progress report.<br/>Numbers are illustrative.</>
          : <>Weekly progress report · {(p.pageSequence||[1,2,3,4,5]).length} pages — Page 1 stats (BP / Weight / Actions), Page 2 charts and insights, {p.pageSequence && p.pageSequence.includes(3) ? 'Page 3 plan review, ' : ''}Page {(p.pageSequence||[1,2,3,4,5]).slice(-1)[0]} commit. Submit lands on a celebration screen.<br/>Numbers are illustrative.</>
        }
      </div>
    </>
  );
}

// ═════════════════════════════════════════════════════════════════════════
// ENGAGEMENT CONCEPTS GALLERY — Alex, hypertension + weight loss (the persona
// used for condition-adjustment examples in Lemon-main-page-prd.md). Four
// isolated scenarios, one per engagement recommendation from the homepage
// engagement review. Concepts 1 and 4 reuse RecCard / SkipSheet / AdjustedTag
// exactly as built above — those mechanics already exist; these scenarios put
// each on its own screen, standalone from the full persona-switcher flow above.
// Concepts 2 and 5 are new components, not present elsewhere in this file.
// ═════════════════════════════════════════════════════════════════════════

const ConceptLabel = ({ n, title, sub }) => (
  <div style={{textAlign:'center', maxWidth:330, marginBottom:2}}>
    <p style={{fontSize:9.5,fontWeight:800,letterSpacing:'0.12em',textTransform:'uppercase',color:'#94a47f',margin:'0 0 5px'}}>Concept {n} of 4 · Alex, hypertension + weight loss</p>
    <p style={{fontSize:15,fontWeight:800,color:'#1a1a1a',margin:'0 0 5px',letterSpacing:'-0.01em',lineHeight:1.3}}>{title}</p>
    <p style={{fontSize:11,color:'#78716c',margin:0,lineHeight:1.55}}>{sub}</p>
  </div>
);

const MiniGreeting = () => (
  <div style={{padding:'16px 4px 10px', textAlign:'center'}}>
    <p style={{fontSize:18,fontWeight:800,color:'#1a1a1a',margin:'0 0 8px',letterSpacing:'-0.02em'}}>Good morning, Alex</p>
    <div style={{display:'flex',gap:6,justifyContent:'center'}}>
      <span style={{fontSize:8.5,fontWeight:800,letterSpacing:'0.06em',textTransform:'uppercase',color:'#a3781f',background:'#fef9c3',padding:'3px 9px',borderRadius:20}}>Lose weight</span>
      <span style={{fontSize:8.5,fontWeight:800,letterSpacing:'0.06em',textTransform:'uppercase',color:'#3d6e9e',background:'#e8eef6',padding:'3px 9px',borderRadius:20}}>Hypertension</span>
    </div>
  </div>
);

// ── Concept 1 — explicit "Not today" with a reason, on the card face ───────
// Reuses RecCard's legacy variant (no card.trigger) + the real SkipSheet.
// "Already did this" counts as a completion; every other reason still tells
// the ranking engine something real, instead of inferring from silence.
const ConceptDismiss = () => {
  const [skip, setSkip] = useState(null);
  const card = {
    pillar:'Move', color:'#778a62', bg:'#f6f7f4', streak:3,
    options:[{ label:'Zone 2 walk · 30 min', IC:I.Walk, effort:'Low effort', outcome:'BP + weight' }],
  };
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14}}>
      <ConceptLabel n="1" title={'"Not today" — with a reason'}
        sub="Tap Not today, then pick why. Every reason is a real signal for tomorrow's ranking — not just a silent scroll-past." />
      <div className="device" style={{height:520}}>
        <div className="notch"/>
        <div className="screen" style={{padding:'0 16px 20px',position:'relative'}}>
          <MiniGreeting/>
          <p style={{fontSize:10.5,fontWeight:800,letterSpacing:'0.04em',color:'#57534e',margin:'6px 2px 10px'}}>Let's make today count</p>
          <RecCard card={card} onDetail={()=>{}} onActivityDone={()=>{}} showLogOwn={false}
            onSkipOpen={(c,cb)=>setSkip({card:c,onSkip:cb})}/>
          {skip && <SkipSheet card={skip.card} onClose={()=>setSkip(null)} onSkip={(r)=>{ skip.onSkip(r); setSkip(null); }}/>}
        </div>
      </div>
    </div>
  );
};

// ── Concept 2 — a celebration ladder, not one binary state ─────────────────
// Today only all-4-pillars gets any acknowledgment. Tap 1–4 to see 2-of-4 and
// 3-of-4 get their own, smaller moment — confetti reserved for the full day
// so it stays special.
const CELEBRATION_STEPS = [
  { n:1, tone:'quiet',     headline:'1 of 4 today',        body:'Move logged. Three pillars still open today.' },
  { n:2, tone:'warm',      headline:'Halfway there',        body:'Move + Nutrition done. The BP-relevant pillars are covered for today.' },
  { n:3, tone:'bright',    headline:'One more closes the day', body:'Move, Nutrition, Mind — Sleep is the only pillar left today.' },
  { n:4, tone:'celebrate', headline:'All 4 pillars — full day', body:'3 Zone 2 sessions this week. BP benefits most from this pattern. Down 0.8kg — pace is right.' },
];
const ConceptGraduatedCelebration = () => {
  const [step, setStep] = useState(2);
  const cur = CELEBRATION_STEPS[step-1];
  const toneColor = { quiet:'#a8a29e', warm:'#c9a227', bright:'#5d6e4d', celebrate:'#4CAF7D' }[cur.tone];
  const toneBg    = { quiet:'#fafaf9', warm:'#fefbf2', bright:'#f6f7f4', celebrate:'linear-gradient(160deg,#fef9e7,#fff)' }[cur.tone];
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14}}>
      <ConceptLabel n="2" title="A celebration ladder, not one binary state"
        sub="≥15% of users hit all-4 in a week — everyone else currently gets no acknowledgment most days. Tap 1–4 to compare." />
      <div className="device" style={{height:520}}>
        <div className="notch"/>
        <div className="screen" style={{padding:'0 16px 20px'}}>
          <MiniGreeting/>
          <div style={{display:'flex',gap:6,justifyContent:'center',margin:'8px 0 16px'}}>
            {CELEBRATION_STEPS.map(s=>(
              <button key={s.n} onClick={()=>setStep(s.n)} style={{
                width:34,height:34,borderRadius:'50%',border:`1.5px solid ${step===s.n?toneColor:'#e7e5e4'}`,
                background: step===s.n ? toneColor : '#fff',
                color: step===s.n ? '#fff':'#a8a29e', fontWeight:800, fontSize:12.5,
                cursor:'pointer', fontFamily:'inherit',
              }}>{s.n}/4</button>
            ))}
          </div>
          <div key={step} className="pop" style={{position:'relative',overflow:'visible',textAlign:'center',
            padding: cur.tone==='celebrate' ? '30px 16px 24px' : '20px 16px', borderRadius:20,
            background: toneBg, border:`1.5px solid ${toneColor}30`}}>
            {cur.tone==='celebrate' && <ConfettiBurst top={38} left={140} scale={1.2}/>}
            <div style={{
              width:cur.tone==='celebrate'?58:44,height:cur.tone==='celebrate'?58:44,borderRadius:'50%',
              background:toneColor,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',
              margin:'0 auto 12px',boxShadow:`0 8px 24px ${toneColor}40`,position:'relative',zIndex:2}}>
              <I.Check/>
            </div>
            <p style={{fontSize:cur.tone==='celebrate'?19:15,fontWeight:800,color:'#1a1a1a',margin:'0 0 6px',letterSpacing:'-0.01em',position:'relative',zIndex:2}}>{cur.headline}</p>
            <p style={{fontSize:12,color:'#57534e',margin:0,lineHeight:1.5,position:'relative',zIndex:2}}>{cur.body}</p>
          </div>
        </div>
      </div>
    </div>
  );
};

// ── Concept 4 — every ranking reason tappable, not just condition edits ────
// Reuses AdjustedTag exactly as built (label/note/color, tap-to-reveal). The
// existing use only explains condition-safety edits; the second card extends
// the same mechanic to a behavioral ranking decision — new usage, same code.
const MiniCardShell = ({ pillar, color, tagLabel, tagColor, tagNote, title, sub }) => (
  <div style={{background:'#fff',borderRadius:20,border:'1px solid #efefed',overflow:'hidden',boxShadow:'0 2px 8px rgba(0,0,0,0.05)'}}>
    <div style={{height:3,background:`linear-gradient(90deg,${color},${color}55)`}}/>
    <div style={{padding:'12px 14px 14px'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:9}}>
        <span style={{fontSize:10,fontWeight:700,letterSpacing:'0.09em',textTransform:'uppercase',color,flex:1}}>{pillar}</span>
        <AdjustedTag label={tagLabel} note={tagNote} color={tagColor}/>
      </div>
      <p style={{fontSize:13.5,fontWeight:800,color:'#1a1a1a',margin:'0 0 3px',letterSpacing:'-0.01em'}}>{title}</p>
      <p style={{fontSize:11.5,color:'#78716c',margin:0,lineHeight:1.4}}>{sub}</p>
    </div>
  </div>
);
const ConceptWhyChanged = () => (
  <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14}}>
    <ConceptLabel n="4" title="Every ranking reason, tappable"
      sub="Not just condition edits. Tap either tag — same mechanic, one explains a safety edit, the other explains a behavior-driven ranking decision." />
    <div className="device" style={{height:520}}>
      <div className="notch"/>
      <div className="screen" style={{padding:'0 16px 20px'}}>
        <MiniGreeting/>
        <p style={{fontSize:10.5,fontWeight:800,letterSpacing:'0.04em',color:'#57534e',margin:'6px 2px 10px'}}>Let's make today count</p>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <MiniCardShell pillar="Nutrition" color="#c9a227" tagLabel="adjusted: DASH diet" tagColor="#e05c5c"
            tagNote="Recommendations follow the DASH dietary pattern — the most clinically validated approach for reducing blood pressure. Prioritises potassium-rich foods, omega-3s, and low sodium."
            title="Swap in a potassium-forward dinner" sub="Existing mechanic — explains a condition-safety edit."/>
          <MiniCardShell pillar="Mind" color="#8b6daa" tagLabel="ranked up today" tagColor="#778a62"
            tagNote="You haven't logged Mind in 4 days. Pillars you've skipped get priority so nothing quietly falls off your plan — this moved to the top of today's stack for that reason alone."
            title="5-min box breathing" sub="New use of the same tag — explains a behavioral ranking decision."/>
        </div>
      </div>
    </div>
  </div>
);

// ── Concept 5 — show the work is (maybe) paying off ────────────────────────
// Correlation only, never causation, per the PRD's Trust rules. Toggle
// compares today's plain count against the outcome_metric-driven line the
// recommendation library schema already defines but hasn't built yet, plus a
// separate, clearly-labeled aggregate/anonymized line (no social feature).
const ConceptOutcomeProof = () => {
  const [withProof, setWithProof] = useState(true);
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14}}>
      <ConceptLabel n="5" title="Show the work is (maybe) paying off"
        sub="Correlation only, never causation — per the Trust rules. Toggle to compare today's plain count against the outcome_metric signal the schema already defines." />
      <div className="device" style={{height:560}}>
        <div className="notch"/>
        <div className="screen" style={{padding:'0 16px 20px'}}>
          <MiniGreeting/>
          <div style={{display:'flex',justifyContent:'center',margin:'8px 0 16px'}}>
            <div style={{display:'flex',background:'#f0efe9',borderRadius:20,padding:3}}>
              <button onClick={()=>setWithProof(false)} style={{padding:'6px 14px',borderRadius:16,border:'none',fontFamily:'inherit',fontSize:11,fontWeight:700,cursor:'pointer',background:!withProof?'#fff':'transparent',color:!withProof?'#1a1a1a':'#a8a29e',boxShadow:!withProof?'0 1px 4px rgba(0,0,0,0.08)':'none'}}>Today</button>
              <button onClick={()=>setWithProof(true)} style={{padding:'6px 14px',borderRadius:16,border:'none',fontFamily:'inherit',fontSize:11,fontWeight:700,cursor:'pointer',background:withProof?'#fff':'transparent',color:withProof?'#1a1a1a':'#a8a29e',boxShadow:withProof?'0 1px 4px rgba(0,0,0,0.08)':'none'}}>+ outcome signal</button>
            </div>
          </div>
          <div style={{background:'#fff',borderRadius:20,border:'1px solid #efefed',padding:'16px 16px 15px',boxShadow:'0 2px 8px rgba(0,0,0,0.05)'}}>
            <p style={{fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'#94a47f',margin:'0 0 8px'}}>This month</p>
            <p style={{fontSize:15.5,fontWeight:800,color:'#1a1a1a',margin:'0 0 4px',letterSpacing:'-0.01em'}}>14 of 20 actions completed</p>
            {withProof ? (
              <div className="fi" style={{marginTop:10,paddingTop:10,borderTop:'1px solid #f0efe9',display:'flex',gap:8,alignItems:'flex-start'}}>
                <div style={{color:'#5d6e4d',marginTop:2,flexShrink:0}}><I.TrendDn/></div>
                <p style={{fontSize:12,color:'#3a3a38',margin:0,lineHeight:1.55}}>
                  Blood pressure has been trending down over the same period. The AHA guideline cites 4–8 weeks of consistent aerobic practice as the window where effects build — you're in it.
                </p>
              </div>
            ) : (
              <p style={{fontSize:11.5,color:'#a8a29e',margin:'8px 0 0'}}>No connection to how it's working — just a count.</p>
            )}
          </div>
          {withProof && (
            <div className="fi" style={{marginTop:10,background:'#f6f7f4',borderRadius:16,padding:'12px 14px',border:'1px solid #e8ebe3'}}>
              <p style={{fontSize:9,fontWeight:800,letterSpacing:'0.08em',textTransform:'uppercase',color:'#94a47f',margin:'0 0 6px'}}>Aggregate, anonymized — separate from the personal line above</p>
              <p style={{fontSize:11.5,color:'#57534e',margin:0,lineHeight:1.55}}>Lemon users with hypertension who kept up Zone 2 for 6 weeks saw blood pressure trend down. No claim about what caused what — just behavior and outcomes shown side by side.</p>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

const EngagementConceptsGallery = () => (
  <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:40,paddingTop:12,paddingBottom:40}}>
    <div style={{textAlign:'center',maxWidth:480}}>
      <p style={{fontSize:11,fontWeight:800,letterSpacing:'0.1em',textTransform:'uppercase',color:'#94a47f',margin:'0 0 6px'}}>New — engagement concepts</p>
      <h2 style={{fontSize:20,fontWeight:800,color:'#1a1a1a',margin:'0 0 6px',letterSpacing:'-0.01em'}}>Four scenarios, one persona (Alex)</h2>
      <p style={{fontSize:12.5,color:'#78716c',margin:0,lineHeight:1.6}}>Concepts 1 and 4 reuse the RecCard / SkipSheet / AdjustedTag mechanics already built above — demonstrations, not new code. Concepts 2 and 5 are new.</p>
    </div>
    <ConceptDismiss/>
    <ConceptGraduatedCelebration/>
    <ConceptWhyChanged/>
    <ConceptOutcomeProof/>
  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<><App/><EngagementConceptsGallery/></>);
</script>
</body>
</html>
