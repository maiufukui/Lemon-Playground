                {/* Drag handle */}
                <div style={{ display:'flex', justifyContent:'center', padding:'10px 0 2px' }}>
                  <div style={{ width:36, height:4, borderRadius:2, background:'#d6d3d1' }}/>
                </div>

                {/* Header */}
                <div style={{ padding:'12px 16px 14px', borderBottom:'1px solid #efefed' }}>
                  <div style={{ display:'flex', gap:6, marginBottom:8 }}>
                    <span style={{ fontSize:9, fontWeight:700, letterSpacing:'0.07em', padding:'3px 8px', borderRadius:20, background:'rgba(119,138,98,0.12)', color:'#5d6e4d' }}>{cc.pillar}</span>
                  </div>
                  <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between' }}>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:18, fontWeight:800, color:'#1a1a18', letterSpacing:'-0.02em', marginBottom:2 }}>{cc.title}</div>
                      <div style={{ fontSize:11, color:'#a8a29e' }}>{cc.daterange}</div>
                    </div>
                    <button onClick={(e)=>{ e.stopPropagation(); setSheetChallenge(null); }}
                      style={{ width:28, height:28, borderRadius:'50%', background:'#f0efec', border:'none', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', color:'#78716c', flexShrink:0 }}>
                      <I.Close/>
                    </button>
                  </div>
                </div>

                {/* Your progress */}
                <div style={{ padding:'14px 16px', borderBottom:'1px solid #efefed' }}>
                  <div style={{ fontSize:10, fontWeight:700, letterSpacing:'0.07em', textTransform:'uppercase', color:'#a8a29e', marginBottom:10 }}>Your progress</div>
                  <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
                    <div>
                      <span style={{ fontSize:24, fontWeight:800, color:'#1a1a18', letterSpacing:'-0.025em' }}>{cc.userRoutines}</span>
                      <span style={{ fontSize:13, fontWeight:500, color:'#a8a29e' }}> / {cc.totalRoutines}</span>
                      <div style={{ fontSize:11, color:'#78716c', marginTop:2 }}>Day {cc.currentDay} of {cc.totalDays}</div>
                    </div>
                    <div style={{ background:'linear-gradient(135deg,#fcd34d,#fbbf24)', borderRadius:10, padding:'6px 12px', display:'flex', alignItems:'center', gap:4 }}>
                      <svg viewBox="0 0 24 24" fill="#92400e" stroke="none" width="10" height="10"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                      <span style={{ fontSize:13, fontWeight:800, color:'#92400e' }}>#{cc.rank} of {cc.rankOf}</span>
                    </div>
                  </div>
                  <div style={{ height:5, background:'#f0efec', borderRadius:3, overflow:'hidden', marginBottom:6 }}>
                    <div style={{ height:'100%', width:`${pct}%`, background:'linear-gradient(90deg,#fcd34d,#fbbf24)', borderRadius:3 }}/>
                  </div>
                  <div style={{ fontSize:10.5, color:'#57534e', fontWeight:500 }}>{cc.gapText} — complete today to close the gap</div>
                </div>

                {/* Leaderboard */}
                <div style={{ padding:'14px 16px', borderBottom:'1px solid #efefed' }}>
                  <div style={{ fontSize:10, fontWeight:700, letterSpacing:'0.07em', textTransform:'uppercase', color:'#a8a29e', marginBottom:10 }}>Leaderboard</div>
                  {cc.leaderboard.map((entry, idx) => {
                    const lpct = (entry.routines / cc.totalRoutines) * 100;
                    const medals = {1:{bg:'linear-gradient(135deg,#fcd34d,#fbbf24)',c:'#92400e'},2:{bg:'#e7e5e4',c:'#57534e'},3:{bg:'linear-gradient(135deg,#d4a95a,#c9813a)',c:'#7c4a0e'}};
                    const medal = medals[entry.rank];
                    return (
                      <div key={idx} style={{
                        display:'flex', alignItems:'center', gap:9, padding:'8px 10px',
                        borderRadius:12, marginBottom:5,
                        background:entry.isUser?'rgba(252,211,77,0.08)':'#fff',
                        border:entry.isUser?'1.5px solid rgba(251,191,36,0.28)':'1px solid #f5f5f4',
                      }}>
                        <div style={{ width:20, height:20, borderRadius:5, flexShrink:0, background:medal?medal.bg:'transparent', display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, fontWeight:800, color:medal?medal.c:'#c4bfb8' }}>{entry.rank}</div>
                        <div style={{ width:28, height:28, borderRadius:'50%', flexShrink:0, background:entry.grad, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:11, fontWeight:700, boxShadow:entry.isUser?'0 0 0 2px rgba(251,191,36,0.45)':'none' }}>{entry.initial}</div>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ display:'flex', alignItems:'center', gap:4, marginBottom:4 }}>
                            <span style={{ fontSize:12, fontWeight:entry.isUser?800:500, color:'#1a1a18' }}>{entry.name}</span>
                            {entry.isUser && <span style={{ fontSize:8, fontWeight:700, padding:'1px 5px', borderRadius:4, background:'rgba(251,191,36,0.18)', color:'#c9a227' }}>You</span>}
                          </div>
                          <div style={{ height:3, background:'#f0efec', borderRadius:2, overflow:'hidden' }}>
                            <div style={{ height:'100%', width:`${lpct}%`, background:entry.isUser?'linear-gradient(90deg,#fcd34d,#fbbf24)':entry.rank===1?'#778a62':'#d6d3d1', borderRadius:2 }}/>
                          </div>
                        </div>
                        <div style={{ textAlign:'right', flexShrink:0, minWidth:24 }}>
                          <span style={{ fontSize:13, fontWeight:800, color:'#1a1a18' }}>{entry.routines}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Activity feed */}
                <div style={{ padding:'14px 16px' }}>
                  <div style={{ fontSize:10, fontWeight:700, letterSpacing:'0.07em', textTransform:'uppercase', color:'#a8a29e', marginBottom:10 }}>Recent activity</div>
                  {cc.activity.map((item, idx) => (
                    <div key={idx} style={{ display:'flex', alignItems:'center', gap:10, padding:'9px 0', borderBottom:idx<cc.activity.length-1?'1px solid #f5f5f4':'none' }}>
                      <div style={{ width:32, height:32, borderRadius:'50%', flexShrink:0, background:item.grad, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:12, fontWeight:700, boxShadow:item.isUser?'0 0 0 2px rgba(251,191,36,0.4)':'none' }}>{item.initial}</div>
                      <div style={{ flex:1 }}>
                        <span style={{ fontSize:12.5, fontWeight:700, color:'#1a1a18' }}>{item.name}</span>
                        {item.isUser && <span style={{ fontSize:8, fontWeight:700, padding:'1px 5px', borderRadius:4, background:'rgba(251,191,36,0.18)', color:'#c9a227', margin:'0 3px' }}>You</span>}
                        <span style={{ fontSize:12, color:'#57534e', fontWeight:400 }}> {item.action}</span>
                      </div>
                      <span style={{ fontSize:10, color:'#a8a29e', flexShrink:0 }}>{item.time}</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}
        </div>
      </div>
    </div>
  );
};


function App() {
  const [pk, setPk] = useState('mayaStandardDayV2');
  const [page, setPage] = useState(1);
  const [animKey, setAnimKey] = useState(0);
  const [directions, setDirections] = useState({ move:null, sleep:null, nutrition:null, mind:null, logging:null });
  const [contexts,   setContexts]   = useState([]);
  const [otherNote,  setOtherNote]  = useState('');
  const [sheet,      setSheet]      = useState(null);
  // v5 — controlled chat tab routing (so the lock-screen notification mock can deep-link into chat)
  const [v5View, setV5View] = useState('home');
  const [chatInitialStage, setChatInitialStage] = useState('main');
  const [chatInitialActivity, setChatInitialActivity] = useState(null);
  // Lock-screen notification mock state: 'idle' | 'logged' | 'dismissed'
  const [notifState, setNotifState] = useState('idle');
  const handleNotifSame = () => {
    setNotifState('logged');
    setTimeout(() => setNotifState('dismissed'), 2400);
  };
  const handleNotifAdjust = () => {
    setChatInitialStage('bp-input');
    setV5View('chat');
    setNotifState('dismissed');
  };
  const handleNotifSnooze = () => {
    setNotifState('dismissed');
  };

  const p = PERSONAS[pk];
  const isEngineStdView  = !!p.isEngineStdView;
  const isEngineStdV2    = !!p.isEngineStdV2;
  const isHomeView = !!p.isHomeView;
  const seq = p.pageSequence || [1,2,3,4,5];
  const currentIdx = seq.indexOf(page);
  const isFirst = currentIdx === 0;
  const isLast  = currentIdx === seq.length - 1;

  const switchPersona = (key) => {
    const newP = PERSONAS[key];
    const newSeq = newP.pageSequence || [1,2,3,4,5];
    setPk(key); setPage(newSeq[0]);
    setDirections({ move:null, sleep:null, nutrition:null, mind:null, logging:null });
    setContexts([]); setOtherNote(''); setSheet(null);
    setV5View('home'); setChatInitialStage('main'); setChatInitialActivity(null); setNotifState('idle');
    setAnimKey(k=>k+1);
  };

  const goNext = () => { if (currentIdx < seq.length-1) setPage(seq[currentIdx+1]); };
  const goPrev = () => { if (currentIdx > 0)            setPage(seq[currentIdx-1]); };

  const allDirSet = pillarsFor(p).every(d => directions[d.key]);

  return (
    <>
      <div style={{textAlign:'center',maxWidth:620}}>
        <p style={{fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'#94a47f',margin:'0 0 4px'}}>Lemon · Use cases</p>
        <h1 style={{fontSize:22,fontWeight:800,color:'#1a1a1a',margin:'0 0 6px',letterSpacing:'-0.02em'}}>Maya&apos;s hypertension use case.</h1>
        <p style={{fontSize:13,color:'#78716c',margin:0,lineHeight:1.5}}>{p.isChatView ? 'Chat-logging MVP (Option G) — sodium-aware AI meal flow. Tap "Looks right" to log; the red dot pulses; tap the hamburger to see the journal slide in.' : p.routerStrip ? 'Homepage MVP option 3 — logging lives in chat. Notification (above the device) is the daily-ritual path; the in-app router strip routes to chat for catch-up. The homepage carries no logging UI.' : p.weeklyReportPromoted ? 'Homepage MVP option 2 — weekly report promoted to hero, Logging pillar removed, LemonAsksBP carries the full BP form (sys / dia / pulse / notes) plus an X dismiss.' : p.bpLogVariant === 'ask' ? 'Homepage Logging CTA MVP — LemonAsksBP at the top with the full BP form (sys / dia / pulse / notes), Logging pillar in the rec stack with a "Logged today" state.' : isHomeView ? 'Hypertension homepage — DASH-adjusted nutrition, BP-aware sleep + mind cards, fully interactive. Tap any recommendation for the full detail sheet.' : `Weekly progress report — ${(p.pageSequence||[1,2,3,4,5]).length} pages. Page 1 stats, Page 2 chart + insight per metric, Page ${(p.pageSequence||[1,2,3,4,5]).slice(-1)[0]} commit.`}</p>
      </div>

      <div style={{width:'100%',maxWidth:820}}>
        <div style={{display:'flex',gap:8,padding:'0 4px',flexWrap:'wrap',justifyContent:'flex-start'}}>
          {PERSONA_LIST.map(pp=>{
            const active = pk===pp.key;
            return (
              <button key={pp.key} onClick={()=>switchPersona(pp.key)}
                style={{
                  display:'flex', alignItems:'center', gap:8, padding:'8px 12px', borderRadius:16, flexShrink:0,
                  border:`1.5px solid ${active?'#1a1a1a':'#d8d3c8'}`, background:active?'#fff':'rgba(255,255,255,0.55)',
                  cursor:'pointer', fontFamily:'inherit', transition:'all 0.18s', boxShadow:active?'0 4px 14px rgba(0,0,0,0.10)':'none',
                }}>
                <div style={{width:30,height:30,borderRadius:'50%',background:pp.grad,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#fff'}}>{pp.initial}</div>
                <div style={{textAlign:'left'}}>
                  <p style={{fontSize:12,fontWeight:700,color:active?'#1a1a1a':'#57534e',margin:0,whiteSpace:'nowrap'}}>{pp.name}, {pp.age}</p>
                  <p style={{fontSize:10,color:'#94a47f',margin:0,whiteSpace:'nowrap',fontWeight:600}}>{pp.label}</p>
                </div>
              </button>
            );
          })}
        </div>
      </div>

      <div style={{display:'flex',alignItems:'flex-start',gap:24}}>
      <div className="device" key={`${pk}-${animKey}`}>
        <div className="notch"/>

        {p.isEngineStdV3 ? (
          <EngineStdViewV3 persona={p} onSwitchPersona={switchPersona}/>
        ) : p.isEngineStdV2 ? (
          <EngineStdViewV2 persona={p} onSwitchPersona={switchPersona}/>
        ) : p.isEngineStdView ? (
          <EngineStdView persona={p}/>
        ) : p.isChatView ? (
          <ChatLoggingView/>
        ) : p.isStatsView ? (
          <StatsView persona={p} onSwitchPersona={switchPersona}/>
        ) : p.isChallengeDetailView ? (
          <ChallengeDetailView persona={p} onSwitchPersona={switchPersona}/>
        ) : p.isCommunityView ? (
          <CommunityView persona={p} onSwitchPersona={switchPersona}/>
        ) : p.isMealPrepView ? (
          <MealPrepView persona={p} onSwitchPersona={switchPersona}/>
        ) : isHomeView ? (
          <HomeView
            persona={p}
            onOpenReport={()=>switchPersona('maya')}
            view={p.routerStrip ? v5View : undefined}
            setView={p.routerStrip ? setV5View : undefined}
            chatInitialStage={chatInitialStage}
            onOpenChat={p.routerStrip ? (stage, activity)=>{ setChatInitialStage(stage || 'main'); setChatInitialActivity(activity || null); setV5View('chat'); } : undefined}
            chatInitialActivity={chatInitialActivity}
            onSwitchPersona={switchPersona}
          />
        ) : (
        <>
        <div style={{position:'relative',zIndex:5,padding:'10px 18px 6px',background:'rgba(248,247,243,0.95)',borderBottom:'1px solid #efefed',flexShrink:0}}>
          <div className="flex items-center justify-between">
            <button onClick={!isFirst?goPrev:undefined} className="w-7 h-7 flex items-center justify-center text-stone-400">
              {!isFirst ? <I.Back/> : <I.Close/>}
            </button>
            <div className="flex items-center gap-1.5">
              {seq.map(n=>(
                <button key={n} onClick={()=>setPage(n)} className="rounded-full transition-all"
                  style={{height:6, width: page===n ? 22 : 6, background: page===n ? p.accent : '#d6d3d1'}}/>
              ))}
            </div>
            <button className="w-7 h-7 flex items-center justify-center text-stone-400"><I.Share/></button>
          </div>
        </div>

        <div className="screen fi" key={`${pk}-${page}`} style={{position:'relative'}}>
          {page===1 && <Page1 p={p}/>}
          {page===2 && <Page2 p={p}/>}
          {page===3 && (
            <Page3 p={p}
              directions={directions} setDirections={setDirections}
              contexts={contexts} setContexts={setContexts}
              otherNote={otherNote} setOtherNote={setOtherNote}
              onContinue={goNext}/>
          )}
          {page===4 && <Page4 p={p} directions={directions} contexts={contexts} onContinue={goNext}/>}
          {page===5 && <Page5 p={p} directions={directions} openSheet={setSheet} onBackToHome={()=>switchPersona('mayaHomeV5')}/>}

          {sheet==='doctor' && p.commit.doctor && (
            <BottomSheet onClose={()=>setSheet(null)} title={`Preview — what ${p.commit.doctor.name} receives`}>
              <p className="text-[11.5px] text-stone-500 mb-3 leading-relaxed">
                Sent Sunday evening. Email + PDF attachment. {p.commit.doctor.name} doesn’t need Lemon.
              </p>
              <DoctorView p={p} accent={p.accent}/>
              <div className="mt-4">
                <p className="text-[11px] font-semibold uppercase tracking-wide text-stone-400 mb-2">Attached PDF</p>
                <PDFExportPreview p={p}/>
              </div>
              <div className="mt-4 flex gap-2">
                <button className="flex-1 py-3 rounded-xl text-[13px] font-semibold text-white inline-flex items-center justify-center gap-1.5" style={{background:p.accent}}>
                  <I.Send/> Send to {p.commit.doctor.name}
                </button>
                <button className="px-4 py-3 rounded-xl text-[13px] font-semibold text-stone-600 bg-stone-100">Save PDF</button>
              </div>
              <p className="text-[10.5px] text-stone-400 mt-3 leading-snug text-center italic">
                For clinical reference only. Lemon is not a medical device.
              </p>
            </BottomSheet>
          )}
          {sheet==='export' && p.canExport && (
            <BottomSheet onClose={()=>setSheet(null)} title="Preview — 28-day BP report (PDF)">
              <p className="text-[11.5px] text-stone-500 mb-3 leading-relaxed">
                A one-page PDF you can save, print, or share. Generated on demand from your last 28 days of logged data.
              </p>
              <PDFExportPreview p={p}/>
              <div className="mt-4 flex gap-2">
                <button className="flex-1 py-3 rounded-xl text-[13px] font-semibold text-white" style={{background:p.accent}}>Save PDF</button>
                <button className="flex-1 py-3 rounded-xl text-[13px] font-semibold text-stone-600 bg-stone-100">Share</button>
              </div>
              <p className="text-[10.5px] text-stone-400 mt-3 leading-snug text-center italic">
                For personal reference only. Lemon is not a medical device.
              </p>
            </BottomSheet>
          )}
        </div>

        {!isLast && (
          <div style={{padding:'10px 18px 14px',background:'rgba(248,247,243,0.97)',borderTop:'1px solid #efefed',flexShrink:0}}>
            <div className="flex items-center justify-between">
              <button onClick={goPrev} disabled={isFirst}
                className={`text-[13px] font-semibold inline-flex items-center gap-1 ${isFirst?'text-stone-300':'text-stone-500'}`}>
                <I.Back/>Back
              </button>
              <span className="text-[11px] text-stone-400">{currentIdx+1} of {seq.length}</span>
              <button onClick={goNext}
                className="text-[13px] font-semibold inline-flex items-center gap-1"
                style={{color:p.accent, opacity: page===3 && !allDirSet ? 0.4 : 1}}
                disabled={page===3 && !allDirSet}>
                Next <I.Forward/>
              </button>
            </div>
          </div>
        )}
        </>
        )}
      </div>

      {/* Lock-screen notification — floats to the right of the phone */}
      {p.showLockNotif && notifState !== 'dismissed' && (
        <div className="fi" style={{display:'flex',flexDirection:'column',gap:10,paddingTop:48,width:280,flexShrink:0}}>
          <p style={{fontSize:11,fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:'#94a47f',margin:0}}>Lock screen · 7:00 AM</p>
          <div style={{
            background: notifState === 'logged' ? 'rgba(240,250,244,0.96)' : 'rgba(255,255,255,0.94)',
            border:'1px solid rgba(0,0,0,0.06)',
            borderRadius:18,
            padding:'12px 14px 14px',
            boxShadow:'0 14px 40px rgba(28,32,48,0.18)',
            backdropFilter:'blur(20px)',
            transition:'all 0.3s ease',
          }}>
            <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:8}}>
              <div style={{
                width:24, height:24, borderRadius:6,
                background: notifState === 'logged' ? '#4CAF7D' : 'linear-gradient(135deg,#fcd34d,#fbbf24)',
                color: notifState === 'logged' ? '#fff' : '#1a1a1a',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontWeight:800, fontSize:11, flexShrink:0,
              }}>{notifState === 'logged' ? <I.Check/> : 'L'}</div>
              <span style={{fontSize:11.5,fontWeight:600,color:'#3a3a38',letterSpacing:'0.02em'}}>LEMON</span>
              <span style={{fontSize:11,color:'#a8a29e',marginLeft:'auto'}}>{notifState === 'logged' ? 'just now' : 'now'}</span>
            </div>
            {notifState === 'logged' ? (
              <>
                <p style={{fontSize:14,fontWeight:700,color:'#1a1a1a',margin:'0 0 2px',letterSpacing:'-0.01em'}}>Logged · 124/82 mmHg</p>
                <p style={{fontSize:12.5,color:'#4CAF7D',fontWeight:600,margin:0,lineHeight:1.4}}>Pulse 66 · 5-day streak below 125</p>
              </>
            ) : (
              <>
                <p style={{fontSize:14,fontWeight:700,color:'#1a1a1a',margin:'0 0 2px',letterSpacing:'-0.01em'}}>Time to log your morning BP</p>
                <p style={{fontSize:12.5,color:'#57534e',margin:'0 0 10px',lineHeight:1.4}}>Yesterday: <span style={{fontWeight:700,color:'#3a3a38'}}>124/82</span> · pulse 66</p>
                <div style={{display:'grid',gridTemplateColumns:'1.4fr 1fr 0.9fr',gap:6,borderTop:'1px solid rgba(0,0,0,0.07)',paddingTop:8}}>
                  <button onClick={handleNotifSame} style={{
                    padding:'9px 8px', borderRadius:11,
                    background:'rgba(0,0,0,0.05)', border:'none',
                    fontSize:11.5, fontWeight:700, color:'#1a1a1a',
                    cursor:'pointer', fontFamily:'inherit', transition:'background 0.15s',
                  }}>Same as yesterday</button>
                  <button onClick={handleNotifAdjust} style={{
                    padding:'9px 8px', borderRadius:11,
                    background:'rgba(0,0,0,0.05)', border:'none',
                    fontSize:11.5, fontWeight:600, color:'#3a3a38',
                    cursor:'pointer', fontFamily:'inherit', transition:'background 0.15s',
                  }}>Adjust</button>
                  <button onClick={handleNotifSnooze} style={{
                    padding:'9px 8px', borderRadius:11,
                    background:'rgba(0,0,0,0.05)', border:'none',
                    fontSize:11.5, fontWeight:600, color:'#78716c',
                    cursor:'pointer', fontFamily:'inherit', transition:'background 0.15s',
                  }}>Snooze</button>
                </div>
              </>
            )}
          </div>
          <p style={{fontSize:11,color:'#a8a29e',margin:0,lineHeight:1.4}}>{notifState === 'logged' ? 'Done. App never opened. The metric widget updates next time you do.' : '~80% of mornings: tap "Same as yesterday" → logged without opening the app.'}</p>
        </div>
      )}

      </div>{/* end phone + notification flex row */}

      <div style={{maxWidth:620,fontSize:11,color:'#a8a29e',textAlign:'center',lineHeight:1.6}}>
        {p.isChatView
          ? <>Chat logging (Option G refined) · Sodium-aware meal capture for hypertension. Tap “Looks right” to log → red dot pulses on the menu → tap the hamburger to slide in the Health Journal drawer.<br/>Numbers are illustrative.</>
          : p.bpLogVariant === 'ask'
          ? <>Option 3 — Lemon asks. A warm conversational prompt at the top of the cards area. Two inline number fields with yesterday as anchor → submit collapses the ask to a single sage confirmation line; the BP metric tile updates in lockstep.<br/>Numbers are illustrative.</>
          : isHomeView
          ? p.key==='mayaHomeTrigger'
            ? <>Main Page · Trigger Line — each recommendation card surfaces a data-grounded reason it&apos;s showing today. Signal first (bolded, card-colored), implication second. Tests whether personalised context drives action.<br/>Numbers are illustrative.</>
            : p.key==='mayaHomeLogOwn'
            ? <>Main Page · Log Your Own — same as Main Page MVP but with a free-text &ldquo;log your own&rdquo; input on each card. Users can record activities that aren&apos;t in the suggestion list.<br/>Numbers are illustrative.</>
            : <>Hypertension homepage · DASH-adjusted recommendations, fully interactive cards, calendar scheduling, and a Sunday "Week in review" banner that opens the weekly progress report.<br/>Numbers are illustrative.</>
          : <>Weekly progress report · {(p.pageSequence||[1,2,3,4,5]).length} pages — Page 1 stats (BP / Weight / Actions), Page 2 charts and insights, {p.pageSequence && p.pageSequence.includes(3) ? 'Page 3 plan review, ' : ''}Page {(p.pageSequence||[1,2,3,4,5]).slice(-1)[0]} commit. Submit lands on a celebration screen.<br/>Numbers are illustrative.</>
        }
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
