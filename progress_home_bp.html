  .hide-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }
  .lemon-text { background:linear-gradient(135deg,#c9a227,#e8b820); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .doc-shadow { box-shadow: 0 4px 16px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04); }

  @keyframes slide-up   { from {opacity:0; transform:translateY(14px);} to {opacity:1; transform:translateY(0);} }
  @keyframes sheet-up   { from {transform:translateY(100%);} to {transform:translateY(0);} }
  @keyframes fade-in    { from {opacity:0;} to {opacity:1;} }
  @keyframes pop        { 0% {transform:scale(0.85); opacity:0;} 60% {transform:scale(1.04);} 100% {transform:scale(1); opacity:1;} }
  @keyframes draw-line  { from {stroke-dashoffset:600;} to {stroke-dashoffset:0;} }
  @keyframes celebrate-bounce {
    0%   { transform:scale(0.3) rotate(-10deg); opacity:0; }
    50%  { transform:scale(1.15) rotate(3deg);  opacity:1; }
    70%  { transform:scale(0.95) rotate(-1deg); }
    100% { transform:scale(1) rotate(0deg);     opacity:1; }
  }
  @keyframes dot-bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }
  @keyframes video-prog { from{width:0%} to{width:100%} }
  @keyframes sound-wave { 0%,100%{height:4px} 50%{height:12px} }
  .dot1{animation:dot-bounce 1.2s ease-in-out 0s infinite}
  .dot2{animation:dot-bounce 1.2s ease-in-out 0.2s infinite}
  .dot3{animation:dot-bounce 1.2s ease-in-out 0.4s infinite}
  .vid-playing{animation:video-prog 10s linear both}
  .sw1{animation:sound-wave 0.8s ease-in-out 0s infinite}
  .sw2{animation:sound-wave 0.8s ease-in-out 0.15s infinite}
  .sw3{animation:sound-wave 0.8s ease-in-out 0.3s infinite}
  .sw4{animation:sound-wave 0.8s ease-in-out 0.45s infinite}
  .su   { animation:slide-up 0.45s ease-out both; }
  .su1  { animation:slide-up 0.45s ease-out 0.07s both; }
  .su2  { animation:slide-up 0.45s ease-out 0.14s both; }
  .su3  { animation:slide-up 0.45s ease-out 0.21s both; }
  .su4  { animation:slide-up 0.45s ease-out 0.28s both; }
  .su5  { animation:slide-up 0.45s ease-out 0.35s both; }
  .fi   { animation:fade-in 0.35s ease-out both; }
  .pop  { animation:pop 0.45s ease-out both; }
  .sheet-in { animation:sheet-up 0.32s cubic-bezier(0.32, 0.72, 0, 1) both; }
  .draw-line  { stroke-dasharray:600; animation:draw-line 1.4s ease-out 0.2s both; }
  .celebrate  { animation:celebrate-bounce 0.7s ease-out; }
  .adjust-area {
    background:#fff; outline:none;
    border:1px solid #e7e5e4; border-radius:14px;
    width:100%; padding:14px;
    color:#3a3a38; font: inherit; resize:none;
    transition: all 0.15s ease;
  }

const StateBadge = ({ state }) => {
  const map = { on:{lbl:'on track',color:'#4CAF7D'}, up:{lbl:'improving',color:'#3d7a9e'}, work:{lbl:'work area',color:'#F0A030'} };
  const m = map[state] || map.on;
  return <span className="text-[9px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded" style={{background:m.color+'18',color:m.color}}>{m.lbl}</span>;
};

const PillarRow = ({ pillarKey, accent, persona }) => {
  const def = PILLAR_DEFS.find(p=>p.key===pillarKey);
  const data = persona.pillars[pillarKey];
  const IC = I[def.icon] || I.Heart;
  return (
    <div className="bg-white rounded-2xl border border-stone-150 px-4 py-3 flex items-center gap-3">
      <div className="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0" style={{background:accent+'18',color:accent}}><IC/></div>

        <div className="flex items-center gap-2 mb-0.5">

const DeltaPill = ({ delta, kind, color }) => {
  const Icon = kind==='flat' ? I.TrendFlat : kind==='good' ? I.TrendDn : I.TrendUp;
  return (
    <span className="inline-flex items-center gap-1 px-2 py-1 rounded-full text-[11px] font-semibold" style={{background:color+'18',color}}>
      <Icon/><span>{delta}</span>
    </span>
  );
};

const TrendChart = ({ series, accent, target=null, todayLabel='today' }) => {
  const w=305, h=140, pad=18;
  const min = (target!==null ? Math.min(...series, target) : Math.min(...series)) - 4;
  const max = (target!==null ? Math.max(...series, target) : Math.max(...series)) + 4;
  const x = i => pad + (i*(w-pad*2))/(series.length-1);
  const y = v => h - pad - ((v-min)/(max-min))*(h-pad*2);
  const rolling = series.map((_,i)=>{
    const start = Math.max(0,i-6);
    const slice = series.slice(start,i+1);
    return slice.reduce((a,b)=>a+b,0)/slice.length;
  });
  const linePath = series.map((v,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const avgPath  = rolling.map((v,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const tY = target!==null ? y(target).toFixed(1) : null;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
      {target!==null && (
        <>
          <line x1={pad} y1={tY} x2={w-pad} y2={tY} stroke="#94a47f" strokeWidth="1" strokeDasharray="3 4" opacity="0.6"/>
          <text x={w-pad} y={Number(tY)-4} fontSize="9" fill="#94a47f" textAnchor="end" fontWeight="600">target ≤ {target}</text>
        </>
      )}
      <path d={linePath} fill="none" stroke={accent+'40'} strokeWidth="1.4" strokeLinecap="round"/>
      {series.map((v,i)=> (
        <circle key={i} cx={x(i)} cy={y(v)} r={i===series.length-1?3.2:1.6} fill={i===series.length-1?accent:accent+'80'}/>
      ))}
      <path d={avgPath} fill="none" stroke={accent} strokeWidth="2.2" strokeLinecap="round" className="draw-line"/>
      <text x={pad} y={h-4} fontSize="9" fill="#a8a29e">28d ago</text>
      <text x={w-pad} y={h-4} fontSize="9" fill="#a8a29e" textAnchor="end">{todayLabel}</text>
    </svg>
  );
};

// ─────────────────────────────────────────────────────────────────────────────
// PAGE 1
// ─────────────────────────────────────────────────────────────────────────────
const Page1 = ({ p }) => {
  const fullBP   = !p.bp.insufficient && !p.bp.notTracked;
  const sparseBP = !!p.bp.insufficient;
  const noBP     = !!p.bp.notTracked;
  const trendKind  = fullBP && (p.bp.deltaSys < -1 ? 'good' : p.bp.deltaSys > 1 ? 'bad' : 'flat');
  const trendColor = trendKind==='good' ? '#4CAF7D' : trendKind==='bad' ? '#E05C5C' : '#F0A030';
  const deltaTxt   = fullBP ? `${p.bp.deltaSys>0?'+':''}${p.bp.deltaSys}/${p.bp.deltaDia>0?'+':''}${p.bp.deltaDia} mmHg vs prior wk` : '';

  return (
    <div className="px-5 pt-6 pb-8 bg-gradient-to-b from-white via-warm-50 to-white min-h-full">
      <div className="su mb-3">
        <p className="text-[11px] font-semibold uppercase tracking-wide text-stone-400">{p.week}</p>
        <h1 className="text-2xl font-bold text-stone-600 leading-tight mt-1">Week in review</h1>
      </div>

      {fullBP && (
        <div className="bg-white rounded-3xl border border-stone-150 p-5 mt-4 su1 shadow-sm">
          <div className="flex items-baseline justify-between mb-1">
            <span className="text-[11px] font-semibold uppercase tracking-wide text-stone-400">7-day average</span>
            <DeltaPill delta={deltaTxt} kind={trendKind} color={trendColor}/>
          </div>
          <div className="flex items-baseline gap-2 mt-2">
            <span className="text-[56px] font-bold leading-none" style={{color:p.accent}}>{p.bp.avgSys}</span>
            <span className="text-3xl font-semibold text-stone-400 leading-none">/{p.bp.avgDia}</span>
            <span className="text-sm text-stone-400 ml-1 mb-1">mmHg</span>
          </div>
          <p className="text-sm text-stone-500 mt-3 leading-relaxed">{p.summary}</p>
          <p className="text-[11px] text-stone-400 mt-3 italic leading-snug">A single reading isn’t the trend. The 7-day average is the number we watch.</p>
        </div>
      )}

      {sparseBP && (
        <div className="bg-white rounded-3xl border border-stone-150 p-5 mt-4 su1 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <span className="text-[11px] font-semibold uppercase tracking-wide text-stone-400">Building your baseline</span>
            <span className="text-[11px] font-semibold text-stone-400">{p.bp.logs} of {p.bp.target} logs</span>
          </div>
          <div className="flex gap-1.5 mb-4">
            {[...Array(p.bp.target)].map((_,i)=>(
              <div key={i} className="flex-1 h-2.5 rounded-full" style={{background: i < p.bp.logs ? p.accent : '#e7e5e4'}}/>
            ))}
          </div>
          <p className="text-[15px] font-semibold text-stone-600 leading-snug">{p.summary}</p>
          <p className="text-[12.5px] text-stone-500 mt-2 leading-relaxed">{p.bp.note}</p>
          {p.bp.partialReadings && (
            <div className="mt-3 pt-3 border-t border-stone-150 flex items-center gap-2 flex-wrap">
              <span className="text-[10px] font-semibold uppercase tracking-wide text-stone-400">Logged:</span>
              {p.bp.partialReadings.map((r,i)=>(
                <span key={i} className="text-[11px] font-semibold text-stone-500 px-2 py-0.5 rounded-full bg-stone-100">{r}</span>
              ))}
            </div>
          )}
        </div>
      )}

      {noBP && (
        <div className="bg-white rounded-3xl border border-stone-150 p-5 mt-4 su1 shadow-sm">
          <div className="flex items-baseline justify-between mb-1">
            <span className="text-[11px] font-semibold uppercase tracking-wide text-stone-400">Your week</span>
            <DeltaPill delta={`+${p.bp.sleepDelta} sleep score`} kind="good" color="#4CAF7D"/>
          </div>
          <div className="flex items-baseline gap-2 mt-2">
            <span className="text-[56px] font-bold leading-none" style={{color:p.accent}}>{p.bp.sleepAvg}</span>
            <span className="text-sm text-stone-400 ml-1 mb-1">avg sleep score</span>
          </div>
          <p className="text-sm text-stone-500 mt-3 leading-relaxed">{p.summary}</p>
          <div className="mt-3 pt-3 border-t border-stone-150 grid grid-cols-2 gap-3">
            <div>
              <p className="text-[10px] font-semibold uppercase tracking-wide text-stone-400">Steps · daily avg</p>
              <p className="text-[15px] font-bold text-stone-600 mt-0.5">{p.bp.stepsAvg} <span className="text-[10px] text-stone-400 font-normal ml-1">{p.bp.stepsDelta}</span></p>
            </div>
            <div>
              <p className="text-[10px] font-semibold uppercase tracking-wide text-stone-400">BP logging</p>
              <p className="text-[12px] font-semibold text-stone-500 mt-0.5">Off · turn on anytime</p>
            </div>
          </div>
        </div>
      )}

      <div className="mt-5 su2">
        <p className="text-[11px] font-semibold uppercase tracking-wide text-stone-400 mb-2.5">Pillars this week</p>
        <div className="space-y-2">
          {pillarsFor(p).map(d => <PillarRow key={d.key} pillarKey={d.key} accent={p.accent} persona={p}/>)}
        </div>
      </div>
    </div>
  );
};

// ─────────────────────────────────────────────────────────────────────────────
// PAGE 2
// ─────────────────────────────────────────────────────────────────────────────
const Page2 = ({ p }) => {
  const fullBP = !p.bp.insufficient && !p.bp.notTracked;
  const series = fullBP ? p.bp.series : p.bp.sleepSeries;
  const target = fullBP ? 130 : null;
  const heroVal = fullBP
    ? `${p.bp.avgSys}/${p.bp.avgDia}`
    : `${Math.round(series.slice(-7).reduce((a,b)=>a+b,0)/7)} avg`;
  const heroLbl = fullBP ? '7-day BP average · today' : '7-day sleep score · today';
  const noBP   = !fullBP;
  const noBPSubtitle = p.bp.notTracked
    ? 'BP logging is off — sleep score is the next-best signal we trust. Turn on logging in Settings to switch this view to BP.'
    : 'Without daily BP, sleep score is the closest signal we trust. We’ll switch to BP once your trend lights up.';

  return (
    <div className="px-5 pt-6 pb-8 bg-gradient-to-b from-white via-sage-50/40 to-white min-h-full">
      <div className="su mb-3">
        <p className="text-[11px] font-semibold uppercase tracking-wide text-stone-400">Data &amp; insights</p>
        <h1 className="text-2xl font-bold text-stone-600 leading-tight mt-1">{fullBP ? 'Your BP, last 28 days' : 'Your sleep, last 28 days'}</h1>
        {noBP && <p className="text-[12.5px] text-stone-500 mt-1.5 leading-relaxed">{noBPSubtitle}</p>}
      </div>

      <div className="bg-white rounded-3xl border border-stone-150 p-4 mt-3 su1 shadow-sm">
        <div className="flex items-center justify-between mb-3">
          <div>
            <p className="text-[11px] text-stone-400">{heroLbl}</p>
            <p className="text-2xl font-bold mt-0.5" style={{color:p.accent}}>{heroVal}</p>
          </div>
          <div className="text-right">
            <p className="text-[11px] text-stone-400">28-day high</p>
            <p className="text-sm font-semibold text-stone-600 mt-0.5">{Math.max(...series)}{fullBP?' sys':''}</p>
          </div>
        </div>
        <TrendChart series={series} accent={p.accent} target={target}/>
        <div className="mt-3 flex items-center gap-3 text-[11px] text-stone-500">
          <span className="inline-flex items-center gap-1.5"><span className="w-3 h-0.5 rounded-full" style={{background:p.accent+'80'}}/>{fullBP?'daily reading':'daily score'}</span>
          <span className="inline-flex items-center gap-1.5"><span className="w-3 h-0.5 rounded-full" style={{background:p.accent}}/>7-day rolling avg</span>
        </div>
      </div>

      <div className="mt-4 su2 rounded-3xl p-4 shadow-sm" style={{background:p.accent+'10',border:`1.5px solid ${p.accent}28`}}>
        <div className="flex items-center gap-2 mb-2">
          <span style={{color:p.accent}}><I.Sparkles/></span>
          <p className="text-[11px] font-semibold uppercase tracking-wide" style={{color:p.accent}}>What moved the needle · {p.causeEffect.pillar}</p>
        </div>
        <p className="text-base font-semibold text-stone-600 leading-snug">{p.causeEffect.headline}</p>
        <p className="text-sm text-stone-500 mt-2 leading-relaxed">{p.causeEffect.detail}</p>
      </div>

      {fullBP && (
        <div className="mt-4 su3 rounded-2xl p-4 bg-stone-100 border border-stone-150">
          <p className="text-[11px] font-semibold uppercase tracking-wide text-stone-500">One high reading, in context</p>
          <p className="text-sm text-stone-600 mt-1.5 leading-relaxed"><span className="font-semibold">{p.bp.single.value}</span> · {p.bp.single.day}. {p.bp.single.context} Your 7-day average is still {p.bp.avgSys}/{p.bp.avgDia}.</p>
        </div>
      )}
    </div>
  );
};

// ─────────────────────────────────────────────────────────────────────────────
// PAGE 3
// ─────────────────────────────────────────────────────────────────────────────
const Page3 = ({ p, directions, setDirections, contexts, setContexts, otherNote, setOtherNote, onContinue }) => {
  const visible = pillarsFor(p);
  const allSet = visible.every(d => directions[d.key]);
  const setDir = (key, val) => setDirections(prev => ({...prev, [key]: val}));
  const toggleCtx = (id) => setContexts(prev => prev.includes(id) ? prev.filter(c=>c!==id) : [...prev, id]);

  return (
    <div className="px-5 pt-6 pb-8 bg-gradient-to-b from-white via-warm-50 to-white min-h-full">
      <div className="su">
        <p className="text-[11px] font-semibold uppercase tracking-wide text-stone-400">Context check-in</p>
        <h1 className="text-2xl font-bold text-stone-600 leading-tight mt-1">How do you want to take next week?</h1>
        <p className="text-sm text-stone-500 mt-2 leading-relaxed">Set a direction for each pillar. Lemon’s suggestion is highlighted — change anything.</p>
      </div>

      <div className="mt-5 space-y-2.5 su1">
        {visible.map((d) => {
          const IC = I[d.icon] || I.Heart;
          const data = p.pillars[d.key];
          const sug  = p.suggestions[d.key];
          const cur  = directions[d.key];
          return (
            <div key={d.key} className="bg-white rounded-2xl border border-stone-150 p-3.5">
              <div className="flex items-center gap-3 mb-3">
                <div className="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0" style={{background:p.accent+'18',color:p.accent}}><IC/></div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 mb-0.5">
                    <span className="text-[13px] font-semibold text-stone-600">{d.name}</span>
                    <StateBadge state={data.state}/>
                  </div>
                  <p className="text-[11px] text-stone-400 leading-snug">{data.value} · {data.label}</p>
                </div>
              </div>
              <div className="flex gap-1.5">
                {DIRECTION_OPTS.map(opt => {
                  const selected   = cur===opt.id;
                  const recommended= sug===opt.id;
                  return (
                    <button key={opt.id} onClick={()=>setDir(d.key, opt.id)}
                      className="flex-1 py-2 rounded-xl text-[12px] font-semibold transition-all relative"
                      style={{
                        background: selected ? p.accent : recommended ? p.accent+'10' : '#f5f5f4',
                        color:      selected ? '#fff'   : recommended ? p.accent      : '#78716c',
                        border:     selected ? `1.5px solid ${p.accent}` : recommended ? `1.5px solid ${p.accent}40` : '1.5px solid transparent',
                      }}>
                      {opt.label}
                      {recommended && !selected && (
                        <span className="absolute -top-1.5 right-1.5 text-[8px] font-bold uppercase tracking-wider px-1 py-0.5 rounded" style={{background:p.accent,color:'#fff'}}>Suggested</span>
                      )}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      <div className="mt-5 su2">
        <div className="bg-white rounded-2xl border border-stone-150 p-4">
          <p className="text-[11px] font-semibold uppercase tracking-wide text-stone-400 mb-1">Anything going on this week?</p>
          <p className="text-[12px] text-stone-500 mb-3 leading-relaxed">Tell Lemon and the plan adapts — lighter targets, swap-in alternatives, or a held week.</p>
          <div className="flex flex-wrap gap-2">
            {CONTEXT_CHIPS.map(c => {
              const IC = I[c.icon] || I.Dots;
              const active = contexts.includes(c.id);
              return (
                <button key={c.id} onClick={()=>toggleCtx(c.id)}
                  className="inline-flex items-center gap-1.5 px-3 py-2 rounded-full text-[12px] font-semibold transition-all"
                  style={{
                    background: active ? p.accent : '#f5f5f4',
                    color:      active ? '#fff'   : '#57534e',
                    border:     active ? `1.5px solid ${p.accent}` : '1.5px solid transparent',
                  }}>
                  <IC/>{c.label}
                </button>
              );
            })}
          </div>
          {contexts.includes('other') && (
            <textarea value={otherNote} onChange={e=>setOtherNote(e.target.value)} placeholder="Tell us briefly… (optional)" rows={2}
              className="w-full mt-3 px-3.5 py-2.5 border border-stone-150 rounded-xl text-[13px] focus:outline-none focus:border-stone-300 resize-none"/>
          )}
        </div>
      </div>

      <button onClick={onContinue} disabled={!allSet}
        className="w-full mt-6 py-3.5 rounded-2xl font-semibold text-sm flex items-center justify-center gap-2 transition-all"
        style={{
          background: allSet ? p.accent : '#e7e5e4',
          color:      allSet ? '#fff'   : '#a8a29e',
          boxShadow:  allSet ? `0 6px 20px ${p.accent}33` : 'none',
          cursor:     allSet ? 'pointer' : 'not-allowed',
        }}>
        See your plan <I.Right/>
      </button>
      {!allSet && <p className="text-center text-[11px] text-stone-400 mt-2">Pick a direction for each pillar.</p>}
    </div>
  );
};

// ─────────────────────────────────────────────────────────────────────────────
// PAGE 4
// ─────────────────────────────────────────────────────────────────────────────
const Page4 = ({ p, directions, contexts, onContinue }) => {
  const [targets, setTargets] = useState(()=> p.plan.targets.map(t=>({...t})));
  const [editing, setEditing] = useState(null);
  const adjust = (idx, delta) => {
    setTargets(prev => prev.map((t,i)=>{
      if (i!==idx) return t;
      const step = t.step || 1;
      return { ...t, target: Math.max(t.min, Math.min(t.max, t.target + delta*step)) };
    }));
  };

  const visible = pillarsFor(p);
  const dirSummary = visible.map(d => directions[d.key]).filter(Boolean);
  const pushCount     = dirSummary.filter(v=>v==='push').length;
  const lighterCount  = dirSummary.filter(v=>v==='lighter').length;
  const maintainCount = dirSummary.filter(v=>v==='maintain').length;

  return (
    <div className="px-5 pt-6 pb-8 bg-gradient-to-b from-white via-sage-50/30 to-white min-h-full">
      <div className="su">
        <p className="text-[11px] font-semibold uppercase tracking-wide text-stone-400">{p.plan.week} plan</p>
        <h1 className="text-2xl font-bold text-stone-600 leading-tight mt-1">Built from your data</h1>
        <p className="text-sm text-stone-500 mt-2 leading-relaxed">Adjust anything. We’ll keep the science underneath.</p>
      </div>

      <div className="mt-4 flex flex-wrap gap-2 su1">
        {pushCount>0     && <span className="text-[11px] font-semibold px-2.5 py-1 rounded-full" style={{background:p.accent+'18',color:p.accent}}>Pushing {pushCount}</span>}
        {maintainCount>0 && <span className="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-stone-100 text-stone-500">Maintaining {maintainCount}</span>}
        {lighterCount>0  && <span className="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-amber-100 text-amber-700">Lighter on {lighterCount}</span>}
        {contexts.length>0 && (
          <span className="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-warm-100 text-stone-500">Context: {contexts.join(', ')}</span>
        )}
      </div>

      <div className="mt-5 rounded-2xl p-4 su2" style={{background:p.accent+'0d',border:`1px solid ${p.accent}22`}}>
        <div className="flex items-start gap-2">
          <span className="mt-0.5" style={{color:p.accent}}><I.Sparkles/></span>
          <div>
            <p className="text-[11px] font-semibold uppercase tracking-wide" style={{color:p.accent}}>{p.plan.tip.title}</p>
            <p className="text-[13px] text-stone-600 mt-1 leading-relaxed">{p.plan.tip.body}</p>
          </div>
        </div>
      </div>

      <div className="mt-5 su3">
        <div className="flex items-center justify-between mb-2">
          <p className="text-[11px] font-semibold uppercase tracking-wide text-stone-400">Weekly targets</p>
          <p className="text-[11px] text-stone-400">Tap to adjust</p>
        </div>
        <div className="bg-white rounded-2xl border border-stone-150 overflow-hidden">
          {targets.map((t,idx)=>{
            const TI = I[t.icon] || I.Heart;
            const isOpen = editing===idx;
            const dir = directions[t.pillar];
            return (
              <div key={idx} className={`px-4 py-3 ${idx<targets.length-1?'border-b border-stone-150':''}`}>
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style={{background:p.accent+'18',color:p.accent}}><TI/></div>
                  <div className="flex-1 min-w-0">
                    <p className="text-sm text-stone-600 leading-tight">{t.label}</p>
                    {dir && <p className="text-[10px] font-semibold uppercase tracking-wide mt-0.5" style={{color: dir==='push'?p.accent : dir==='lighter'?'#F0A030':'#a8a29e'}}>{dir}</p>}
                  </div>
                  <button onClick={()=>setEditing(isOpen?null:idx)}
                    className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-semibold transition-colors flex-shrink-0 ${isOpen?'bg-stone-100 text-stone-600':'text-stone-600 hover:bg-stone-100'}`}>
                    {t.target}<span className="text-stone-400 text-[11px] ml-0.5">{t.unit}</span>
                    <span className="text-stone-400"><I.Edit/></span>
                  </button>
                </div>
                {isOpen && (
                  <div className="flex items-center justify-end gap-3 mt-2.5 fi">
                    <button onClick={()=>adjust(idx,-1)} className="w-9 h-9 rounded-lg bg-stone-100 flex items-center justify-center text-stone-500 hover:bg-stone-200"><I.Minus/></button>
                    <span className="text-base font-bold text-stone-600 min-w-[52px] text-center">{t.target}<span className="text-[11px] text-stone-400 font-normal ml-0.5">{t.unit}</span></span>
                    <button onClick={()=>adjust(idx,1)} className="w-9 h-9 rounded-lg flex items-center justify-center" style={{background:p.accent+'1f',color:p.accent}}><I.Plus/></button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      <button onClick={onContinue}
        className="w-full mt-6 py-3.5 rounded-2xl font-semibold text-sm flex items-center justify-center gap-2 su4"
        style={{background:p.accent, color:'#fff', boxShadow:`0 6px 20px ${p.accent}33`}}>
        I’m happy with this <I.Right/>
      </button>
      <p className="text-center text-[11px] text-stone-400 mt-2.5">You can edit any target on the homepage during the week.</p>
    </div>
  );
};

// ── BreathingSession — guided box-breathing overlay ───────────────────────
const BreathingSession = ({ option, card, onClose, onDone }) => {
  const [tick, setTick] = useState(0);
  const [isComplete, setIsComplete] = useState(false);

  useEffect(() => {
    if (isComplete) return;
    const t = setInterval(() => {
      setTick(s => {
        const next = s + 1;
        if (next >= BTOTAL_SECS) { setIsComplete(true); return BTOTAL_SECS; }
        return next;
      });
    }, 1000);
    return () => clearInterval(t);
  }, [isComplete]);

  const phaseIdx    = Math.floor(tick / BPHASE_DUR) % BPHASES.length;
  const countdown   = BPHASE_DUR - (tick % BPHASE_DUR);
  const phase       = BPHASES[phaseIdx];
  const isExpanded  = phaseIdx === 0 || phaseIdx === 1;
  const ringScale   = isExpanded ? 1.0 : 0.52;
  const progressPct = tick / BTOTAL_SECS;
  const circ        = 2 * Math.PI * 130;

  return (
    <div className="fi" style={{position:'absolute',inset:0,background:'#0e0e1a',zIndex:200,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'space-between',padding:'20px 0 32px'}}>
      <div style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0 20px'}}>
        <button onClick={onClose} style={{background:'rgba(255,255,255,0.08)',border:'none',borderRadius:12,padding:'7px 13px',color:'rgba(255,255,255,0.6)',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>End</button>
        <p style={{fontSize:13,fontWeight:700,color:'rgba(255,255,255,0.5)',margin:0}}>{option.label}</p>
        <div style={{width:60}}/>
      </div>
      <div style={{position:'relative',width:300,height:300,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <svg width="300" height="300" style={{position:'absolute',top:0,left:0}}>
          <circle cx="150" cy="150" r="130" fill="none" stroke="rgba(139,109,170,0.12)" strokeWidth="2"/>
          <circle cx="150" cy="150" r="130" fill="none" stroke={card.color} strokeWidth="2.5"
            strokeDasharray={circ} strokeDashoffset={circ * (1 - progressPct)}
            strokeLinecap="round" transform="rotate(-90 150 150)"
            style={{transition:'stroke-dashoffset 1s linear'}}/>
        </svg>
        <div style={{position:'absolute',width:220,height:220,borderRadius:'50%',border:`1px solid ${card.color}20`}}/>
        <div style={{
          width:180, height:180, borderRadius:'50%',
          border:`2px solid ${card.color}`,
          transform:`scale(${ringScale})`,
          transition:`transform ${BPHASE_DUR}s ease-in-out, box-shadow ${BPHASE_DUR}s ease-in-out`,
          boxShadow: isExpanded ? `0 0 50px ${card.color}55, inset 0 0 30px ${card.color}18` : `0 0 15px ${card.color}22`,
          display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:4,
        }}>
          {!isComplete ? (
            <>
              <p style={{fontSize:22,fontWeight:800,color:'#fff',margin:0,letterSpacing:'-0.02em'}}>{phase}</p>
              <p style={{fontSize:36,fontWeight:900,color:card.color,margin:0,lineHeight:1}}>{countdown}</p>
            </>
          ) : (
            <p style={{fontSize:28,fontWeight:800,color:'#fff',margin:0}}>Done</p>
          )}
        </div>
      </div>
      {!isComplete ? (
        <div style={{textAlign:'center'}}>
          <p style={{fontSize:12,color:'rgba(255,255,255,0.35)',margin:'0 0 4px'}}>{Math.ceil((BTOTAL_SECS - tick) / 60)} min remaining · {BTOTAL_CYCLES} breath cycles</p>
          <p style={{fontSize:11,color:'rgba(255,255,255,0.2)',margin:0}}>Tap End to exit early</p>
        </div>
      ) : (
        <div style={{textAlign:'center',padding:'0 32px'}}>
          <p style={{fontSize:14,fontWeight:600,color:'rgba(255,255,255,0.8)',margin:'0 0 4px'}}>Your nervous system just shifted.</p>
          <p style={{fontSize:12,color:'rgba(255,255,255,0.35)',margin:'0 0 20px'}}>Check your HRV tomorrow morning for the impact.</p>
          <button onClick={onDone} style={{padding:'13px 32px',borderRadius:14,background:card.color,border:'none',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>Back to home</button>
        </div>
      )}
    </div>
  );
};

const RecCard = ({ card, onDetail, onActivityDone }) => {
  const [sel, setSel]         = useState(0);
  const [ownOpen, setOwnOpen] = useState(false);
  const [ownText, setOwnText] = useState('');
  const [ownDone, setOwnDone] = useState(false);
  const chosen = card.options[sel];
  const others = card.options.filter((_,i) => i !== sel);
  const handleOwnSubmit = () => {
    if (!ownText.trim()) return;
    setOwnDone(true);
    onActivityDone && onActivityDone();
  };

  return (
    <div style={{background:'#fff',borderRadius:20,border:'1px solid #efefed',overflow:'hidden',boxShadow:'0 2px 8px rgba(0,0,0,0.05)'}}>
      <div style={{height:3,background:`linear-gradient(90deg,${card.color},${card.color}55)`}}/>
      <div style={{padding:'11px 13px 12px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,gap:8}}>
          <span style={{fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:card.color}}>{card.pillar}</span>
          {card.conditionTag && <AdjustedTag label={card.conditionTag} note={card.adjustedNote} color={card.conditionTagColor}/>}
        </div>
        <div onClick={()=>onDetail && onDetail({option:chosen,card,isSelected:true,onSelect:null})} style={{display:'flex',gap:10,alignItems:'center',marginBottom:9,cursor:'pointer',background:card.bg,borderRadius:14,padding:'10px 11px',border:`1.5px solid ${card.color}28`}}>
          <div style={{width:42,height:42,borderRadius:13,background:'#fff',color:card.color,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:`0 2px 6px ${card.color}22`}}><chosen.IC/></div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontSize:14,fontWeight:800,color:'#1a1a1a',margin:'0 0 3px',letterSpacing:'-0.02em',lineHeight:1.2}}>{chosen.label}</p>
            <p style={{fontSize:11,color:'#78716c',margin:'0 0 4px'}}>{chosen.detail}</p>
            <p style={{fontSize:10,color:card.color,fontWeight:600,margin:0,lineHeight:1.4,opacity:0.8}}>{chosen.why.split('.')[0]}.</p>
          </div>
          <div style={{width:28,height:28,borderRadius:9,background:card.color,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:'#fff',boxShadow:`0 2px 8px ${card.color}44`}}><I.Arrow/></div>
        </div>
        {others.length > 0 && (
          <div>
            <p style={{fontSize:9,fontWeight:600,letterSpacing:'0.05em',textTransform:'uppercase',color:'#c4bfb8',margin:'0 0 4px'}}>Or try</p>
            {others.map((opt,i) => {
              const origIdx = card.options.indexOf(opt);
              return (
                <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 8px',borderRadius:11,background:'#f8f7f3',marginBottom:3}}>
                  <div onClick={()=>setSel(origIdx)} style={{width:26,height:26,borderRadius:9,background:card.bg,color:card.color,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:'pointer'}}><opt.IC/></div>
                  <div onClick={()=>onDetail && onDetail({option:opt,card,isSelected:false,onSelect:()=>setSel(origIdx)})} style={{flex:1,minWidth:0,cursor:'pointer'}}>
                    <p style={{fontSize:12,fontWeight:600,color:'#3a3a38',margin:0,lineHeight:1.2}}>{opt.label}</p>
                    <p style={{fontSize:10,color:'#a8a29e',margin:'1px 0 0'}}>{opt.detail}</p>
                  </div>
                  <div style={{color:'#c4bfb8',flexShrink:0}}><I.Arrow/></div>
                </div>
              );
            })}
            {!ownDone && !ownOpen && (
              <div onClick={()=>setOwnOpen(true)} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 8px',borderRadius:11,border:`1.5px dashed ${card.color}40`,background:'transparent',marginBottom:0,cursor:'pointer'}}>
                <div style={{width:26,height:26,borderRadius:9,background:card.bg,color:card.color,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:18,fontWeight:300,lineHeight:1}}>+</div>
                <div style={{flex:1}}>
                  <p style={{fontSize:12,fontWeight:600,color:card.color,margin:0,opacity:0.75}}>My own activity</p>
                  <p style={{fontSize:10,color:'#a8a29e',margin:'1px 0 0'}}>Log something different</p>
                </div>
              </div>
            )}
            {!ownDone && ownOpen && (
              <div style={{borderRadius:11,border:`1.5px solid ${card.color}50`,background:card.bg,padding:'9px 10px',marginBottom:0}}>
                <p style={{fontSize:10,fontWeight:700,color:card.color,margin:'0 0 6px',letterSpacing:'0.04em',textTransform:'uppercase'}}>{card.pillar} — log your own</p>
                <input
                  autoFocus
                  value={ownText}
                  onChange={e=>setOwnText(e.target.value)}
                  onKeyDown={e=>{ if(e.key==='Enter') handleOwnSubmit(); }}
                  placeholder={`What did you do for ${card.pillar.toLowerCase()}?`}
                  style={{width:'100%',border:`1.5px solid ${card.color}30`,borderRadius:9,padding:'8px 10px',fontSize:12,fontFamily:'inherit',color:'#1a1a1a',background:'#fff',outline:'none',marginBottom:7,boxSizing:'border-box'}}

                  <button onClick={handleOwnSubmit} disabled={!ownText.trim()} style={{flex:2,padding:'7px',borderRadius:9,border:'none',background:ownText.trim()?card.color:'#e8e5de',fontSize:12,fontWeight:700,color:'#fff',cursor:ownText.trim()?'pointer':'default',fontFamily:'inherit',transition:'background 0.15s'}}>I did this</button>
                </div>
              </div>
            )}
            {ownDone && (
              <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',borderRadius:11,background:'#f0faf4',border:'1.5px solid #4CAF7D33'}}>
                <div style={{width:26,height:26,borderRadius:9,background:'#4CAF7D',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:'#fff'}}><I.Check/></div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:12,fontWeight:700,color:'#1a1a1a',margin:0,lineHeight:1.3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ownText}</p>
                  <p style={{fontSize:10,color:'#4CAF7D',fontWeight:600,margin:'1px 0 0'}}>Logged · arc updated</p>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
};

function App() {

  const [directions, setDirections] = useState({ move:null, sleep:null, nutrition:null, mind:null, logging:null });
  const [contexts,   setContexts]   = useState([]);
  const [otherNote,  setOtherNote]  = useState('');
  const [sheet,      setSheet]      = useState(null);

  const p = PERSONAS[pk];
  const isHomeView = !!p.isHomeView;
  const seq = p.pageSequence || [1,2,3,4,5];
  const currentIdx = seq.indexOf(page);
  const isFirst = currentIdx === 0;
  const isLast  = currentIdx === seq.length - 1;

  const switchPersona = (key) => {
    const newP = PERSONAS[key];
    const newSeq = newP.pageSequence || [1,2,3,4,5];
    setPk(key); setPage(newSeq[0]);
    setDirections({ move:null, sleep:null, nutrition:null, mind:null, logging:null });
    setContexts([]); setOtherNote(''); setSheet(null);
    setAnimKey(k=>k+1);
  };

  const goNext = () => { if (currentIdx < seq.length-1) setPage(seq[currentIdx+1]); };
  const goPrev = () => { if (currentIdx > 0)            setPage(seq[currentIdx-1]); };

  const allDirSet = pillarsFor(p).every(d => directions[d.key]);

  return (
    <>
      <div style={{textAlign:'center',maxWidth:620}}>

        <p style={{fontSize:13,color:'#78716c',margin:0,lineHeight:1.5}}>{isHomeView ? 'Maya’s hypertension homepage — DASH-adjusted nutrition, BP-aware sleep + mind cards, fully interactive. Tap any recommendation for the full detail sheet.' : 'Maya’s 3-page report stays as-is. Confirm or Submit lands on a celebration screen with a Back to home button that routes to her hypertension homepage.'}</p>

          {PERSONA_LIST.map(pp=>{
            const active = pk===pp.key;
            return (
              <button key={pp.key} onClick={()=>switchPersona(pp.key)}
                style={{
                  display:'flex', alignItems:'center', gap:8, padding:'8px 12px', borderRadius:16, flexShrink:0,

              <button onClick={goNext}
                className="text-[13px] font-semibold inline-flex items-center gap-1"
                style={{color:p.accent, opacity: page===3 && !allDirSet ? 0.4 : 1}}
                disabled={page===3 && !allDirSet}>
                Next <I.Forward/>
              </button>
            </div>
          </div>
        )}
        </>
        )}
      </div>

      <div style={{maxWidth:620,fontSize:11,color:'#a8a29e',textAlign:'center',lineHeight:1.6}}>
        {isHomeView
          ? <>v1 changes · Maya’s homepage is reachable via the new 5th chip and via Back to home on the celebration screen. Recommendation cards reflect the weekly plan she committed to (5 walks, 6 nights of sleep, weekday mindful pause). Persona chips are hidden here — one-way for now.<br/>Lifestyle-only · Numbers are illustrative.</>
          : <>v1 changes · Maya now gets a Back to home button on her celebration screen. Tapping Confirm or Submit still lands on the same celebration; Back to home routes to her homepage MVP. David, Marcus, and Sam are unchanged.<br/>Lifestyle-only · Manual BP entry · Numbers are illustrative.</>
        }
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
