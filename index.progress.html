  .su2 {animation:slide-up 0.4s ease-out 0.14s both}
  .su3 {animation:slide-up 0.4s ease-out 0.21s both}
  .su4 {animation:slide-up 0.4s ease-out 0.28s both}

  .pi  {animation:page-in 0.3s ease-out both}

  .dot2{animation:dot-bounce 1.2s ease-in-out 0.2s infinite}
  .dot3{animation:dot-bounce 1.2s ease-in-out 0.4s infinite}

// ── Progress arc ──────────────────────────────────────────────────────────
const ProgressArc = ({ done, total, goalColor }) => {
  const pct = Math.min(done / total, 1);
  const r = 50, cx = 65, cy = 65;
  const start = -Math.PI * 0.8, sweep = Math.PI * 1.6;
  const toXY = a => [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  const [sx,sy] = toXY(start), [ex,ey] = toXY(start + sweep);
  const [px,py] = toXY(start + sweep * pct);
  return (
    <svg width="130" height="100" viewBox="0 0 130 100">
      <path d={`M ${sx} ${sy} A ${r} ${r} 0 1 1 ${ex} ${ey}`} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="9" strokeLinecap="round"/>
      {pct > 0 && <path d={`M ${sx} ${sy} A ${r} ${r} 0 ${pct > 0.5 ? 1:0} 1 ${px} ${py}`} fill="none" stroke={goalColor} strokeWidth="9" strokeLinecap="round" opacity="0.95"/>}
      <text x={cx} y={cy-5} textAnchor="middle" fontSize="22" fontWeight="900" fill="white">{Math.round(pct*100)}%</text>
      <text x={cx} y={cy+13} textAnchor="middle" fontSize="9.5" fontWeight="600" fill="rgba(255,255,255,0.4)">{done} of {total}</text>
    </svg>
  );
};

// ── Breathing session (full-screen) ───────────────────────────────────────
const BreathingSession = ({ option, card, onClose, onDone }) => {
  const [tick, setTick] = useState(0);
  const [isComplete, setIsComplete] = useState(false);

  useEffect(() => {
    if (isComplete) return;
    const t = setInterval(() => {
      setTick(s => {
        const next = s + 1;
        if (next >= BTOTAL_SECS) { setIsComplete(true); return BTOTAL_SECS; }
        return next;
      });
    }, 1000);
    return () => clearInterval(t);
  }, [isComplete]);

  const phaseIdx   = Math.floor(tick / BPHASE_DUR) % BPHASES.length;
  const countdown  = BPHASE_DUR - (tick % BPHASE_DUR);
  const phase      = BPHASES[phaseIdx];
  const isExpanded = phaseIdx === 0 || phaseIdx === 1;
  const ringScale  = isExpanded ? 1.0 : 0.52;
  const progressPct = tick / BTOTAL_SECS;
  const circ       = 2 * Math.PI * 130;

  return (
    <div className="fi" style={{position:'absolute',inset:0,background:'#0e0e1a',zIndex:200,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'space-between',padding:'20px 0 32px'}}>
      {/* Top bar */}
      <div style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0 20px'}}>
        <button onClick={onClose} style={{background:'rgba(255,255,255,0.08)',border:'none',borderRadius:12,padding:'7px 13px',color:'rgba(255,255,255,0.6)',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>End</button>
        <p style={{fontSize:13,fontWeight:700,color:'rgba(255,255,255,0.5)',margin:0}}>{option.label}</p>
        <div style={{width:60}}/>
      </div>

      {/* Breathing ring area */}
      <div style={{position:'relative',width:300,height:300,display:'flex',alignItems:'center',justifyContent:'center'}}>
        {/* Outer progress arc */}
        <svg width="300" height="300" style={{position:'absolute',top:0,left:0}}>
          <circle cx="150" cy="150" r="130" fill="none" stroke="rgba(139,109,170,0.12)" strokeWidth="2"/>
          <circle cx="150" cy="150" r="130" fill="none" stroke={card.color} strokeWidth="2.5"
            strokeDasharray={circ} strokeDashoffset={circ * (1 - progressPct)}
            strokeLinecap="round" transform="rotate(-90 150 150)"
            style={{transition:'stroke-dashoffset 1s linear'}}/>
        </svg>

        {/* Glow ring (static) */}
        <div style={{position:'absolute',width:220,height:220,borderRadius:'50%',border:`1px solid ${card.color}20`}}/>

        {/* Animated breathing ring */}
        <div style={{
          width:180, height:180, borderRadius:'50%',
          border:`2px solid ${card.color}`,
          transform:`scale(${ringScale})`,
          transition:`transform ${BPHASE_DUR}s ease-in-out, box-shadow ${BPHASE_DUR}s ease-in-out`,
          boxShadow: isExpanded ? `0 0 50px ${card.color}55, inset 0 0 30px ${card.color}18` : `0 0 15px ${card.color}22`,
          display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:4,
        }}>
          {!isComplete ? (
            <>
              <p style={{fontSize:22,fontWeight:800,color:'#fff',margin:0,letterSpacing:'-0.02em'}}>{phase}</p>
              <p style={{fontSize:36,fontWeight:900,color:card.color,margin:0,lineHeight:1}}>{countdown}</p>
            </>
          ) : (
            <p style={{fontSize:28,fontWeight:800,color:'#fff',margin:0}}>Done</p>
          )}
        </div>
      </div>

      {/* Bottom info */}
      {!isComplete ? (
        <div style={{textAlign:'center'}}>
          <p style={{fontSize:12,color:'rgba(255,255,255,0.35)',margin:'0 0 4px'}}>{Math.ceil((BTOTAL_SECS - tick) / 60)} min remaining · {BTOTAL_CYCLES} breath cycles</p>
          <p style={{fontSize:11,color:'rgba(255,255,255,0.2)',margin:0}}>Tap End to exit early</p>
        </div>
      ) : (
        <div style={{textAlign:'center',padding:'0 32px'}}>
          <p style={{fontSize:14,fontWeight:600,color:'rgba(255,255,255,0.8)',margin:'0 0 4px'}}>Your nervous system just shifted.</p>
          <p style={{fontSize:12,color:'rgba(255,255,255,0.35)',margin:'0 0 20px'}}>Check your HRV tomorrow morning for the impact.</p>
          <button onClick={onDone} style={{padding:'13px 32px',borderRadius:14,background:card.color,border:'none',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>Back to home</button>
        </div>
      )}
    </div>
  );
};

                <div style={{display:'flex',alignItems:'center',gap:4,background:'#f0ede8',borderRadius:20,padding:'3px 8px'}}>

                </div>
              </div>
              {option.recipes.map((r,i) => {
                const isAdded = added[i];
                return (
                  <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'#fff',borderRadius:14,border:`1.5px solid ${isAdded?'#4CAF7D33':'#efefed'}`,marginBottom:6,transition:'border-color 0.2s'}}>
                    <div style={{width:38,height:38,borderRadius:11,background:card.bg,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',color:card.color}}><I.Apple/></div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontSize:12,fontWeight:700,color:'#1a1a1a',margin:'0 0 2px',lineHeight:1.3}}>{r.name}</p>
                      <p style={{fontSize:10,color:'#a8a29e',margin:0}}>{r.protein} protein · {r.cal} cal · {r.time}</p>
                    </div>
                    <button onClick={()=>setAdded(a=>({...a,[i]:true}))} style={{padding:'5px 12px',borderRadius:20,flexShrink:0,border:`1.5px solid ${isAdded?'#4CAF7D':card.color}`,background:isAdded?'#4CAF7D':'transparent',color:isAdded?'#fff':card.color,fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',transition:'all 0.2s',display:'flex',alignItems:'center',gap:4}}>
                      {isAdded ? <><I.Check/> Added</> : '+ Add'}
                    </button>
                  </div>
                );
              })}
            </div>
          )}

          {/* I did this / Mark as done */}
          {!isSelected && (
            <button onClick={()=>{ onSelect && onSelect(); onActivityDone && onActivityDone(); onClose(); }} style={{width:'100%',padding:'13px',borderRadius:14,marginTop:4,background:`linear-gradient(135deg,${card.color},${card.color}cc)`,border:'none',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit',boxShadow:`0 4px 16px ${card.color}44`}}>
              I did this
            </button>
          )}
          {isSelected && !isMove && !doneMark && (
            <button onClick={()=>{ setDoneMark(true); onActivityDone && onActivityDone(); }} style={{width:'100%',padding:'13px',borderRadius:14,marginTop:4,background:`linear-gradient(135deg,${card.color},${card.color}cc)`,border:'none',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit',boxShadow:`0 4px 16px ${card.color}44`}}>
              I did this
            </button>
          )}
          {isSelected && !isMove && doneMark && (
            <div style={{width:'100%',padding:'13px',borderRadius:14,marginTop:4,background:'#f0faf4',border:'1.5px solid #4CAF7D33',textAlign:'center',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
              <I.Check/><span style={{fontSize:14,fontWeight:700,color:'#4CAF7D'}}>Done — arc updated</span>
            </div>
          )}
        </div>
      </div>
    </>
  );
};

// ── Recommendation card ───────────────────────────────────────────────────
const RecCard = ({ card, onDetail, onActivityDone }) => {
  const [sel, setSel]           = useState(0);
  const [ownOpen, setOwnOpen]   = useState(false);
  const [ownText, setOwnText]   = useState('');
  const [ownDone, setOwnDone]   = useState(false);
  const chosen = card.options[sel];
  const others = card.options.filter((_,i) => i !== sel);
  const tagBg     = card.conditionTagColor ? card.conditionTagColor + '15' : 'rgba(107,130,181,0.1)';
  const tagColor  = card.conditionTagColor || '#6b82b5';
  const tagBorder = card.conditionTagColor ? card.conditionTagColor + '28' : 'rgba(107,130,181,0.18)';

  const handleOwnSubmit = () => {
    if (!ownText.trim()) return;
    setOwnDone(true);
    onActivityDone && onActivityDone();
  };

  return (
    <div style={{background:'#fff',borderRadius:20,border:'1px solid #efefed',overflow:'hidden',boxShadow:'0 2px 8px rgba(0,0,0,0.05)'}}>
      <div style={{height:3,background:`linear-gradient(90deg,${card.color},${card.color}55)`}}/>
      <div style={{padding:'11px 13px 12px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <span style={{fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:card.color}}>{card.pillar}</span>
          <div style={{display:'flex',alignItems:'center',gap:5}}>
            {card.pillar === 'Move' && chosen.modeLabel && (
              <span style={{fontSize:9,fontWeight:600,background:card.bg,color:card.color,borderRadius:20,padding:'2px 7px'}}>{chosen.modeLabel}</span>
            )}
            {card.conditionTag && (
              <span style={{fontSize:9,fontWeight:600,background:tagBg,color:tagColor,borderRadius:20,padding:'2px 8px',border:`1px solid ${tagBorder}`}}>{card.conditionTag}</span>
            )}
          </div>
        </div>
        {/* Selected → tap to detail */}
        <div onClick={()=>onDetail({option:chosen,card,isSelected:true,onSelect:null})} style={{display:'flex',gap:9,alignItems:'flex-start',marginBottom:8,cursor:'pointer'}}>
          <div style={{width:38,height:38,borderRadius:12,background:card.bg,color:card.color,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><chosen.IC/></div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontSize:14,fontWeight:800,color:'#1a1a1a',margin:'0 0 2px',letterSpacing:'-0.02em',lineHeight:1.2}}>{chosen.label}</p>
            <p style={{fontSize:11,color:'#78716c',margin:0}}>{chosen.detail}</p>
          </div>
          <div style={{color:'#c4bfb8',flexShrink:0,marginTop:2}}><I.Arrow/></div>
        </div>
        {/* Why */}
        <div style={{padding:'7px 10px',background:'#f8f7f3',borderRadius:10,marginBottom:9}}>
          <p style={{fontSize:11,color:'#57534e',margin:0,lineHeight:1.5}}>{chosen.why}</p>
        </div>
        {/* Others */}
        {others.length > 0 && (
          <div>
            <p style={{fontSize:9,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'#c4bfb8',margin:'0 0 4px'}}>Other options</p>
            {others.map((opt,i) => {
              const origIdx = card.options.indexOf(opt);
              return (
                <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 8px',borderRadius:11,background:'#f8f7f3',marginBottom:3}}>
                  <div onClick={()=>setSel(origIdx)} style={{width:26,height:26,borderRadius:9,background:card.bg,color:card.color,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:'pointer'}}><opt.IC/></div>
                  <div onClick={()=>onDetail({option:opt,card,isSelected:false,onSelect:()=>setSel(origIdx)})} style={{flex:1,minWidth:0,cursor:'pointer'}}>
                    <p style={{fontSize:12,fontWeight:600,color:'#3a3a38',margin:0,lineHeight:1.2}}>{opt.label}</p>
                    {card.pillar==='Move' && opt.modeLabel && <p style={{fontSize:9,color:card.color,fontWeight:600,margin:'1px 0 0'}}>{opt.modeLabel}</p>}
                    {!(card.pillar==='Move' && opt.modeLabel) && <p style={{fontSize:10,color:'#a8a29e',margin:'1px 0 0'}}>{opt.detail}</p>}
                  </div>
                  <div style={{color:'#c4bfb8',flexShrink:0}}><I.Arrow/></div>
                </div>
              );
            })}

            {/* My own activity */}
            {!ownDone && !ownOpen && (
              <div onClick={()=>setOwnOpen(true)} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 8px',borderRadius:11,border:`1.5px dashed ${card.color}40`,background:'transparent',marginBottom:0,cursor:'pointer'}}>
                <div style={{width:26,height:26,borderRadius:9,background:card.bg,color:card.color,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:18,fontWeight:300,lineHeight:1}}>+</div>
                <div style={{flex:1}}>
                  <p style={{fontSize:12,fontWeight:600,color:card.color,margin:0,opacity:0.75}}>My own activity</p>
                  <p style={{fontSize:10,color:'#a8a29e',margin:'1px 0 0'}}>Log something different</p>
                </div>
              </div>
            )}

            {!ownDone && ownOpen && (
              <div style={{borderRadius:11,border:`1.5px solid ${card.color}50`,background:card.bg,padding:'9px 10px',marginBottom:0}}>
                <p style={{fontSize:10,fontWeight:700,color:card.color,margin:'0 0 6px',letterSpacing:'0.04em',textTransform:'uppercase'}}>{card.pillar} — log your own</p>
                <input
                  autoFocus
                  value={ownText}
                  onChange={e=>setOwnText(e.target.value)}
                  onKeyDown={e=>{ if(e.key==='Enter') handleOwnSubmit(); }}
                  placeholder={`What did you do for ${card.pillar.toLowerCase()}?`}
                  style={{width:'100%',border:`1.5px solid ${card.color}30`,borderRadius:9,padding:'8px 10px',fontSize:12,fontFamily:'inherit',color:'#1a1a1a',background:'#fff',outline:'none',marginBottom:7,boxSizing:'border-box'}}
                />
                <div style={{display:'flex',gap:6}}>
                  <button onClick={()=>{ setOwnOpen(false); setOwnText(''); }} style={{flex:1,padding:'7px',borderRadius:9,border:'1.5px solid #e8e5de',background:'transparent',fontSize:12,fontWeight:600,color:'#78716c',cursor:'pointer',fontFamily:'inherit'}}>Cancel</button>
                  <button onClick={handleOwnSubmit} disabled={!ownText.trim()} style={{flex:2,padding:'7px',borderRadius:9,border:'none',background:ownText.trim()?card.color:'#e8e5de',fontSize:12,fontWeight:700,color:'#fff',cursor:ownText.trim()?'pointer':'default',fontFamily:'inherit',transition:'background 0.15s'}}>I did this</button>
                </div>
              </div>
            )}

            {ownDone && (
              <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',borderRadius:11,background:'#f0faf4',border:'1.5px solid #4CAF7D33'}}>
                <div style={{width:26,height:26,borderRadius:9,background:'#4CAF7D',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:'#fff'}}><I.Check/></div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:12,fontWeight:700,color:'#1a1a1a',margin:0,lineHeight:1.3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ownText}</p>
                  <p style={{fontSize:10,color:'#4CAF7D',fontWeight:600,margin:'1px 0 0'}}>Logged · arc updated</p>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
};

// ── App ───────────────────────────────────────────────────────────────────
const App = () => {
  const [pk, setPk]           = useState('base');
  const [animK, setAnimK]     = useState(0);
  const [detail, setDetail]   = useState(null);
  const [breathing, setBreathing] = useState(null); // { option, card }
  const [chat, setChat]       = useState(null);     // { option, card }
  const [doneSessions, setDoneSessions] = useState(0);
  const p = PERSONAS[pk];

  const switchPersona = key => { setPk(key); setAnimK(k=>k+1); setDetail(null); setBreathing(null); setChat(null); setDoneSessions(0); };
  const openDetail  = data => setDetail(data);
  const closeDetail = () => setDetail(null);

  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:24,maxWidth:520,width:'100%'}}>
      <div style={{textAlign:'center'}}>
        <p style={{fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'#94a47f',margin:'0 0 4px'}}>Mockup 10 · Homepage</p>
        <p style={{fontSize:20,fontWeight:800,color:'#1a1a1a',margin:'0 0 4px',letterSpacing:'-0.02em'}}>Content library · Plan layer</p>
        <p style={{fontSize:13,color:'#78716c',margin:0,lineHeight:1.5}}>Tap any card to explore. Move: session guide + done. Sleep: forecast + sounds. Mind: guided breathing or journal in chat.</p>
      </div>

      {/* Persona switcher */}
      <div style={{width:'100%',overflowX:'auto',WebkitOverflowScrolling:'touch',paddingBottom:2}}>
        <div style={{display:'flex',gap:6,padding:'0 2px',justifyContent:'center'}}>
          {PERSONA_LIST.map(pp=>(
            <button key={pp.key} onClick={()=>switchPersona(pp.key)} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 10px',borderRadius:14,flexShrink:0,border:`1.5px solid ${pk===pp.key?'#778a62':'#e8e5de'}`,background:pk===pp.key?'#fff':'rgba(255,255,255,0.35)',cursor:'pointer',fontFamily:'inherit',transition:'all 0.18s',boxShadow:pk===pp.key?'0 2px 8px rgba(0,0,0,0.08)':'none'}}>
              <div style={{width:24,height:24,borderRadius:'50%',background:pp.grad,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'#fff',flexShrink:0}}>{pp.initial}</div>
              <div>
                <p style={{fontSize:11,fontWeight:700,color:pk===pp.key?'#1a1a1a':'#57534e',margin:0,whiteSpace:'nowrap'}}>{pp.label}</p>
                <p style={{fontSize:9,color:'#a8a29e',margin:0,whiteSpace:'nowrap'}}>{pp.sub}</p>
              </div>
            </button>
          ))}
        </div>
      </div>

      {/* Device */}
      <div className="device" key={pk}>
        <div className="notch"/>

        {/* Main screen — hidden when chat is active */}
        {!chat && (
          <>
            <div className="screen">
              {/* Header */}
              <div style={{background:'linear-gradient(160deg,#1c2030 0%,#253248 100%)',padding:'14px 18px 18px',position:'relative',overflow:'hidden',flexShrink:0}}>
                <div style={{position:'absolute',top:-40,right:-40,width:200,height:200,background:`radial-gradient(circle,${p.goalColor}18 0%,transparent 70%)`,borderRadius:'50%'}}/>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                  <span className="lemon-text" style={{fontWeight:800,fontSize:20,letterSpacing:'-0.02em'}}>lemon</span>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    {p.condition && <div style={{display:'inline-flex',alignItems:'center',gap:4,background:'rgba(255,255,255,0.08)',borderRadius:20,padding:'3px 8px'}}><div style={{width:5,height:5,borderRadius:'50%',background:p.conditionColor}}/><span style={{fontSize:10,fontWeight:600,color:'rgba(255,255,255,0.65)'}}>{p.condition}</span></div>}
                    <div style={{width:28,height:28,borderRadius:'50%',background:p.avatarGrad,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'#fff'}}>{p.initial}</div>
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:14}}>
                  <ProgressArc done={p.slotsDone + doneSessions} total={p.slotsTotal} goalColor={p.goalColor}/>
                  <div style={{flex:1}}>
                    <div style={{display:'inline-flex',alignItems:'center',gap:5,background:p.goalBg+'22',borderRadius:20,padding:'3px 9px',marginBottom:7}}>
                      <div style={{width:6,height:6,borderRadius:'50%',background:p.goalColor}}/><span style={{fontSize:11,fontWeight:700,color:p.goalColor}}>{p.goal}</span>
                    </div>
                    <p style={{fontSize:11,color:p.isWorkingColor,fontWeight:600,margin:0,lineHeight:1.45}}>{p.isWorking}</p>
                  </div>
                </div>
              </div>
              {/* Cards */}
              <div style={{padding:'12px 13px 28px',display:'flex',flexDirection:'column',gap:9}} key={animK}>
                <p style={{fontSize:11,fontWeight:600,color:'#a8a29e',margin:'2px 0 3px'}}>Today · Thursday</p>
                {p.cards.map((card,i)=>(
                  <div key={i} className={`su${i}`}><RecCard card={card} onDetail={openDetail} onActivityDone={()=>setDoneSessions(d=>d+1)}/></div>
                ))}
              </div>
            </div>
            <div className="nav">
              {[{IC:I.Home,l:'Home',on:true},{IC:I.Chart,l:'Stats'},{IC:I.User,l:'Profile'}].map((n,i)=>(
                <div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                  <div style={{color:n.on?'#778a62':'#b0a99e'}}><n.IC/></div>
                  <span style={{fontSize:10,fontWeight:500,color:n.on?'#778a62':'#b0a99e'}}>{n.l}</span>
                </div>
              ))}
            </div>
          </>
        )}

        {/* Chat view — full screen replacement */}
        {chat && (
          <ChatView option={chat.option} card={chat.card} persona={p} onBack={()=>setChat(null)} onActivityDone={()=>setDoneSessions(d=>d+1)}/>
        )}

        {/* Detail sheet */}
        {detail && !breathing && (
          <DetailSheet
            option={detail.option} card={detail.card} isSelected={detail.isSelected}
            onClose={closeDetail}
            onSelect={()=>{ detail.onSelect && detail.onSelect(); }}
            onStartBreathing={()=>{ setBreathing({ option:detail.option, card:detail.card }); setDetail(null); }}
            onOpenChat={()=>{ setChat({ option:detail.option, card:detail.card }); setDetail(null); }}
            onActivityDone={()=>{ setDoneSessions(d=>d+1); }}
          />
        )}

        {/* Breathing session — full screen overlay */}
        {breathing && (
          <BreathingSession
            option={breathing.option} card={breathing.card}
            onClose={()=>setBreathing(null)}
            onDone={()=>{ setBreathing(null); setDoneSessions(d=>d+1); }}
          />
        )}
      </div>

      {/* Notes */}
      <div style={{maxWidth:375,width:'100%',display:'flex',flexDirection:'column',gap:7}}>
        {[
          { label:'Move → session guide + arc fill', body:'Each Move option shows the session mode (Recovery / Push / Steady) and progression counter. Tapping opens a simulated session guide. Marking done logs to Apple Health and fills the arc.' },
          { label:'Sleep → forecast + wind-down sounds', body:'Sleep detail shows projected score now vs. +30 min, grounded in the user\'s own data. Four ambient sounds play from within Lemon — no separate app needed.' },
          { label:'Mind → guided breathing or Lemon Chat', body:'Breathing options launch a full-screen animated session (expanding ring, phase countdown, progress arc). Journal options open Lemon Chat with a personalised prompt and a contextual response.' },
          { label:'Nutrition → meal plan + recipes', body:'Three matching recipes per option with macros and prep time. One tap adds to meal plan with a Meal Prep shortcut surfaced in context.' },
        ].map((n,i)=>(
          <div key={i} style={{background:'rgba(255,255,255,0.55)',borderRadius:12,padding:'10px 12px',border:'1px solid #e8e5de'}}>
            <p style={{fontSize:12,fontWeight:700,color:'#1a1a1a',margin:'0 0 2px'}}>{n.label}</p>
            <p style={{fontSize:12,color:'#57534e',margin:0,lineHeight:1.55}}>{n.body}</p>
          </div>
        ))}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
