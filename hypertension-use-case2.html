const TrendChart = ({ series, accent, target=null, todayLabel='today' }) => {
  const w=305, h=140, pad=18;
  const min = (target!==null ? Math.min(...series, target) : Math.min(...series)) - 4;
  const max = (target!==null ? Math.max(...series, target) : Math.max(...series)) + 4;
  const x = i => pad + (i*(w-pad*2))/(series.length-1);
  const y = v => h - pad - ((v-min)/(max-min))*(h-pad*2);
  const rolling = series.map((_,i)=>{
    const start = Math.max(0,i-6);
    const slice = series.slice(start,i+1);
    return slice.reduce((a,b)=>a+b,0)/slice.length;
  });
  const linePath = series.map((v,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const avgPath  = rolling.map((v,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const tY = target!==null ? y(target).toFixed(1) : null;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
      {target!==null && (
        <>
          <line x1={pad} y1={tY} x2={w-pad} y2={tY} stroke="#94a47f" strokeWidth="1" strokeDasharray="3 4" opacity="0.6"/>
          <text x={w-pad} y={Number(tY)-4} fontSize="9" fill="#94a47f" textAnchor="end" fontWeight="600">target ≤ {target}</text>
        </>
      )}
      <path d={linePath} fill="none" stroke={accent+'40'} strokeWidth="1.4" strokeLinecap="round"/>
      {series.map((v,i)=> (
        <circle key={i} cx={x(i)} cy={y(v)} r={i===series.length-1?3.2:1.6} fill={i===series.length-1?accent:accent+'80'}/>
      ))}
      <path d={avgPath} fill="none" stroke={accent} strokeWidth="2.2" strokeLinecap="round" className="draw-line"/>
      <text x={pad} y={h-4} fontSize="9" fill="#a8a29e">28d ago</text>
      <text x={w-pad} y={h-4} fontSize="9" fill="#a8a29e" textAnchor="end">{todayLabel}</text>
    </svg>
  );
};

            <span className="text-[10px] font-semibold px-2 py-0.5 rounded-full bg-stone-100 text-stone-500">Lever: {p.causeEffect.pillar}</span>
          </div>
        </div>
      </div>

      {/* MAYA branch — read-only plan + Confirm/Adjust */}
      {isMaya && (
        <>
          <div className="mt-4 su2">
            <p className="text-[12px] text-stone-500 mb-2.5 leading-relaxed">Review your draft and confirm or adjust it.</p>
            <WeeklyPlanChat p={p} accent={p.accent}/>
          </div>

          {planMode === 'review' ? (
            <div className="flex gap-3 mt-5 su3">
              <button onClick={()=>setCommitted(true)}
                className="flex-1 py-4 rounded-2xl font-semibold text-base"
                style={{background:`linear-gradient(135deg, ${p.accent}, ${p.accent}d0)`,color:'#fff', boxShadow:`0 10px 28px ${p.accent}40`}}>
                Confirm
              </button>
              <button onClick={()=>setPlanMode('adjusting')}
                className="flex-1 py-4 rounded-2xl font-semibold text-base bg-stone-100 text-stone-600 hover:bg-stone-200 transition-colors">
                Adjust
              </button>
            </div>
          ) : (
            <div className="mt-5 su3">
              <textarea
                value={adjustText}
                onChange={e=>setAdjustText(e.target.value)}
                placeholder="Add more details to customize your plan..."
                rows={5}
                className="adjust-area"/>
              <div className="flex gap-3 mt-3">
                <button onClick={()=>{ setPlanMode('review'); setAdjustText(''); }}
                  className="px-5 py-3.5 rounded-2xl font-semibold text-[14px] bg-stone-100 text-stone-600 hover:bg-stone-200 transition-colors">
                  Back
                </button>
                <button onClick={()=>setCommitted(true)}
                  className="flex-1 py-3.5 rounded-2xl font-semibold text-[14px]"
                  style={{background:`linear-gradient(135deg, ${p.accent}, ${p.accent}d0)`,color:'#fff', boxShadow:`0 10px 28px ${p.accent}40`}}>
                  Submit
                </button>
              </div>
            </div>
          )}
        </>
      )}

      {/* NON-MAYA branch */}
      {!isMaya && (
        <>
          {/* Targets summary */}
          <div className="mt-4 bg-white rounded-2xl border border-stone-150 p-4 su2">
            <p className="text-[11px] font-semibold uppercase tracking-wide text-stone-400 mb-3">{p.plan.week} targets</p>
            <div className="space-y-2.5">
              {p.plan.targets.map((t,i)=>{
                const TI = I[t.icon] || I.Heart;
                return (
                  <div key={i} className="flex items-center gap-3">
                    <div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{background:p.accent+'14',color:p.accent}}><TI/></div>
                    <span className="flex-1 text-[13px] text-stone-600">{t.label}</span>
                    <span className="text-[13px] font-semibold" style={{color:p.accent}}>{t.target}<span className="text-stone-400 font-normal text-[11px] ml-0.5">{t.unit}</span></span>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Accountability — partner OR empty state. NO inline preview. NO Preview button. */}
          {p.commit.partner ? (
            <div className="mt-4 bg-white rounded-2xl border border-stone-150 p-4 su3">
              <p className="text-[11px] font-semibold uppercase tracking-wide text-stone-400 mb-3">Send to your accountability partner</p>
              <div className="flex items-center gap-3">
                <div className="w-11 h-11 rounded-full flex items-center justify-center text-white font-bold" style={{background:p.commit.partner.grad}}>{p.commit.partner.avatar}</div>
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-semibold text-stone-600">{p.commit.partner.name}</p>
                  <p className="text-[11px] text-stone-400">{p.commit.partner.role}</p>
                </div>
                <button className="text-[12px] font-semibold text-stone-500 inline-flex items-center gap-1"><I.Refresh/>change</button>
              </div>
              <p className="text-[12px] text-stone-500 mt-3 leading-relaxed">{p.commit.partner.name} will see your weekly commitment Sunday and a Wednesday mid-week check-in. They don’t need Lemon to receive it.</p>
            </div>
          ) : (
            <>
              <div className="mt-4 bg-white rounded-2xl border-2 border-dashed border-stone-200 p-4 su3">
                <p className="text-[11px] font-semibold uppercase tracking-wide text-stone-400 mb-3">Accountability partner</p>
                <div className="flex items-center gap-3">
                  <div className="w-11 h-11 rounded-full flex items-center justify-center bg-stone-100 text-stone-400">
                    <I.PlusCircle/>
                  </div>
                  <div className="flex-1 min-w-0">
                    <p className="text-sm font-semibold text-stone-600">Add a partner</p>
                    <p className="text-[11px] text-stone-400">Spouse, family, friend, walking buddy</p>
                  </div>
                </div>
                <button className="mt-3.5 w-full py-2.5 rounded-xl text-[12.5px] font-semibold flex items-center justify-center gap-2" style={{background:p.accent+'15',color:p.accent,border:`1px solid ${p.accent}30`}}>
                  <I.PlusCircle/> Invite a partner
                </button>
              </div>

              <div className="mt-3 bg-stone-50 rounded-2xl border border-stone-150 p-4 su4">
                <p className="text-[10px] font-semibold uppercase tracking-wide text-stone-400 mb-2">How partners work</p>
                <ul className="space-y-2">
                  {[
                    ['They don’t need Lemon', 'You add them by phone or email — they get a text or email link.'],
                    ['Sees your week Sunday',   'A summary of your commitment + targets, plus a one-tap "send a cheer" button.'],
                    ['Wednesday check-in',      'Mid-week is when consistency dips. Lemon nudges your partner to ping you.'],
                    ['Always opt-out',          'Either side can pause or stop the sharing at any time.'],
                  ].map((row,i)=>(
                    <li key={i} className="flex items-start gap-2.5">
                      <span style={{color:p.accent}} className="mt-0.5"><I.Check/></span>
                      <div>
                        <p className="text-[12px] font-semibold text-stone-600 leading-snug">{row[0]}</p>
                        <p className="text-[11px] text-stone-500 leading-relaxed">{row[1]}</p>
                      </div>
                    </li>
                  ))}
                </ul>
              </div>
            </>
          )}

          {/* Share with doctor — Marcus only */}
          {p.commit.doctor && (
            <div className="mt-4 bg-white rounded-2xl border border-stone-150 p-4 su4">
              <div className="flex items-center gap-2 mb-3">
                <span className="text-stone-500"><I.Doctor/></span>
                <p className="text-[11px] font-semibold uppercase tracking-wide text-stone-400">Share with your doctor</p>
              </div>

              <div className="flex items-center gap-3">
                <div className="w-11 h-11 rounded-full flex items-center justify-center text-white font-bold" style={{background:p.commit.doctor.grad}}>{p.commit.doctor.avatar}</div>
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-semibold text-stone-600">{p.commit.doctor.name}</p>
                  <p className="text-[11px] text-stone-400">{p.commit.doctor.role} · {p.commit.doctor.email}</p>
                </div>
                <button onClick={()=>openSheet('doctor')} className="text-[11px] font-semibold inline-flex items-center gap-1" style={{color:p.accent}}><I.Eye/>Preview</button>
              </div>

              {/* What gets sent */}
              <div className="mt-3 p-3 rounded-xl bg-stone-50 border border-stone-150">
                <p className="text-[10px] font-semibold uppercase tracking-wide text-stone-500 mb-1.5">What gets sent</p>
                <ul className="text-[11.5px] text-stone-600 space-y-0.5 leading-relaxed">
                  <li className="flex items-start gap-1.5"><span style={{color:p.accent}} className="mt-1">•</span><span>7-day BP average + delta vs prior week</span></li>
                  <li className="flex items-start gap-1.5"><span style={{color:p.accent}} className="mt-1">•</span><span>Logging confidence + days in morning window</span></li>
                  <li className="flex items-start gap-1.5"><span style={{color:p.accent}} className="mt-1">•</span><span>This week’s pillar wins</span></li>
                  <li className="flex items-start gap-1.5"><span style={{color:p.accent}} className="mt-1">•</span><span>Most-moved-needle insight</span></li>
                  <li className="flex items-start gap-1.5"><span style={{color:p.accent}} className="mt-1">•</span><span><span className="font-semibold">Attached:</span> 28-day BP report (PDF)</span></li>
                </ul>
              </div>

              {/* Weekly toggle */}
              <div className="mt-3 flex items-start gap-3 pt-3 border-t border-stone-150">
                <Toggle on={shareWeekly} onChange={()=>setShareWeekly(!shareWeekly)} accent={p.accent}/>
                <div className="flex-1 min-w-0">
                  <p className="text-[13px] font-semibold text-stone-600">Send weekly</p>
                  <p className="text-[11.5px] text-stone-400 leading-snug mt-0.5">Sundays at 7pm — same time as your weekly check-in.</p>
                </div>
              </div>

              {/* Send now */}
              <div className="flex gap-2 mt-3">
                <button onClick={()=>openSheet('doctor')}
                  className="flex-1 py-2.5 rounded-xl text-[12.5px] font-semibold inline-flex items-center justify-center gap-1.5" style={{background:p.accent,color:'#fff'}}>
                  <I.Send/> Send now
                </button>
                <button className="px-3 py-2.5 rounded-xl text-[12.5px] font-semibold text-stone-600 bg-stone-100">
                  Schedule
                </button>
              </div>
            </div>
          )}

          {/* Daily preferences */}
          <div className="mt-4 bg-white rounded-2xl border border-stone-150 p-4 su5">
            <div className="flex items-center gap-2 mb-3">
              <span className="text-stone-500"><I.Bell/></span>
              <p className="text-[11px] font-semibold uppercase tracking-wide text-stone-400">Daily preferences</p>
            </div>
            <div className="space-y-3">
              <div className="flex items-start gap-3">
                <Toggle on={reminders.daily} onChange={()=>setReminders(r=>({...r, daily: !r.daily}))} accent={p.accent}/>
                <div className="flex-1 min-w-0">
                  <p className="text-[13px] font-semibold text-stone-600">Daily check-ins</p>
                  <p className="text-[11.5px] text-stone-400 leading-snug mt-0.5">Soft morning nudge for the BP log and one mid-day prompt tied to your pushed pillar.</p>
                </div>
              </div>
              <div className="flex items-start gap-3 pt-3 border-t border-stone-150">
                <Toggle on={reminders.weekly} onChange={()=>setReminders(r=>({...r, weekly: !r.weekly}))} accent={p.accent}/>
                <div className="flex-1 min-w-0">
                  <p className="text-[13px] font-semibold text-stone-600">Weekly check-in</p>
                  <p className="text-[11.5px] text-stone-400 leading-snug mt-0.5">Sunday evening — your 7-day average and next week’s direction prompt.</p>
                </div>
              </div>
              <div className="pt-3 border-t border-stone-150">
                <button onClick={()=> p.canExport && openSheet('export')} disabled={!p.canExport}
                  className="w-full flex items-center gap-3 text-left">
                  <div className="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0" style={{background:(p.canExport?p.accent:'#a8a29e')+'18',color:p.canExport?p.accent:'#a8a29e'}}><I.Document/></div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                      <p className="text-[13px] font-semibold text-stone-600">Export 28-day BP report</p>
                      <span className="text-[9px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded" style={{background:'#1a1a1a',color:'#fff'}}>PDF</span>
                    </div>
                    <p className="text-[11.5px] text-stone-400 leading-snug mt-0.5">
                      {p.canExport
                        ? 'A one-page document of your BP trend, pillar patterns, and the strongest signal in the data.'
                        : p.exportLockReason}
                    </p>
                  </div>
                  {p.canExport && <span className="text-stone-400"><I.Right/></span>}
                </button>
              </div>
            </div>
          </div>
        </>
      )}

      {/* Commit CTA — non-Maya only (Maya's commit is the Confirm/Submit button above) */}
      {!isMaya && (
        <button onClick={()=>setCommitted(true)}
          className="w-full mt-6 py-4 rounded-2xl font-semibold text-base flex items-center justify-center gap-2"
          style={{background:`linear-gradient(135deg, ${p.accent}, ${p.accent}d0)`,color:'#fff', boxShadow:`0 10px 28px ${p.accent}40`}}>
          Commit to {p.plan.week} <I.Right/>
        </button>
      )}
    </div>
  );
};

// MAYA HOMEPAGE (MVP) — lifted as-is from NEW Lemon main.html
// Same gradient header, MetricWidgets, HistoryStrip, RecCard pillar cards.

const PILLAR_DOT_COLORS = ['#778a62', '#c9a227', '#5b7fa6', '#8b6daa']; // Move, Nutrition, Sleep, Mind

const MetricWidgets = ({ initialWidgets, extraMetrics, bpLogPrompt, onBPLog, bpOverride, bpJustLogged, metricsEmpty, onMetricLog }) => {
  const [editing, setEditing] = useState(false);
  const [widgets, setWidgets] = useState(initialWidgets);
  const remove = (id) => setWidgets(w => w.filter(x => x.id !== id));
  const add    = (m)  => setWidgets(w => [...w, m]);
  const available = (extraMetrics || []).filter(m => !widgets.some(w => w.id === m.id));

  return (
    <div style={{width:'100%'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7}}>
        <p style={{fontSize:9,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',color:'#a8a29e',margin:0}}>Your metrics</p>
        <button onClick={()=>setEditing(e=>!e)} style={{background:editing?'#1a1a1a':'rgba(255,255,255,0.7)',border:`1px solid ${editing?'#1a1a1a':'#d4cfc8'}`,borderRadius:8,padding:'3px 10px',fontSize:10,fontWeight:600,color:editing?'#fff':'#78716c',cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',gap:4,transition:'all 0.15s'}}>
          {editing ? <>Done</> : <><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="11" height="11"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Edit</>}
        </button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:7}}>
        {widgets.map((w) => {
          // BP-specific empty-state tile — centered + button when not logged today
          if (metricsEmpty && w.id === 'bp') {
            return (
              <button key={w.id} onClick={()=>onMetricLog && onMetricLog(w.id)} className="su" aria-label="Log today's blood pressure" style={{
                background:'rgba(255,255,255,0.7)',
                border:`1.5px dashed ${w.color}66`,
                borderRadius:14, padding:'10px 9px 9px',
                position:'relative', cursor:'pointer', fontFamily:'inherit',
                display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:78,
              }}>
                <p style={{fontSize:8,fontWeight:700,letterSpacing:'0.05em',textTransform:'uppercase',color:'#a8a29e',margin:'0 0 6px',lineHeight:1.2,textAlign:'center'}}>{w.label}</p>
                <div style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:30,height:30,borderRadius:'50%',background:w.color,color:'#fff',boxShadow:`0 4px 12px ${w.color}55`}}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </div>
                <p style={{fontSize:9,fontWeight:700,color:w.color,margin:'5px 0 0',whiteSpace:'nowrap'}}>Log BP</p>
              </button>
            );
          }
          // BP log-prompt CTA tile (Option 4 — tile variant, unlogged state)
          if (bpLogPrompt && w.id === 'bp') {
            return (
              <button key={w.id} onClick={onBPLog} className="su" aria-label="Log today's blood pressure" style={{
                background:`linear-gradient(160deg, ${w.color}18 0%, ${w.color}08 100%)`,
                border:`1.5px dashed ${w.color}80`,
                borderRadius:14, padding:'10px 9px 9px',
                position:'relative', cursor:'pointer', textAlign:'left', fontFamily:'inherit',
                animation:'slide-up 0.45s ease-out both, pulseDot 2.4s ease-in-out infinite',
              }}>
                <p style={{fontSize:8,fontWeight:700,letterSpacing:'0.05em',textTransform:'uppercase',color:'#a8a29e',margin:'0 0 4px',lineHeight:1.2}}>{w.label}</p>
                <p style={{fontSize:14,fontWeight:800,color:w.color,margin:'2px 0 0',lineHeight:1.15,letterSpacing:'-0.01em'}}>Tap to log</p>
                <p style={{fontSize:9,color:'#a8a29e',margin:'2px 0 4px'}}>30-second log</p>
                <div style={{display:'inline-flex',alignItems:'center',gap:3,background:w.color+'1a',borderRadius:20,padding:'2px 6px'}}>
                  <span style={{fontSize:9,fontWeight:700,color:w.color,whiteSpace:'nowrap'}}>+ today</span>
                </div>
              </button>
            );
          }
          // Logged-value override (after user logs via sheet)
          const value = bpOverride && w.id === 'bp' ? bpOverride.value : w.value;
          const trend = bpOverride && w.id === 'bp' ? bpOverride.trend : w.trend;
          const justLogged = bpJustLogged && w.id === 'bp';
          return (
            <div key={w.id} className={justLogged ? 'pop' : 'su'} style={{
              background: justLogged ? `linear-gradient(160deg, ${w.color}22 0%, rgba(255,255,255,0.78) 70%)` : 'rgba(255,255,255,0.78)',
              borderRadius:14, padding:'10px 9px 9px',
              border:`1px solid ${justLogged ? w.color+'55' : w.color+'22'}`,
              position:'relative', backdropFilter:'blur(4px)',
              boxShadow: justLogged ? `0 4px 14px ${w.color}33` : 'none',
              transition:'all 0.3s',
            }}>
              {editing && widgets.length > 1 && (
                <button onClick={()=>remove(w.id)} aria-label={`Remove ${w.label}`} style={{position:'absolute',top:-5,right:-5,width:18,height:18,borderRadius:'50%',background:'#e05c5c',border:'2px solid #fff',color:'#fff',fontSize:11,lineHeight:1,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontFamily:'inherit',boxShadow:'0 1px 3px rgba(0,0,0,0.15)',padding:0}}>×</button>
              )}
              <p style={{fontSize:8,fontWeight:700,letterSpacing:'0.05em',textTransform:'uppercase',color:'#a8a29e',margin:'0 0 4px',lineHeight:1.2}}>{w.label}</p>
              <p style={{fontSize:20,fontWeight:900,color:'#1a1a1a',margin:'0 0 0',lineHeight:1,letterSpacing:'-0.02em'}}>{value}</p>
              <p style={{fontSize:9,color:'#a8a29e',margin:'1px 0 4px'}}>{w.sub}</p>
              <div style={{display:'inline-flex',alignItems:'center',gap:2,background:w.color+'15',borderRadius:20,padding:'2px 6px'}}>
                <span style={{fontSize:8,fontWeight:700,color:w.color,whiteSpace:'nowrap'}}>{trend}</span>
              </div>
            </div>
          );
        })}
      </div>
      {editing && available.length > 0 && (
        <div className="su" style={{marginTop:10,padding:'10px 11px 11px',background:'rgba(255,255,255,0.55)',borderRadius:12,border:'1px solid rgba(0,0,0,0.05)'}}>
          <p style={{fontSize:9,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',color:'#a8a29e',margin:'0 0 7px'}}>Add a metric</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
            {available.map(m => (
              <button key={m.id} onClick={()=>add(m)} style={{display:'inline-flex',alignItems:'center',gap:5,background:'#fff',border:`1px solid ${m.color}33`,borderRadius:18,padding:'5px 9px 5px 7px',fontSize:10.5,fontWeight:600,color:'#3a3a38',fontFamily:'inherit',cursor:'pointer',transition:'all 0.15s'}}>
                <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:14,height:14,borderRadius:'50%',background:m.color+'1a',color:m.color,fontSize:11,fontWeight:800,lineHeight:1}}>+</span>
                {m.label}
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

const HistoryStrip = ({ persona, selectedDay, onSelect }) => {
  const days = persona.historicalDays || [];
  const past = days.slice(1, 5);
  const cells = [
    ...past.map(d => ({ key:d.label.toLowerCase(), label:d.label, dots:[!!d.m, !!d.n, !!d.s, !!d.mi] })),
    { key:'fri', label:'Fri', dots:[false,false,false,false] },
  ];
  const tappable = new Set(['wed','thu','fri']);

  return (
    <div style={{marginBottom:6}}>
      <div style={{display:'flex',gap:5}}>
        {cells.map((c,i) => {
          const isSelected = c.key === selectedDay;
          const canTap = tappable.has(c.key);
          return (
            <div
              key={i}
              onClick={canTap ? ()=>onSelect(c.key) : undefined}
              style={{
                flex:1,
                background:isSelected?'#fff':(canTap?'#faf8f3':'#f4f2ec'),
                borderRadius:11,
                padding:'7px 4px 6px',
                border:isSelected?`1.5px solid ${persona.goalColor}`:(canTap?'1px solid #d8d3c8':'1px solid #e8e5de'),
                textAlign:'center',
                cursor:canTap?'pointer':'default',
                boxShadow:isSelected?`0 2px 8px ${persona.goalColor}22`:'none',
                transition:'all 0.15s',
                opacity:canTap?1:0.65,
              }}
            >
              <p style={{fontSize:9.5,fontWeight:isSelected?800:600,color:isSelected?'#1a1a1a':'#78716c',margin:'0 0 4px',textTransform:'uppercase',letterSpacing:'0.04em'}}>{c.label}</p>
              <div style={{display:'flex',gap:2.5,justifyContent:'center'}}>
                {c.dots.map((on,pi) => (
                  <div key={pi} style={{
                    width:5,height:5,borderRadius:'50%',

// ── BreathingSession — guided box-breathing overlay ───────────────────────
const BreathingSession = ({ option, card, onClose, onDone }) => {
  const [tick, setTick] = useState(0);
  const [isComplete, setIsComplete] = useState(false);

  useEffect(() => {
    if (isComplete) return;
    const t = setInterval(() => {
      setTick(s => {
        const next = s + 1;
        if (next >= BTOTAL_SECS) { setIsComplete(true); return BTOTAL_SECS; }
        return next;
      });
    }, 1000);
    return () => clearInterval(t);
  }, [isComplete]);

  const phaseIdx    = Math.floor(tick / BPHASE_DUR) % BPHASES.length;
  const countdown   = BPHASE_DUR - (tick % BPHASE_DUR);
  const phase       = BPHASES[phaseIdx];
  const isExpanded  = phaseIdx === 0 || phaseIdx === 1;
  const ringScale   = isExpanded ? 1.0 : 0.52;
  const progressPct = tick / BTOTAL_SECS;
  const circ        = 2 * Math.PI * 130;

  return (
    <div className="fi" style={{position:'absolute',inset:0,background:'#0e0e1a',zIndex:200,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'space-between',padding:'20px 0 32px'}}>
      <div style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0 20px'}}>
        <button onClick={onClose} style={{background:'rgba(255,255,255,0.08)',border:'none',borderRadius:12,padding:'7px 13px',color:'rgba(255,255,255,0.6)',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>End</button>
        <p style={{fontSize:13,fontWeight:700,color:'rgba(255,255,255,0.5)',margin:0}}>{option.label}</p>
        <div style={{width:60}}/>
      </div>
      <div style={{position:'relative',width:300,height:300,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <svg width="300" height="300" style={{position:'absolute',top:0,left:0}}>
          <circle cx="150" cy="150" r="130" fill="none" stroke="rgba(139,109,170,0.12)" strokeWidth="2"/>
          <circle cx="150" cy="150" r="130" fill="none" stroke={card.color} strokeWidth="2.5"
            strokeDasharray={circ} strokeDashoffset={circ * (1 - progressPct)}
            strokeLinecap="round" transform="rotate(-90 150 150)"
            style={{transition:'stroke-dashoffset 1s linear'}}/>
        </svg>
        <div style={{position:'absolute',width:220,height:220,borderRadius:'50%',border:`1px solid ${card.color}20`}}/>
        <div style={{
          width:180, height:180, borderRadius:'50%',
          border:`2px solid ${card.color}`,
          transform:`scale(${ringScale})`,
          transition:`transform ${BPHASE_DUR}s ease-in-out, box-shadow ${BPHASE_DUR}s ease-in-out`,
          boxShadow: isExpanded ? `0 0 50px ${card.color}55, inset 0 0 30px ${card.color}18` : `0 0 15px ${card.color}22`,
          display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:4,
        }}>
          {!isComplete ? (
            <>
              <p style={{fontSize:22,fontWeight:800,color:'#fff',margin:0,letterSpacing:'-0.02em'}}>{phase}</p>
              <p style={{fontSize:36,fontWeight:900,color:card.color,margin:0,lineHeight:1}}>{countdown}</p>
            </>
          ) : (
            <p style={{fontSize:28,fontWeight:800,color:'#fff',margin:0}}>Done</p>
          )}
        </div>
      </div>
      {!isComplete ? (
        <div style={{textAlign:'center'}}>
          <p style={{fontSize:12,color:'rgba(255,255,255,0.35)',margin:'0 0 4px'}}>{Math.ceil((BTOTAL_SECS - tick) / 60)} min remaining · {BTOTAL_CYCLES} breath cycles</p>
          <p style={{fontSize:11,color:'rgba(255,255,255,0.2)',margin:0}}>Tap End to exit early</p>
        </div>
      ) : (
        <div style={{textAlign:'center',padding:'0 32px'}}>
          <p style={{fontSize:14,fontWeight:600,color:'rgba(255,255,255,0.8)',margin:'0 0 4px'}}>Your nervous system just shifted.</p>
          <p style={{fontSize:12,color:'rgba(255,255,255,0.35)',margin:'0 0 20px'}}>Check your HRV tomorrow morning for the impact.</p>
          <button onClick={onDone} style={{padding:'13px 32px',borderRadius:14,background:card.color,border:'none',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>Back to home</button>
        </div>
      )}
    </div>
  );
};

                    <button onClick={()=>setAdded(a=>({...a,[i]:true}))} style={{padding:'5px 12px',borderRadius:20,flexShrink:0,border:`1.5px solid ${isAdded?'#4CAF7D':card.color}`,background:isAdded?'#4CAF7D':'transparent',color:isAdded?'#fff':card.color,fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',transition:'all 0.2s',display:'inline-flex',alignItems:'center',gap:4}}>
                      {isAdded ? <><I.Check/> Added</> : '+ Add'}
                    </button>
                  </div>
                );
              })}
            </div>
          )}
          {!isLoggingAction && <CalendarSchedule card={card} option={option}/>}
          {isLoggingAction && (
            bpLogged ? (
              <div style={{width:'100%',padding:'13px',borderRadius:14,marginTop:4,background:'#f0faf4',border:'1.5px solid #4CAF7D33',textAlign:'center',display:'flex',alignItems:'center',justifyContent:'center',gap:6,color:'#4CAF7D'}}>
                <I.Check/><span style={{fontSize:14,fontWeight:700,color:'#4CAF7D'}}>Logged · arc updated</span>
              </div>
            ) : (
              <div style={{padding:'12px 13px',borderRadius:16,background:'#fff',border:`1.5px solid ${card.color}25`,marginTop:4}}>
                <p style={{fontSize:9,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',color:card.color,margin:'0 0 9px'}}>Today's reading</p>
                <BPLogForm
                  accent={card.color}
                  yesterdaySys={(bpYesterday && bpYesterday.sys) || 124}
                  yesterdayDia={(bpYesterday && bpYesterday.dia) || 82}
                  yesterdayPulse={(bpYesterday && bpYesterday.pulse) || 66}
                  onSubmit={(data) => {
                    setBpLogged(true);
                    onBPSubmit && onBPSubmit(data);
                    onActivityDone && onActivityDone();
                  }}
                />
              </div>
            )
          )}
          {!isLoggingAction && (
            <div style={{display:'flex',gap:8,marginTop:4}}>
              <button onClick={()=>{
                if (!isSelected) onSelect && onSelect();
                onActivityDone && onActivityDone();
                onComplete && onComplete();
                onClose();
              }} style={{flex:1,padding:'13px',borderRadius:14,background:`linear-gradient(135deg,${card.color},${card.color}cc)`,border:'none',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit',boxShadow:`0 4px 16px ${card.color}44`,display:'inline-flex',alignItems:'center',justifyContent:'center',gap:6}}>
                <I.Check/> I did this
              </button>
              {isMove && (
                <button onClick={()=>{ onLogActivity && onLogActivity(); onClose(); }} style={{flex:1,padding:'13px',borderRadius:14,background:'#fff',border:`1.5px solid ${card.color}40`,color:card.color,fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
                  Log this
                </button>
              )}
            </div>
          )}
        </div>
      </div>
    </>
  );
};

const RecCard = ({ card, onDetail, onActivityDone, bpState, onLogWorkout }) => {
  const [sel, setSel]         = useState(0);
  const [ownOpen, setOwnOpen] = useState(false);
  const [ownText, setOwnText] = useState('');
  const [ownDone, setOwnDone] = useState(false);
  // Per-option completion. Each option index can be marked done independently of focus.
  const [completedOpts, setCompletedOpts] = useState([]);
  const isOptCompleted = (idx) => completedOpts.includes(idx);
  const markOptCompleted = (idx) => setCompletedOpts(arr => arr.includes(idx) ? arr : [...arr, idx]);
  const unmarkOptCompleted = (idx) => setCompletedOpts(arr => arr.filter(i => i !== idx));
  const chosen = card.options[sel];
  const focusIdx = sel;
  const focusCompleted = isOptCompleted(focusIdx);
  // Show only ONE alt + log option (focus + 1 alt + 1 log = 3 total per card)
  const others = card.options.filter((_,i) => i !== sel).slice(0, 1);
  const isLoggingPillar = card.pillar === 'Logging';
  const isBPPrimary = isLoggingPillar && chosen.isLoggingAction;
  const showLoggedTile = isBPPrimary && bpState && bpState.logged;
  const showDismissedTile = isBPPrimary && !showLoggedTile && bpState && bpState.dismissed;
  const noteChips = (bpState && bpState.notes) || [];
  const handleOwnSubmit = () => {
    if (!ownText.trim()) return;
    setOwnDone(true);
    onActivityDone && onActivityDone();
  };
  const openFocusDetail = () => onDetail && onDetail({
    option:chosen, card, isSelected:true, onSelect:null,
    onComplete: () => markOptCompleted(focusIdx),
    onLogActivity: () => onLogWorkout && onLogWorkout(chosen),
  });
  // Alt detail — DO NOT auto-swap focus on completion. Each option tracks its own done state.
  const openAltDetail = (opt, origIdx) => onDetail && onDetail({
    option:opt, card, isSelected:true, onSelect:null,
    onComplete: () => markOptCompleted(origIdx),
    onLogActivity: () => onLogWorkout && onLogWorkout(opt),
  });

  return (
    <div style={{background:'#fff',borderRadius:20,border:'1px solid #efefed',overflow:'hidden',boxShadow:'0 2px 8px rgba(0,0,0,0.05)'}}>
      <div style={{height:3,background:`linear-gradient(90deg,${card.color},${card.color}55)`}}/>
      <div style={{padding:'11px 13px 12px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,gap:8}}>
          <span style={{fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:card.color}}>{card.pillar}</span>
          {card.conditionTag && <AdjustedTag label={card.conditionTag} note={card.adjustedNote} color={card.conditionTagColor}/>}
        </div>
        {showLoggedTile ? (
          <div style={{display:'flex',gap:10,alignItems:'flex-start',marginBottom:9,background:'#f0faf4',borderRadius:14,padding:'10px 11px',border:'1.5px solid #4CAF7D33'}}>
            <div style={{width:42,height:42,borderRadius:13,background:'#fff',color:'#4CAF7D',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:'0 2px 6px rgba(76,175,125,0.18)',marginTop:2}}><I.Check/></div>
            <div style={{flex:1,minWidth:0}}>
              <p style={{fontSize:10,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',color:'#4CAF7D',margin:'0 0 2px'}}>Logged today</p>
              <p style={{fontSize:14,fontWeight:800,color:'#1a1a1a',margin:'0 0 3px',letterSpacing:'-0.02em',lineHeight:1.2}}>
                {(bpState && bpState.value) || '122/78'} <span style={{fontSize:10,fontWeight:600,color:'#a8a29e'}}>mmHg</span>
                {bpState && bpState.pulse ? <span style={{fontSize:11,fontWeight:600,color:'#78716c',marginLeft:6}}>· pulse {bpState.pulse}</span> : null}
              </p>
              {noteChips.length > 0 && (
                <div style={{display:'flex',flexWrap:'wrap',gap:4,margin:'0 0 4px'}}>
                  {noteChips.map((id,i)=>(
                    <span key={i} style={{fontSize:10,fontWeight:600,padding:'2px 7px',borderRadius:10,background:'#fdf0f0',color:'#e05c5c',border:'1px solid #e05c5c33'}}>{BP_NOTE_LABEL(id)}</span>
                  ))}
                </div>
              )}
              <button onClick={()=>onDetail && onDetail({option:chosen,card,isSelected:true,onSelect:null})} style={{padding:0,background:'transparent',border:'none',color:card.color,fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit',display:'inline-flex',alignItems:'center',gap:3}}>
                Log another reading <I.Arrow/>
              </button>
            </div>
          </div>
        ) : showDismissedTile ? (
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:9,background:'#fafaf8',borderRadius:14,padding:'10px 11px',border:'1.5px dashed #d6d3d1'}}>
            <div style={{width:32,height:32,borderRadius:10,background:'#fff',color:'#a8a29e',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,border:'1px solid #efefed'}}><chosen.IC/></div>
            <div style={{flex:1,minWidth:0}}>
              <p style={{fontSize:12,fontWeight:700,color:'#78716c',margin:0,lineHeight:1.3}}>BP — log later</p>
              <p style={{fontSize:10,color:'#a8a29e',margin:'1px 0 0'}}>Dismissed for now</p>
            </div>
            <button onClick={()=>{ bpState && bpState.onUndoDismiss && bpState.onUndoDismiss(); }} style={{padding:'5px 10px',borderRadius:11,background:'transparent',border:`1.5px solid ${card.color}40`,color:card.color,fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
              Undo
            </button>
          </div>
        ) : focusCompleted ? (
          <div className="fi" style={{position:'relative',display:'flex',gap:10,alignItems:'center',marginBottom:9,background:'#f0faf4',borderRadius:14,padding:'10px 11px',border:'1.5px solid #4CAF7D33',overflow:'visible'}}>
            <div style={{width:42,height:42,borderRadius:13,background:'#fff',color:'#4CAF7D',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:'0 2px 6px rgba(76,175,125,0.18)',position:'relative',zIndex:2}}><I.Check/></div>
            {/* Confetti burst — emanates from the check tile */}
            <div style={{position:'absolute',top:21,left:32,width:0,height:0,pointerEvents:'none',zIndex:3}}>
              {[
                { cx:-44, cy:-32, cr:-220, c:'#fcd34d' },
                { cx:-26, cy:-46, cr:160,  c:'#94a47f' },
                { cx:0,   cy:-52, cr:-90,  c:'#3d9e9e' },
                { cx:24,  cy:-46, cr:140,  c:'#e05c5c' },
                { cx:46,  cy:-30, cr:-180, c:'#5b7fa6' },
                { cx:-50, cy:-12, cr:90,   c:'#fbbf24' },
                { cx:52,  cy:-10, cr:-100, c:'#778a62' },
                { cx:-36, cy:18,  cr:200,  c:'#c9a227' },
                { cx:34,  cy:22,  cr:-150, c:'#fcd34d' },
                { cx:-14, cy:-58, cr:80,   c:'#3d9e9e' },
                { cx:14,  cy:-58, cr:-80,  c:'#e05c5c' },
                { cx:-58, cy:6,   cr:240,  c:'#94a47f' },
              ].map((p,i)=>(
                <div key={i} className="confetti-piece" style={{
                  '--cx':`${p.cx}px`, '--cy':`${p.cy}px`, '--cr':`${p.cr}deg`,
                  background:p.c,
                  animationDelay:`${i*0.018}s`,
                }}/>
              ))}
            </div>
            <div style={{flex:1,minWidth:0,position:'relative',zIndex:2}}>
              <p style={{fontSize:14,fontWeight:800,color:'#78716c',margin:'0 0 2px',letterSpacing:'-0.02em',lineHeight:1.2,textDecoration:'line-through'}}>{chosen.label}</p>
              <p style={{fontSize:11,color:'#4CAF7D',fontWeight:700,margin:0}}>Done · arc updated</p>
            </div>
            <button onClick={()=>unmarkOptCompleted(focusIdx)} style={{padding:'5px 9px',borderRadius:10,background:'transparent',border:'1.5px solid #4CAF7D33',color:'#4CAF7D',fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',position:'relative',zIndex:2}}>
              Undo
            </button>
          </div>
        ) : (
          <div style={{position:'relative',marginBottom:9}}>
            <div onClick={openFocusDetail} style={{display:'flex',gap:10,alignItems:'center',cursor:'pointer',background:card.bg,borderRadius:14,padding:'10px 11px',border:`1.5px solid ${card.color}28`}}>
              <div style={{width:42,height:42,borderRadius:13,background:'#fff',color:card.color,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:`0 2px 6px ${card.color}22`}}><chosen.IC/></div>
              <div style={{flex:1,minWidth:0,paddingRight:isBPPrimary?22:0}}>
                <p style={{fontSize:14,fontWeight:800,color:'#1a1a1a',margin:'0 0 4px',letterSpacing:'-0.02em',lineHeight:1.2}}>{chosen.label}</p>
                <p style={{fontSize:10.5,color:card.color,fontWeight:600,margin:0,lineHeight:1.4,opacity:0.8}}>{chosen.why.split('.')[0]}.</p>
              </div>
            </div>
            {isBPPrimary && bpState && bpState.onDismiss && (
              <button onClick={(e)=>{ e.stopPropagation(); bpState.onDismiss(); }} aria-label="Dismiss for today" style={{position:'absolute',top:4,right:4,width:22,height:22,borderRadius:'50%',background:'rgba(255,255,255,0.92)',border:`1px solid ${card.color}30`,color:'#a8a29e',cursor:'pointer',padding:0,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'inherit'}}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" width="11" height="11"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
              </button>
            )}
          </div>
        )}
        {others.length > 0 && (
          <div>
            <p style={{fontSize:9,fontWeight:600,letterSpacing:'0.05em',textTransform:'uppercase',color:'#c4bfb8',margin:'0 0 4px'}}>Or try</p>
            {others.map((opt,i) => {
              const origIdx = card.options.indexOf(opt);
              const altDone = isOptCompleted(origIdx);
              return altDone ? (
                <div key={i} className="fi" style={{display:'flex',alignItems:'center',gap:8,padding:'6px 8px',borderRadius:11,background:'#f0faf4',marginBottom:3,border:'1.5px solid #4CAF7D33'}}>
                  <div style={{width:26,height:26,borderRadius:9,background:'#4CAF7D',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><I.Check/></div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontSize:12,fontWeight:600,color:'#78716c',margin:0,lineHeight:1.2,textDecoration:'line-through'}}>{opt.label}</p>
                    <p style={{fontSize:10,color:'#4CAF7D',fontWeight:700,margin:'1px 0 0'}}>Done · arc updated</p>
                  </div>
                  <button onClick={()=>unmarkOptCompleted(origIdx)} style={{padding:'3px 8px',borderRadius:9,background:'transparent',border:'1.5px solid #4CAF7D33',color:'#4CAF7D',fontSize:9.5,fontWeight:700,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',flexShrink:0}}>Undo</button>
                </div>
              ) : (
                <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 8px',borderRadius:11,background:'#f8f7f3',marginBottom:3}}>
                  <div onClick={()=>setSel(origIdx)} style={{width:26,height:26,borderRadius:9,background:card.bg,color:card.color,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:'pointer'}}><opt.IC/></div>
                  <div onClick={()=>openAltDetail(opt, origIdx)} style={{flex:1,minWidth:0,cursor:'pointer'}}>
                    <p style={{fontSize:12,fontWeight:600,color:'#3a3a38',margin:0,lineHeight:1.2}}>{opt.label}</p>
                  </div>
                  <div style={{color:'#c4bfb8',flexShrink:0}}><I.Arrow/></div>
                </div>
              );
            })}
            {!ownDone && !ownOpen && (
              <div onClick={()=>setOwnOpen(true)} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 8px',borderRadius:11,border:`1.5px dashed ${card.color}40`,background:'transparent',marginBottom:0,cursor:'pointer'}}>
                <div style={{width:26,height:26,borderRadius:9,background:card.bg,color:card.color,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:18,fontWeight:300,lineHeight:1}}>+</div>
                <div style={{flex:1}}>
                  <p style={{fontSize:12,fontWeight:600,color:card.color,margin:0,opacity:0.75}}>My own activity</p>
                  <p style={{fontSize:10,color:'#a8a29e',margin:'1px 0 0'}}>Log something different</p>
                </div>
              </div>
            )}
            {!ownDone && ownOpen && (
              <div style={{borderRadius:11,border:`1.5px solid ${card.color}50`,background:card.bg,padding:'9px 10px',marginBottom:0}}>
                <p style={{fontSize:10,fontWeight:700,color:card.color,margin:'0 0 6px',letterSpacing:'0.04em',textTransform:'uppercase'}}>{card.pillar} — log your own</p>
                <input
                  autoFocus
                  value={ownText}
                  onChange={e=>setOwnText(e.target.value)}
                  onKeyDown={e=>{ if(e.key==='Enter') handleOwnSubmit(); }}
                  placeholder={`What did you do for ${card.pillar.toLowerCase()}?`}
                  style={{width:'100%',border:`1.5px solid ${card.color}30`,borderRadius:9,padding:'8px 10px',fontSize:12,fontFamily:'inherit',color:'#1a1a1a',background:'#fff',outline:'none',marginBottom:7,boxSizing:'border-box'}}
                />
                <div style={{display:'flex',gap:6}}>
                  <button onClick={()=>{ setOwnOpen(false); setOwnText(''); }} style={{flex:1,padding:'7px',borderRadius:9,border:'1.5px solid #e8e5de',background:'transparent',fontSize:12,fontWeight:600,color:'#78716c',cursor:'pointer',fontFamily:'inherit'}}>Cancel</button>
                  <button onClick={handleOwnSubmit} disabled={!ownText.trim()} style={{flex:2,padding:'7px',borderRadius:9,border:'none',background:ownText.trim()?card.color:'#e8e5de',fontSize:12,fontWeight:700,color:'#fff',cursor:ownText.trim()?'pointer':'default',fontFamily:'inherit',transition:'background 0.15s'}}>I did this</button>
                </div>
              </div>
            )}
            {ownDone && (
              <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',borderRadius:11,background:'#f0faf4',border:'1.5px solid #4CAF7D33'}}>
                <div style={{width:26,height:26,borderRadius:9,background:'#4CAF7D',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:'#fff'}}><I.Check/></div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:12,fontWeight:700,color:'#1a1a1a',margin:0,lineHeight:1.3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ownText}</p>
                  <p style={{fontSize:10,color:'#4CAF7D',fontWeight:600,margin:'1px 0 0'}}>Logged · arc updated</p>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
};

// BP LOGGING ATOMS — shared across home variants
// NumberPicker, BPLogSheet (bottom sheet), LemonAsksBP (inline ask), confirmation line
// ─────────────────────────────────────────────────────────────────────────────
const NumberPicker = ({ label, value, onChange, color, compact = false }) => {
  const v = parseInt(value, 10) || 0;
  const dec = () => onChange(String(Math.max(40, v - 1)));
  const inc = () => onChange(String(Math.min(220, v + 1)));
  const btnSize = compact ? 26 : 30;
  const inputW  = compact ? 44 : 54;
  const inputF  = compact ? 22 : 26;
  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap: compact ? 4 : 6}}>
      <p style={{fontSize:9,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',color:'#a8a29e',margin:0}}>{label}</p>
      <div style={{display:'flex',alignItems:'center',gap: compact ? 6 : 8,background:'#fff',border:'1.5px solid #e8e5de',borderRadius:14,padding: compact ? '6px 8px' : '8px 10px'}}>
        <button onClick={dec} aria-label={`Decrease ${label}`} style={{width:btnSize,height:btnSize,borderRadius:9,background:'#f5f5f4',border:'none',color:'#57534e',fontSize: compact ? 16 : 18,fontWeight:700,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>−</button>
        <input
          type="number" inputMode="numeric" value={value}
          onChange={e=>onChange(e.target.value.replace(/[^0-9]/g,''))}
          style={{width:inputW,textAlign:'center',fontSize:inputF,fontWeight:900,color:'#1a1a1a',border:'none',outline:'none',background:'transparent',fontFamily:'inherit',letterSpacing:'-0.02em',padding:0}}
        />
        <button onClick={inc} aria-label={`Increase ${label}`} style={{width:btnSize,height:btnSize,borderRadius:9,background:color+'1a',border:'none',color,fontSize: compact ? 16 : 18,fontWeight:700,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>+</button>
      </div>
    </div>
  );
};

            Skip for today
          </button>
        </div>
      </div>
    </>
  );

// Inline conversational ask — Option 5 (ask variant)

const LemonAsksBP = ({ onLog, yesterdaySys=124, yesterdayDia=82, yesterdayPulse=66, accent='#3d9e9e', onDismiss }) => {
  return (
    <div className="su" style={{
      background:'linear-gradient(160deg,#fffcf5 0%,#fef9c3 100%)',
      border:'1px solid #fde047',
      borderRadius:18, padding:'14px 14px 13px',
      boxShadow:'0 2px 10px rgba(252,211,77,0.18)',

// ── Shared BP logging form — used in chat (H_BPInputCard) and homepage (DetailSheet) ──
const BP_NOTE_CHIPS = [
  { id:'caffeine', label:'Caffeine'  },
  { id:'alcohol',  label:'Alcohol'   },
  { id:'exercise', label:'Exercise'  },
  { id:'stressed', label:'Stressed'  },
  { id:'meds',     label:'Took meds' },
];
const BP_NOTE_LABEL = id => {
  const c = BP_NOTE_CHIPS.find(x=>x.id===id);
  return c ? c.label : id;
};

const BPLogForm = ({
  onSubmit,
  yesterdaySys = 124, yesterdayDia = 82, yesterdayPulse = 66,
  accent = '#e05c5c',
  prefillSys, prefillDia, prefillPulse,
  submitLabel = 'Log it',
  defaultNotesOpen = false,
  compact = false,
}) => {
  const [sys, setSys]     = useState(prefillSys != null ? String(prefillSys) : String(yesterdaySys));
  const [dia, setDia]     = useState(prefillDia != null ? String(prefillDia) : String(yesterdayDia));
  const [pulse, setPulse] = useState(prefillPulse != null ? String(prefillPulse) : String(yesterdayPulse));
  const [notes, setNotes] = useState([]);
  const [notesOpen, setNotesOpen] = useState(defaultNotesOpen);
  const [otherOpen, setOtherOpen] = useState(false);
  const [otherText, setOtherText] = useState('');

  const ready = !!(sys && dia);
  const toggleNote = id => setNotes(arr => arr.includes(id) ? arr.filter(x=>x!==id) : [...arr, id]);
  const buildPayload = (overrides) => {
    const base = {
      sys: parseInt(sys,10), dia: parseInt(dia,10),
      pulse: pulse ? parseInt(pulse,10) : null,
      notes: notes.slice(),
      otherNote: otherText.trim() || null,
    };
    return Object.assign(base, overrides || {});
  };
  const submit = () => {
    if (!ready) return;
    onSubmit && onSubmit(buildPayload());
  };
  const sameAsYesterday = () => {
    onSubmit && onSubmit({
      sys: yesterdaySys, dia: yesterdayDia, pulse: yesterdayPulse,
      notes: [], otherNote: null,
    });
  };

  const decPulse = () => setPulse(p => String(Math.max(30, (parseInt(p,10)||60) - 1)));
  const incPulse = () => setPulse(p => String(Math.min(200, (parseInt(p,10)||60) + 1)));

  const gap = compact ? 7 : 10;
  const submitPad = compact ? '10px' : '12px';
  const submitFont = compact ? 13 : 14;
  return (
    <div style={{display:'flex',flexDirection:'column',gap}}>
      {/* Yesterday anchor + same-as-yesterday shortcut */}
      <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
        <div style={{display:'inline-flex',alignItems:'center',gap:6,background:'#f2f0eb',borderRadius:20,padding: compact ? '3px 9px' : '4px 11px'}}>
          <span style={{fontSize: compact ? 9.5 : 10,fontWeight:600,color:'#78716c'}}>Yesterday:</span>
          <span style={{fontSize: compact ? 10.5 : 11,fontWeight:800,color:'#3a3a38'}}>{yesterdaySys}/{yesterdayDia} · pulse {yesterdayPulse}</span>
        </div>
        <button onClick={sameAsYesterday} style={{padding: compact ? '3px 9px' : '4px 10px',borderRadius:14,background:'#fff',border:`1.5px solid ${accent}40`,color:accent,fontSize: compact ? 10 : 10.5,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
          Same as yesterday?
        </button>
      </div>
      {/* Sys/dia hero */}
      <div style={{display:'flex',alignItems:'flex-end',gap: compact ? 8 : 10}}>
        <NumberPicker label="Systolic"  value={sys} onChange={setSys} color={accent} compact={compact}/>
        <span style={{fontSize: compact ? 26 : 30,color:'#d6d3d1',fontWeight:300,paddingBottom: compact ? 6 : 8}}>/</span>
        <NumberPicker label="Diastolic" value={dia} onChange={setDia} color={accent} compact={compact}/>
      </div>
      {/* Pulse — secondary */}
      <div style={{display:'flex',alignItems:'center',gap:8,padding: compact ? '5px 10px' : '7px 11px',background:'#fff',border:'1.5px solid #efefed',borderRadius:12}}>
        <span style={{fontSize:10,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',color:'#a8a29e'}}>Pulse · bpm</span>
        <div style={{flex:1}}/>
        <button onClick={decPulse} aria-label="Decrease pulse" style={{width: compact ? 22 : 24,height: compact ? 22 : 24,borderRadius:7,background:'#f5f5f4',border:'none',color:'#57534e',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>−</button>
        <input
          type="number" inputMode="numeric" value={pulse}
          onChange={e=>setPulse(e.target.value.replace(/[^0-9]/g,''))}
          aria-label="Pulse"
          style={{width: compact ? 36 : 42,textAlign:'center',fontSize: compact ? 14 : 16,fontWeight:800,color:'#1a1a1a',border:'none',outline:'none',background:'transparent',fontFamily:'inherit',padding:0}}
        />
        <button onClick={incPulse} aria-label="Increase pulse" style={{width: compact ? 22 : 24,height: compact ? 22 : 24,borderRadius:7,background:accent+'1a',border:'none',color:accent,fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>+</button>
      </div>
      {/* Notes — collapsed unless defaultNotesOpen */}
      {!notesOpen ? (
        <button onClick={()=>setNotesOpen(true)} style={{alignSelf:'flex-start',padding:'5px 10px',borderRadius:12,background:'transparent',border:'1.5px dashed #d6d3d1',color:'#78716c',fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>
          + Add context (optional)
        </button>
      ) : (
        <div style={{padding: compact ? '7px 9px' : '10px 11px',background:'#fafaf8',border:'1px solid #efefed',borderRadius:12,display:'flex',flexDirection:'column',gap: compact ? 6 : 8}}>
          {!compact && (
            <p style={{fontSize:9,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',color:'#a8a29e',margin:0}}>Anything affect this reading?</p>
          )}
          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
            {BP_NOTE_CHIPS.map(c => {
              const sel = notes.includes(c.id);
              return (
                <button key={c.id} onClick={()=>toggleNote(c.id)} style={{padding: compact ? '4px 9px' : '5px 11px',borderRadius:14,fontSize: compact ? 10.5 : 11,fontWeight:600,border:`1.5px solid ${sel?accent:'#e8e5de'}`,background:sel?accent:'#fff',color:sel?'#fff':'#57534e',cursor:'pointer',fontFamily:'inherit',transition:'all 0.15s'}}>
                  {c.label}
                </button>
              );
            })}
            {!otherOpen && (
              <button onClick={()=>setOtherOpen(true)} style={{padding: compact ? '4px 9px' : '5px 11px',borderRadius:14,fontSize: compact ? 10.5 : 11,fontWeight:600,border:'1.5px dashed #d6d3d1',background:'transparent',color:'#78716c',cursor:'pointer',fontFamily:'inherit'}}>
                + Other
              </button>
            )}
          </div>
          {otherOpen && (
            <input
              autoFocus
              value={otherText}
              onChange={e=>setOtherText(e.target.value)}
              placeholder="Anything else worth noting?"
              style={{width:'100%',border:'1.5px solid #e8e5de',borderRadius:9,padding:'7px 9px',fontSize:11.5,fontFamily:'inherit',color:'#1a1a1a',background:'#fff',outline:'none',boxSizing:'border-box'}}
            />
          )}
        </div>
      )}
      <button onClick={submit} disabled={!ready} style={{width:'100%',padding:submitPad,borderRadius:13,background:ready?`linear-gradient(135deg, ${accent}, ${accent}d0)`:'#e8e5de',color:'#fff',fontSize:submitFont,fontWeight:700,border:'none',cursor:ready?'pointer':'default',fontFamily:'inherit',boxShadow:ready?`0 6px 18px ${accent}33`:'none',transition:'all 0.15s'}}>
        {submitLabel}
      </button>
    </div>
  );
};

// ── CalendarSheet — premium date picker for time-travel ──────────────────────
// Replaces the always-visible HistoryStrip with an on-demand calendar surface.
const DAY_LABELS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTH_LABELS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const formatDateLabel = (d) => `${DAY_LABELS_SHORT[d.getDay()]} · ${MONTH_LABELS_SHORT[d.getMonth()]} ${d.getDate()}`;

const CalendarSheet = ({ today, selectedDate, onClose, onSelect }) => {
  const init = selectedDate || today;
  const [monthInput, setMonthInput] = useState(MONTH_LABELS_SHORT[init.getMonth()]);
  const [dateInput,  setDateInput]  = useState(String(init.getDate()));
  const [timeInput,  setTimeInput]  = useState('07:14 AM');
  const submit = () => {
    const monthIdx = MONTH_LABELS_SHORT.findIndex(m => m.toLowerCase() === (monthInput || '').toLowerCase().slice(0,3));
    const day = parseInt(dateInput, 10);
    if (monthIdx < 0 || isNaN(day)) { onClose(); return; }
    const newDate = new Date(today);
    newDate.setMonth(monthIdx, day);
    onSelect(newDate);
    onClose();
  };

  return (
    <>
      <div onClick={onClose} className="fi" style={{position:'absolute',inset:0,background:'rgba(10,15,30,0.45)',zIndex:80}}/>
      <div className="sheet-in" style={{position:'absolute',bottom:0,left:0,right:0,background:'#fafaf8',borderRadius:'22px 22px 0 0',zIndex:81,paddingBottom:24,boxShadow:'0 -10px 40px rgba(0,0,0,0.18)'}}>
        <div style={{width:36,height:4,borderRadius:2,background:'#e0dcd6',margin:'10px auto 0'}}/>
        <div style={{padding:'14px 20px 0'}}>
          <p style={{fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'#a8a29e',margin:'0 0 4px'}}>Pick a day</p>
          <h3 style={{fontSize:18,fontWeight:800,color:'#1a1a1a',margin:'0 0 16px',letterSpacing:'-0.01em'}}>Jump to a date and time</h3>

          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <div style={{flex:1.2}}>
              <label style={{display:'block',fontSize:9,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',color:'#a8a29e',marginBottom:5}}>Month</label>
              <input
                type="text"
                value={monthInput}
                onChange={e=>setMonthInput(e.target.value)}
                placeholder="May"
                style={{width:'100%',padding:'10px 12px',background:'#fff',border:'1.5px solid #e8e5de',borderRadius:11,fontSize:14,fontWeight:600,color:'#1a1a1a',fontFamily:'inherit',outline:'none',boxSizing:'border-box'}}
              />
            </div>
            <div style={{flex:0.9}}>
              <label style={{display:'block',fontSize:9,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',color:'#a8a29e',marginBottom:5}}>Date</label>
              <input
                type="text"
                inputMode="numeric"
                value={dateInput}
                onChange={e=>setDateInput(e.target.value.replace(/[^0-9]/g,''))}
                placeholder="7"
                style={{width:'100%',padding:'10px 12px',background:'#fff',border:'1.5px solid #e8e5de',borderRadius:11,fontSize:14,fontWeight:600,color:'#1a1a1a',fontFamily:'inherit',outline:'none',textAlign:'center',boxSizing:'border-box'}}
              />
            </div>
            <div style={{flex:1.4}}>
              <label style={{display:'block',fontSize:9,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',color:'#a8a29e',marginBottom:5}}>Time</label>
              <input
                type="text"
                value={timeInput}
                onChange={e=>setTimeInput(e.target.value)}
                placeholder="7:14 AM"
                style={{width:'100%',padding:'10px 12px',background:'#fff',border:'1.5px solid #e8e5de',borderRadius:11,fontSize:14,fontWeight:600,color:'#1a1a1a',fontFamily:'inherit',outline:'none',boxSizing:'border-box'}}
              />
            </div>
          </div>

          <p style={{fontSize:10.5,color:'#a8a29e',margin:'0 0 14px',lineHeight:1.5}}>Type a month name (e.g. May), date number (1–31), and time. Lemon will jump to that day's view.</p>

          <button onClick={submit} style={{width:'100%',padding:'12px',borderRadius:13,background:'linear-gradient(135deg,#778a62,#5d6e4d)',color:'#fff',fontSize:14,fontWeight:700,border:'none',cursor:'pointer',fontFamily:'inherit',boxShadow:'0 6px 18px rgba(119,138,98,0.33)'}}>
            Go to that day
          </button>
        </div>
      </div>
    </>
  );
};

  // BP logging state — drives Options 4 (tile) and 5 (ask) and metric empty states. Variants start unlogged.
  const [bpLogged, setBpLogged]   = useState(!p.bpLogVariant && !p.routerStrip);
  const [bpValue, setBpValue]     = useState(null);
  const [bpPulse, setBpPulse]     = useState(null);
  const [bpNotes, setBpNotes]     = useState([]);
  const [bpDelta, setBpDelta]     = useState(0);
  const [logSheetOpen, setLogSheetOpen] = useState(false);
  const [bpJustLogged, setBpJustLogged] = useState(false);
  const [bpDismissed, setBpDismissed] = useState(false);
  const [bpAskDismissed, setBpAskDismissed] = useState(false);
  // Compact header — date dropdown + calendar sheet
  const TODAY = useMemo(() => new Date(2026, 4, 7), []); // May 7, 2026 — mockup "Sunday Week 4" date
  const [selectedDate, setSelectedDate] = useState(TODAY);
  const [dateSheet, setDateSheet]       = useState(false);
  const isToday = selectedDate.toDateString() === TODAY.toDateString();
  const yesterdaySys = 124, yesterdayDia = 82, yesterdayPulse = 66;
  const handleLogBP = (a, b) => {
    let s, d, pulse = null, notes = [];
    if (a && typeof a === 'object') {
      s = a.sys; d = a.dia; pulse = a.pulse || null; notes = a.notes || [];
    } else {
      s = parseInt(a,10) || yesterdaySys;
      d = parseInt(b,10) || yesterdayDia;
    }
    setBpValue(`${s}/${d}`);
    setBpPulse(pulse);
    setBpNotes(notes);
    setBpDelta(s - yesterdaySys);
    setBpLogged(true);
    setBpDismissed(false);
    setBpJustLogged(true);
    setLogSheetOpen(false);
    setTimeout(() => setBpJustLogged(false), 2400);
  };
  const bpOverride = bpLogged && bpValue ? {
    value: bpValue,
    trend: bpDelta < 0 ? `↓ ${Math.abs(bpDelta)} systolic` : bpDelta > 0 ? `↑ ${bpDelta} systolic` : 'same as yesterday',
  } : null;
  const selectDay = key => { setSelectedDay(key); setAnimK(k=>k+1); };
  const openDetail  = data => setDetail(data);
  const closeDetail = () => setDetail(null);
  const onActivityDone = () => setDoneSessions(s=>s+1);

      <LemonNav active="home" onSelect={(id)=>{

      {detail && !breathing && (

          onClose={closeDetail}
          onSelect={()=>{ detail.onSelect && detail.onSelect(); }}
          onStartBreathing={()=>{ setBreathing({ option:detail.option, card:detail.card }); setDetail(null); }}
          onActivityDone={onActivityDone}
          onComplete={()=>{ detail.onComplete && detail.onComplete(); }}
          onLogActivity={()=>{ detail.onLogActivity && detail.onLogActivity(); }}
          onBPSubmit={(data)=>handleLogBP(data)}
          bpYesterday={{sys:yesterdaySys, dia:yesterdayDia, pulse:yesterdayPulse}}
        />
      )}

      {breathing && (
        <BreathingSession
          option={breathing.option} card={breathing.card}
          onClose={()=>setBreathing(null)}
          onDone={()=>{ setBreathing(null); onActivityDone(); }}
        />
      )}

      {/* BP Log bottom sheet — opens from tile-variant CTA */}
      {logSheetOpen && (
        <BPLogSheet
          onLog={handleLogBP}
          onClose={()=>setLogSheetOpen(false)}
          yesterdaySys={yesterdaySys} yesterdayDia={yesterdayDia}
          accent={p.widgets && p.widgets.find(w=>w.id==='bp')?.color || '#3d9e9e'}

      )}

      {/* Calendar bottom sheet — date dropdown for time travel (compactHeader variant) */}
      {dateSheet && (
        <CalendarSheet
          today={TODAY}
          selectedDate={selectedDate}
          onClose={()=>setDateSheet(false)}
          onSelect={(d)=>{ setSelectedDate(d); setAnimK(k=>k+1); }}
        />
      )}
    </>
  );
};

              <span style={{fontSize:11,color:'#a8a29e',marginLeft:'auto'}}>{notifState === 'logged' ? 'just now' : 'now'}</span>
            </div>
            {notifState === 'logged' ? (
              <>
                <p style={{fontSize:14,fontWeight:700,color:'#1a1a1a',margin:'0 0 2px',letterSpacing:'-0.01em'}}>Logged · 124/82 mmHg</p>
                <p style={{fontSize:12.5,color:'#4CAF7D',fontWeight:600,margin:0,lineHeight:1.4}}>Pulse 66 · 5-day streak below 125</p>
              </>
            ) : (
              <>
                <p style={{fontSize:14,fontWeight:700,color:'#1a1a1a',margin:'0 0 2px',letterSpacing:'-0.01em'}}>Time to log your morning BP</p>
                <p style={{fontSize:12.5,color:'#57534e',margin:'0 0 10px',lineHeight:1.4}}>Yesterday: <span style={{fontWeight:700,color:'#3a3a38'}}>124/82</span> · pulse 66</p>
                <div style={{display:'grid',gridTemplateColumns:'1.4fr 1fr 0.9fr',gap:6,borderTop:'1px solid rgba(0,0,0,0.07)',paddingTop:8}}>
                  <button onClick={handleNotifSame} style={{
                    padding:'9px 8px', borderRadius:11,
                    background:'rgba(0,0,0,0.05)', border:'none',
                    fontSize:11.5, fontWeight:700, color:'#1a1a1a',
                    cursor:'pointer', fontFamily:'inherit', transition:'background 0.15s',
                  }}>Same as yesterday</button>
                  <button onClick={handleNotifAdjust} style={{
                    padding:'9px 8px', borderRadius:11,
                    background:'rgba(0,0,0,0.05)', border:'none',
                    fontSize:11.5, fontWeight:600, color:'#3a3a38',
                    cursor:'pointer', fontFamily:'inherit', transition:'background 0.15s',
                  }}>Adjust</button>
                  <button onClick={handleNotifSnooze} style={{
                    padding:'9px 8px', borderRadius:11,
                    background:'rgba(0,0,0,0.05)', border:'none',
                    fontSize:11.5, fontWeight:600, color:'#78716c',
                    cursor:'pointer', fontFamily:'inherit', transition:'background 0.15s',
                  }}>Snooze</button>
                </div>
              </>
            )}
          </div>
          <p style={{fontSize:11,color:'#a8a29e',margin:0,maxWidth:357,textAlign:'center',lineHeight:1.4}}>{notifState === 'logged' ? 'Done. App never opened. The metric widget updates next time you do.' : '~80% of mornings: tap "Same as yesterday" → logged without opening the app.'}</p>
        </div>
      )}

      <div className="device" key={`${pk}-${animKey}`}>
        <div className="notch"/>

        {p.isChatView ? (
          <ChatLoggingView/>
        ) : p.isStatsView ? (
          <StatsView persona={p} onSwitchPersona={switchPersona}/>
        ) : p.isCommunityView ? (
          <CommunityView persona={p} onSwitchPersona={switchPersona}/>
        ) : p.isMealPrepView ? (
          <MealPrepView persona={p} onSwitchPersona={switchPersona}/>
        ) : isHomeView ? (
          <HomeView
            persona={p}
            onOpenReport={()=>switchPersona('maya')}
            view={p.routerStrip ? v5View : undefined}
            setView={p.routerStrip ? setV5View : undefined}
            chatInitialStage={chatInitialStage}
            onOpenChat={p.routerStrip ? (stage, activity)=>{ setChatInitialStage(stage || 'main'); setChatInitialActivity(activity || null); setV5View('chat'); } : undefined}
            chatInitialActivity={chatInitialActivity}
            onSwitchPersona={switchPersona}
          />
        ) : (
        <>
        <div style={{position:'relative',zIndex:5,padding:'10px 18px 6px',background:'rgba(248,247,243,0.95)',borderBottom:'1px solid #efefed',flexShrink:0}}>
          <div className="flex items-center justify-between">
            <button onClick={!isFirst?goPrev:undefined} className="w-7 h-7 flex items-center justify-center text-stone-400">
              {!isFirst ? <I.Back/> : <I.Close/>}
            </button>
            <div className="flex items-center gap-1.5">
              {seq.map(n=>(
                <button key={n} onClick={()=>setPage(n)} className="rounded-full transition-all"
                  style={{height:6, width: page===n ? 22 : 6, background: page===n ? p.accent : '#d6d3d1'}}/>
              ))}
            </div>
            <button className="w-7 h-7 flex items-center justify-center text-stone-400"><I.Share/></button>
          </div>
        </div>

        {pk !== 'maya' && (
          <div style={{padding:'10px 18px 8px',background:'#fff',borderBottom:'1px solid #efefed',flexShrink:0}}>
            <div className="flex items-center gap-2.5">
              <div style={{width:30,height:30,borderRadius:'50%',background:p.grad,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#fff'}}>{p.initial}</div>
              <div className="flex-1 min-w-0">
                <p className="text-[12px] font-semibold text-stone-600 leading-none">{p.name}, {p.age}</p>
                <p className="text-[10px] text-stone-400 mt-0.5 leading-none">Goal · {p.goalLabel}</p>
              </div>
              <span className="lemon-text" style={{fontWeight:800,fontSize:14,letterSpacing:'-0.02em'}}>lemon</span>
            </div>
          </div>
        )}

        <div className="screen fi" key={`${pk}-${page}`} style={{position:'relative'}}>
          {page===1 && <Page1 p={p}/>}
          {page===2 && <Page2 p={p}/>}
          {page===3 && (
            <Page3 p={p}
              directions={directions} setDirections={setDirections}
              contexts={contexts} setContexts={setContexts}
              otherNote={otherNote} setOtherNote={setOtherNote}
              onContinue={goNext}/>
          )}
          {page===4 && <Page4 p={p} directions={directions} contexts={contexts} onContinue={goNext}/>}
          {page===5 && <Page5 p={p} directions={directions} openSheet={setSheet} onBackToHome={()=>switchPersona('mayaHomeV5')}/>}

          {sheet==='doctor' && p.commit.doctor && (
            <BottomSheet onClose={()=>setSheet(null)} title={`Preview — what ${p.commit.doctor.name} receives`}>
              <p className="text-[11.5px] text-stone-500 mb-3 leading-relaxed">
                Sent Sunday evening. Email + PDF attachment. {p.commit.doctor.name} doesn’t need Lemon.
              </p>
              <DoctorView p={p} accent={p.accent}/>
              <div className="mt-4">
                <p className="text-[11px] font-semibold uppercase tracking-wide text-stone-400 mb-2">Attached PDF</p>
                <PDFExportPreview p={p}/>
              </div>
              <div className="mt-4 flex gap-2">
                <button className="flex-1 py-3 rounded-xl text-[13px] font-semibold text-white inline-flex items-center justify-center gap-1.5" style={{background:p.accent}}>
                  <I.Send/> Send to {p.commit.doctor.name}
                </button>
                <button className="px-4 py-3 rounded-xl text-[13px] font-semibold text-stone-600 bg-stone-100">Save PDF</button>
              </div>
              <p className="text-[10.5px] text-stone-400 mt-3 leading-snug text-center italic">
                For clinical reference only. Lemon is not a medical device.
              </p>
            </BottomSheet>
          )}
          {sheet==='export' && p.canExport && (
            <BottomSheet onClose={()=>setSheet(null)} title="Preview — 28-day BP report (PDF)">
              <p className="text-[11.5px] text-stone-500 mb-3 leading-relaxed">
                A one-page PDF you can save, print, or share. Generated on demand from your last 28 days of logged data.
              </p>
              <PDFExportPreview p={p}/>
              <div className="mt-4 flex gap-2">
                <button className="flex-1 py-3 rounded-xl text-[13px] font-semibold text-white" style={{background:p.accent}}>Save PDF</button>
                <button className="flex-1 py-3 rounded-xl text-[13px] font-semibold text-stone-600 bg-stone-100">Share</button>
              </div>
              <p className="text-[10.5px] text-stone-400 mt-3 leading-snug text-center italic">
                For personal reference only. Lemon is not a medical device.
              </p>
            </BottomSheet>
          )}
        </div>

        {!isLast && (
          <div style={{padding:'10px 18px 14px',background:'rgba(248,247,243,0.97)',borderTop:'1px solid #efefed',flexShrink:0}}>
            <div className="flex items-center justify-between">
              <button onClick={goPrev} disabled={isFirst}
                className={`text-[13px] font-semibold inline-flex items-center gap-1 ${isFirst?'text-stone-300':'text-stone-500'}`}>
                <I.Back/>Back
              </button>
              <span className="text-[11px] text-stone-400">{currentIdx+1} of {seq.length}</span>
              <button onClick={goNext}
                className="text-[13px] font-semibold inline-flex items-center gap-1"
                style={{color:p.accent, opacity: page===3 && !allDirSet ? 0.4 : 1}}
                disabled={page===3 && !allDirSet}>
                Next <I.Forward/>
              </button>
            </div>
          </div>
        )}
        </>
        )}
      </div>

      <div style={{maxWidth:620,fontSize:11,color:'#a8a29e',textAlign:'center',lineHeight:1.6}}>
        {p.isChatView
          ? <>Chat logging (Option G refined) · Sodium-aware meal capture for hypertension. Tap “Looks right” to log → red dot pulses on the menu → tap the hamburger to slide in the Health Journal drawer.<br/>Numbers are illustrative.</>
          : p.bpLogVariant === 'ask'
          ? <>Option 3 — Lemon asks. A warm conversational prompt at the top of the cards area. Two inline number fields with yesterday as anchor → submit collapses the ask to a single sage confirmation line; the BP metric tile updates in lockstep.<br/>Numbers are illustrative.</>
          : isHomeView
          ? <>Hypertension homepage · DASH-adjusted recommendations, fully interactive cards, calendar scheduling, and a Sunday "Week in review" banner that opens the weekly progress report.<br/>Numbers are illustrative.</>
          : <>Weekly progress report · 3 pages — Page 1 week-in-numbers (Actions / BP / Weight), Page 2 cause-and-effect, Page 5 commit. Submit lands on a celebration screen with a Back to home button that routes to the hypertension homepage.<br/>Numbers are illustrative.</>
        }
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
