  .hide-scrollbar::-webkit-scrollbar { display:none; }

  @keyframes slide-up   { from {opacity:0; transform:translateY(14px);} to {opacity:1; transform:translateY(0);} }
  @keyframes sheet-up   { from {transform:translateY(100%);} to {transform:translateY(0);} }
  @keyframes fade-in    { from {opacity:0;} to {opacity:1;} }
  @keyframes pop        { 0% {transform:scale(0.85); opacity:0;} 60% {transform:scale(1.04);} 100% {transform:scale(1); opacity:1;} }
  @keyframes draw-line  { from {stroke-dashoffset:600;} to {stroke-dashoffset:0;} }
  @keyframes celebrate-bounce {
    0%   { transform:scale(0.3) rotate(-10deg); opacity:0; }
    50%  { transform:scale(1.15) rotate(3deg);  opacity:1; }
    70%  { transform:scale(0.95) rotate(-1deg); }
    100% { transform:scale(1) rotate(0deg);     opacity:1; }
  }
  .su   { animation:slide-up 0.45s ease-out both; }
  .su1  { animation:slide-up 0.45s ease-out 0.07s both; }
  .su2  { animation:slide-up 0.45s ease-out 0.14s both; }
  .su3  { animation:slide-up 0.45s ease-out 0.21s both; }
  .su4  { animation:slide-up 0.45s ease-out 0.28s both; }
  .su5  { animation:slide-up 0.45s ease-out 0.35s both; }
  .fi   { animation:fade-in 0.35s ease-out both; }
  .pop  { animation:pop 0.45s ease-out both; }
  .sheet-in { animation:sheet-up 0.32s cubic-bezier(0.32, 0.72, 0, 1) both; }
  .draw-line  { stroke-dasharray:600; animation:draw-line 1.4s ease-out 0.2s both; }
  .celebrate  { animation:celebrate-bounce 0.7s ease-out; }
  .adjust-area {
    background:#fff; outline:none;
    border:1px solid #e7e5e4; border-radius:14px;
    width:100%; padding:14px;
    color:#3a3a38; font: inherit; resize:none;
    transition: all 0.15s ease;
  }

const TrendChart = ({ series, accent, target=null, todayLabel='today' }) => {
  const w=305, h=140, pad=18;
  const min = (target!==null ? Math.min(...series, target) : Math.min(...series)) - 4;
  const max = (target!==null ? Math.max(...series, target) : Math.max(...series)) + 4;
  const x = i => pad + (i*(w-pad*2))/(series.length-1);
  const y = v => h - pad - ((v-min)/(max-min))*(h-pad*2);
  const rolling = series.map((_,i)=>{
    const start = Math.max(0,i-6);
    const slice = series.slice(start,i+1);
    return slice.reduce((a,b)=>a+b,0)/slice.length;
  });
  const linePath = series.map((v,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const avgPath  = rolling.map((v,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const tY = target!==null ? y(target).toFixed(1) : null;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
      {target!==null && (
        <>
          <line x1={pad} y1={tY} x2={w-pad} y2={tY} stroke="#94a47f" strokeWidth="1" strokeDasharray="3 4" opacity="0.6"/>
          <text x={w-pad} y={Number(tY)-4} fontSize="9" fill="#94a47f" textAnchor="end" fontWeight="600">target ≤ {target}</text>
        </>
      )}
      <path d={linePath} fill="none" stroke={accent+'40'} strokeWidth="1.4" strokeLinecap="round"/>
      {series.map((v,i)=> (
        <circle key={i} cx={x(i)} cy={y(v)} r={i===series.length-1?3.2:1.6} fill={i===series.length-1?accent:accent+'80'}/>
      ))}
      <path d={avgPath} fill="none" stroke={accent} strokeWidth="2.2" strokeLinecap="round" className="draw-line"/>
      <text x={pad} y={h-4} fontSize="9" fill="#a8a29e">28d ago</text>
      <text x={w-pad} y={h-4} fontSize="9" fill="#a8a29e" textAnchor="end">{todayLabel}</text>
    </svg>
  );
};

    setTargets(prev => prev.map((t,i)=>{
      if (i!==idx) return t;
      const step = t.step || 1;
      return { ...t, target: Math.max(t.min, Math.min(t.max, t.target + delta*step)) };
    }));
  };

  const visible = pillarsFor(p);

                  <p className="text-[11px] text-stone-400">{p.commit.partner.role}</p>
                </div>
                <button className="text-[12px] font-semibold text-stone-500 inline-flex items-center gap-1"><I.Refresh/>change</button>
              </div>
              <p className="text-[12px] text-stone-500 mt-3 leading-relaxed">{p.commit.partner.name} will see your weekly commitment Sunday and a Wednesday mid-week check-in. They don’t need Lemon to receive it.</p>
            </div>
          ) : (
            <>
              <div className="mt-4 bg-white rounded-2xl border-2 border-dashed border-stone-200 p-4 su3">
                <p className="text-[11px] font-semibold uppercase tracking-wide text-stone-400 mb-3">Accountability partner</p>
                <div className="flex items-center gap-3">
                  <div className="w-11 h-11 rounded-full flex items-center justify-center bg-stone-100 text-stone-400">
                    <I.PlusCircle/>
                  </div>
                  <div className="flex-1 min-w-0">
                    <p className="text-sm font-semibold text-stone-600">Add a partner</p>
                    <p className="text-[11px] text-stone-400">Spouse, family, friend, walking buddy</p>
                  </div>
                </div>
                <button className="mt-3.5 w-full py-2.5 rounded-xl text-[12.5px] font-semibold flex items-center justify-center gap-2" style={{background:p.accent+'15',color:p.accent,border:`1px solid ${p.accent}30`}}>
                  <I.PlusCircle/> Invite a partner
                </button>
              </div>

              <div className="mt-3 bg-stone-50 rounded-2xl border border-stone-150 p-4 su4">
                <p className="text-[10px] font-semibold uppercase tracking-wide text-stone-400 mb-2">How partners work</p>
                <ul className="space-y-2">
                  {[
                    ['They don’t need Lemon', 'You add them by phone or email — they get a text or email link.'],
                    ['Sees your week Sunday',   'A summary of your commitment + targets, plus a one-tap "send a cheer" button.'],
                    ['Wednesday check-in',      'Mid-week is when consistency dips. Lemon nudges your partner to ping you.'],
                    ['Always opt-out',          'Either side can pause or stop the sharing at any time.'],
                  ].map((row,i)=>(
                    <li key={i} className="flex items-start gap-2.5">
                      <span style={{color:p.accent}} className="mt-0.5"><I.Check/></span>
                      <div>
                        <p className="text-[12px] font-semibold text-stone-600 leading-snug">{row[0]}</p>
                        <p className="text-[11px] text-stone-500 leading-relaxed">{row[1]}</p>
                      </div>
                    </li>
                  ))}
                </ul>
              </div>
            </>
          )}

          {/* Share with doctor — Marcus only */}
          {p.commit.doctor && (
            <div className="mt-4 bg-white rounded-2xl border border-stone-150 p-4 su4">
              <div className="flex items-center gap-2 mb-3">
                <span className="text-stone-500"><I.Doctor/></span>
                <p className="text-[11px] font-semibold uppercase tracking-wide text-stone-400">Share with your doctor</p>
              </div>

              <div className="flex items-center gap-3">
                <div className="w-11 h-11 rounded-full flex items-center justify-center text-white font-bold" style={{background:p.commit.doctor.grad}}>{p.commit.doctor.avatar}</div>
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-semibold text-stone-600">{p.commit.doctor.name}</p>
                  <p className="text-[11px] text-stone-400">{p.commit.doctor.role} · {p.commit.doctor.email}</p>
                </div>
                <button onClick={()=>openSheet('doctor')} className="text-[11px] font-semibold inline-flex items-center gap-1" style={{color:p.accent}}><I.Eye/>Preview</button>
              </div>

              {/* What gets sent */}
              <div className="mt-3 p-3 rounded-xl bg-stone-50 border border-stone-150">
                <p className="text-[10px] font-semibold uppercase tracking-wide text-stone-500 mb-1.5">What gets sent</p>
                <ul className="text-[11.5px] text-stone-600 space-y-0.5 leading-relaxed">
                  <li className="flex items-start gap-1.5"><span style={{color:p.accent}} className="mt-1">•</span><span>7-day BP average + delta vs prior week</span></li>
                  <li className="flex items-start gap-1.5"><span style={{color:p.accent}} className="mt-1">•</span><span>Logging confidence + days in morning window</span></li>
                  <li className="flex items-start gap-1.5"><span style={{color:p.accent}} className="mt-1">•</span><span>This week’s pillar wins</span></li>
                  <li className="flex items-start gap-1.5"><span style={{color:p.accent}} className="mt-1">•</span><span>Most-moved-needle insight</span></li>
                  <li className="flex items-start gap-1.5"><span style={{color:p.accent}} className="mt-1">•</span><span><span className="font-semibold">Attached:</span> 28-day BP report (PDF)</span></li>
                </ul>
              </div>

              {/* Weekly toggle */}
              <div className="mt-3 flex items-start gap-3 pt-3 border-t border-stone-150">
                <Toggle on={shareWeekly} onChange={()=>setShareWeekly(!shareWeekly)} accent={p.accent}/>
                <div className="flex-1 min-w-0">
                  <p className="text-[13px] font-semibold text-stone-600">Send weekly</p>
                  <p className="text-[11.5px] text-stone-400 leading-snug mt-0.5">Sundays at 7pm — same time as your weekly check-in.</p>
                </div>
              </div>

              {/* Send now */}
              <div className="flex gap-2 mt-3">
                <button onClick={()=>openSheet('doctor')}
                  className="flex-1 py-2.5 rounded-xl text-[12.5px] font-semibold inline-flex items-center justify-center gap-1.5" style={{background:p.accent,color:'#fff'}}>
                  <I.Send/> Send now
                </button>
                <button className="px-3 py-2.5 rounded-xl text-[12.5px] font-semibold text-stone-600 bg-stone-100">
                  Schedule
                </button>
              </div>
            </div>
          )}

          {/* Daily preferences */}
          <div className="mt-4 bg-white rounded-2xl border border-stone-150 p-4 su5">
            <div className="flex items-center gap-2 mb-3">
              <span className="text-stone-500"><I.Bell/></span>
              <p className="text-[11px] font-semibold uppercase tracking-wide text-stone-400">Daily preferences</p>
            </div>
            <div className="space-y-3">
              <div className="flex items-start gap-3">
                <Toggle on={reminders.daily} onChange={()=>setReminders(r=>({...r, daily: !r.daily}))} accent={p.accent}/>
                <div className="flex-1 min-w-0">
                  <p className="text-[13px] font-semibold text-stone-600">Daily check-ins</p>
                  <p className="text-[11.5px] text-stone-400 leading-snug mt-0.5">Soft morning nudge for the BP log and one mid-day prompt tied to your pushed pillar.</p>
                </div>
              </div>
              <div className="flex items-start gap-3 pt-3 border-t border-stone-150">
                <Toggle on={reminders.weekly} onChange={()=>setReminders(r=>({...r, weekly: !r.weekly}))} accent={p.accent}/>
                <div className="flex-1 min-w-0">
                  <p className="text-[13px] font-semibold text-stone-600">Weekly check-in</p>
                  <p className="text-[11.5px] text-stone-400 leading-snug mt-0.5">Sunday evening — your 7-day average and next week’s direction prompt.</p>
                </div>
              </div>
              <div className="pt-3 border-t border-stone-150">
                <button onClick={()=> p.canExport && openSheet('export')} disabled={!p.canExport}
                  className="w-full flex items-center gap-3 text-left">
                  <div className="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0" style={{background:(p.canExport?p.accent:'#a8a29e')+'18',color:p.canExport?p.accent:'#a8a29e'}}><I.Document/></div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                      <p className="text-[13px] font-semibold text-stone-600">Export 28-day BP report</p>
                      <span className="text-[9px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded" style={{background:'#1a1a1a',color:'#fff'}}>PDF</span>
                    </div>
                    <p className="text-[11.5px] text-stone-400 leading-snug mt-0.5">
                      {p.canExport
                        ? 'A one-page document of your BP trend, pillar patterns, and the strongest signal in the data.'
                        : p.exportLockReason}
                    </p>
                  </div>
                  {p.canExport && <span className="text-stone-400"><I.Right/></span>}
                </button>
              </div>
            </div>
          </div>
        </>
      )}

      {/* Commit CTA — non-Maya only (Maya's commit is the Confirm/Submit button above) */}
      {!isMaya && (
        <button onClick={()=>setCommitted(true)}
          className="w-full mt-6 py-4 rounded-2xl font-semibold text-base flex items-center justify-center gap-2"
          style={{background:`linear-gradient(135deg, ${p.accent}, ${p.accent}d0)`,color:'#fff', boxShadow:`0 10px 28px ${p.accent}40`}}>
          Commit to {p.plan.week} <I.Right/>
        </button>
      )}
    </div>
  );
};

// ─────────────────────────────────────────────────────────────────────────────
// BOTTOM SHEET
// ─────────────────────────────────────────────────────────────────────────────
const BottomSheet = ({ children, onClose, title }) => (
  <div style={{position:'absolute',inset:0,zIndex:60,display:'flex',flexDirection:'column'}}>
    <div onClick={onClose} style={{flex:1,background:'rgba(0,0,0,0.45)'}}/>
    <div className="sheet-in" style={{background:'#fafaf8',borderTopLeftRadius:24,borderTopRightRadius:24,maxHeight:'88%',overflow:'auto',boxShadow:'0 -10px 40px rgba(0,0,0,0.18)'}}>
      <div className="sticky top-0 z-10 px-5 py-3.5 flex items-center justify-between border-b border-stone-150" style={{background:'#fafaf8'}}>
        <p className="text-[13px] font-semibold text-stone-600">{title}</p>
        <button onClick={onClose} className="text-stone-400 w-8 h-8 flex items-center justify-center"><I.Close/></button>
      </div>
      <div className="px-5 py-4 pb-8">{children}</div>
    </div>
  </div>
);

// ─────────────────────────────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────────────────────────────
function App() {
  const [pk, setPk] = useState('david');
  const [page, setPage] = useState(1);
  const [animKey, setAnimKey] = useState(0);
  const [directions, setDirections] = useState({ move:null, sleep:null, nutrition:null, mind:null, logging:null });
  const [contexts,   setContexts]   = useState([]);
  const [otherNote,  setOtherNote]  = useState('');
  const [sheet,      setSheet]      = useState(null);

  const p = PERSONAS[pk];
  const seq = p.pageSequence || [1,2,3,4,5];
  const currentIdx = seq.indexOf(page);
  const isFirst = currentIdx === 0;
  const isLast  = currentIdx === seq.length - 1;

  const switchPersona = (key) => {
    const newP = PERSONAS[key];
    const newSeq = newP.pageSequence || [1,2,3,4,5];
    setPk(key); setPage(newSeq[0]);
    setDirections({ move:null, sleep:null, nutrition:null, mind:null, logging:null });
    setContexts([]); setOtherNote(''); setSheet(null);
    setAnimKey(k=>k+1);
  };

  const goNext = () => { if (currentIdx < seq.length-1) setPage(seq[currentIdx+1]); };
  const goPrev = () => { if (currentIdx > 0)            setPage(seq[currentIdx-1]); };

  const allDirSet = pillarsFor(p).every(d => directions[d.key]);

  return (
    <>
      <div style={{textAlign:'center',maxWidth:620}}>
        <p style={{fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'#94a47f',margin:'0 0 4px'}}>Mockup 18 · Hypertension Weekly Report (v7)</p>
        <h1 style={{fontSize:22,fontWeight:800,color:'#1a1a1a',margin:'0 0 6px',letterSpacing:'-0.02em'}}>Did the week move your blood pressure?</h1>
        <p style={{fontSize:13,color:'#78716c',margin:0,lineHeight:1.5}}>Maya's plan is plain text now. Two buttons — Confirm or Adjust. Adjust reveals one textarea for free-form changes; Submit commits.</p>
      </div>

      <div style={{width:'100%',maxWidth:620,overflowX:'auto'}} className="hide-scrollbar">
        <div style={{display:'flex',gap:8,justifyContent:'center',padding:'0 4px',flexWrap:'wrap'}}>
          {PERSONA_LIST.map(pp=>{
            const active = pk===pp.key;
            return (
              <button key={pp.key} onClick={()=>switchPersona(pp.key)}
                style={{
                  display:'flex', alignItems:'center', gap:8, padding:'8px 12px', borderRadius:16, flexShrink:0,
                  border:`1.5px solid ${active?'#1a1a1a':'#d8d3c8'}`, background:active?'#fff':'rgba(255,255,255,0.55)',
                  cursor:'pointer', fontFamily:'inherit', transition:'all 0.18s', boxShadow:active?'0 4px 14px rgba(0,0,0,0.10)':'none',
                }}>
                <div style={{width:30,height:30,borderRadius:'50%',background:pp.grad,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#fff'}}>{pp.initial}</div>
                <div style={{textAlign:'left'}}>
                  <p style={{fontSize:12,fontWeight:700,color:active?'#1a1a1a':'#57534e',margin:0,whiteSpace:'nowrap'}}>{pp.name}, {pp.age}</p>
                  <p style={{fontSize:10,color:'#94a47f',margin:0,whiteSpace:'nowrap',fontWeight:600}}>{pp.label}</p>
                </div>
              </button>
            );
          })}
        </div>
      </div>

      <div className="device" key={`${pk}-${animKey}`}>
        <div className="notch"/>

        <div style={{position:'relative',zIndex:5,padding:'10px 18px 6px',background:'rgba(248,247,243,0.95)',borderBottom:'1px solid #efefed',flexShrink:0}}>
          <div className="flex items-center justify-between">
            <button onClick={!isFirst?goPrev:undefined} className="w-7 h-7 flex items-center justify-center text-stone-400">
              {!isFirst ? <I.Back/> : <I.Close/>}
            </button>
            <div className="flex items-center gap-1.5">
              {seq.map(n=>(
                <button key={n} onClick={()=>setPage(n)} className="rounded-full transition-all"
                  style={{height:6, width: page===n ? 22 : 6, background: page===n ? p.accent : '#d6d3d1'}}/>
              ))}
            </div>
            <button className="w-7 h-7 flex items-center justify-center text-stone-400"><I.Share/></button>
          </div>
        </div>

        <div style={{padding:'10px 18px 8px',background:'#fff',borderBottom:'1px solid #efefed',flexShrink:0}}>
          <div className="flex items-center gap-2.5">
            <div style={{width:30,height:30,borderRadius:'50%',background:p.grad,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#fff'}}>{p.initial}</div>
            <div className="flex-1 min-w-0">
              <p className="text-[12px] font-semibold text-stone-600 leading-none">{p.name}, {p.age}</p>
              <p className="text-[10px] text-stone-400 mt-0.5 leading-none">Goal · {p.goalLabel}</p>
            </div>
            <span className="lemon-text" style={{fontWeight:800,fontSize:14,letterSpacing:'-0.02em'}}>lemon</span>
          </div>
        </div>

        <div className="screen fi" key={`${pk}-${page}`} style={{position:'relative'}}>
          {page===1 && <Page1 p={p}/>}
          {page===2 && <Page2 p={p}/>}
          {page===3 && (
            <Page3 p={p}
              directions={directions} setDirections={setDirections}
              contexts={contexts} setContexts={setContexts}
              otherNote={otherNote} setOtherNote={setOtherNote}
              onContinue={goNext}/>
          )}
          {page===4 && <Page4 p={p} directions={directions} contexts={contexts} onContinue={goNext}/>}
          {page===5 && <Page5 p={p} directions={directions} openSheet={setSheet}/>}

          {sheet==='doctor' && p.commit.doctor && (
            <BottomSheet onClose={()=>setSheet(null)} title={`Preview — what ${p.commit.doctor.name} receives`}>
              <p className="text-[11.5px] text-stone-500 mb-3 leading-relaxed">
                Sent Sunday evening. Email + PDF attachment. {p.commit.doctor.name} doesn’t need Lemon.
              </p>
              <DoctorView p={p} accent={p.accent}/>
              <div className="mt-4">
                <p className="text-[11px] font-semibold uppercase tracking-wide text-stone-400 mb-2">Attached PDF</p>
                <PDFExportPreview p={p}/>
              </div>
              <div className="mt-4 flex gap-2">
                <button className="flex-1 py-3 rounded-xl text-[13px] font-semibold text-white inline-flex items-center justify-center gap-1.5" style={{background:p.accent}}>
                  <I.Send/> Send to {p.commit.doctor.name}
                </button>
                <button className="px-4 py-3 rounded-xl text-[13px] font-semibold text-stone-600 bg-stone-100">Save PDF</button>
              </div>
              <p className="text-[10.5px] text-stone-400 mt-3 leading-snug text-center italic">
                For clinical reference only. Lemon is not a medical device.
              </p>
            </BottomSheet>
          )}
          {sheet==='export' && p.canExport && (
            <BottomSheet onClose={()=>setSheet(null)} title="Preview — 28-day BP report (PDF)">
              <p className="text-[11.5px] text-stone-500 mb-3 leading-relaxed">
                A one-page PDF you can save, print, or share. Generated on demand from your last 28 days of logged data.
              </p>
              <PDFExportPreview p={p}/>
              <div className="mt-4 flex gap-2">
                <button className="flex-1 py-3 rounded-xl text-[13px] font-semibold text-white" style={{background:p.accent}}>Save PDF</button>
                <button className="flex-1 py-3 rounded-xl text-[13px] font-semibold text-stone-600 bg-stone-100">Share</button>
              </div>
              <p className="text-[10.5px] text-stone-400 mt-3 leading-snug text-center italic">
                For personal reference only. Lemon is not a medical device.
              </p>
            </BottomSheet>
          )}
        </div>

        {!isLast && (
          <div style={{padding:'10px 18px 14px',background:'rgba(248,247,243,0.97)',borderTop:'1px solid #efefed',flexShrink:0}}>
            <div className="flex items-center justify-between">
              <button onClick={goPrev} disabled={isFirst}
                className={`text-[13px] font-semibold inline-flex items-center gap-1 ${isFirst?'text-stone-300':'text-stone-500'}`}>
                <I.Back/>Back
              </button>
              <span className="text-[11px] text-stone-400">{currentIdx+1} of {seq.length}</span>
              <button onClick={goNext}
                className="text-[13px] font-semibold inline-flex items-center gap-1"
                style={{color:p.accent, opacity: page===3 && !allDirSet ? 0.4 : 1}}
                disabled={page===3 && !allDirSet}>
                Next <I.Forward/>
              </button>
            </div>
          </div>
        )}
      </div>

      <div style={{maxWidth:620,fontSize:11,color:'#a8a29e',textAlign:'center',lineHeight:1.6}}>
        v7 changes · Maya's plan is read-only text. Bottom of the page is a single Confirm / Adjust pair. Adjust swaps in a textarea ("Add more details to customize your plan…") and a Submit button. No inline editing, no add/remove bullets, no category renaming.<br/>
        Lifestyle-only · Manual BP entry · Numbers are illustrative.
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
